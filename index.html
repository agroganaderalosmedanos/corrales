        <div><div class="cc-item-label">Kg ganados</div><div class="cc-item-val" style="font-size:13px;color:var(--green)">${fn(kgG,0)} kg</div></div>
      </div>
      <div style="margin-top:10px;padding-top:8px;border-top:0.5px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:6px">
        <div><div class="cc-item-label">Kg ingresados</div><div style="font-size:12px;font-weight:500">${fn(kgI,0)} kg</div></div>
        <div><div class="cc-item-label">Kg vendidos</div><div style="font-size:12px;font-weight:500">${fn(kgV,0)} kg</div></div>
        <div><div class="cc-item-label">Kg en stock</div><div style="font-size:12px;font-weight:500">${fn(kgStockEstimado(c.id),0)} kg</div></div>
        <div><div class="cc-item-label">Kg ganados</div><div style="font-size:12px;font-weight:500;color:var(--green)">${fn(kgG,0)} kg</div></div>
      </div>
    </div>`;
  });
  h += `</div>`;
  const grandTotal = CORRALES.reduce((s,c) => s + costoAlim(c.id), 0);
  h += `<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:6px">
    <div class="section-label" style="margin-bottom:0">Distribución del costo de alimentación</div>
    <div style="font-size:11px;color:var(--text3);font-style:italic">Incluye la totalidad de los costos incurridos a la fecha, independientemente de las pesadas.</div>
  </div>
  <div class="tw"><table class="data-table"><thead><tr>
    <th>Alimento</th>${CORRALES.map(c=>`<th class="thc">${c.nombre}</th>`).join('')}
    <th class="thc">Total</th><th class="thc">%</th>
  </tr></thead><tbody>`;
  ALIMENTOS.forEach(a => {
    let rowTotal=0, rowCantTotal=0;
    let row = `<tr><td><span class="pill pill-teal">${a.icon} ${a.label}</span></td>`;
    CORRALES.forEach(c => {
      const sub=S.consumos.filter(x=>x.cid===c.id&&x.tipo===a.key).reduce((s,x)=>s+Number(x.cant)*Number(x.precio),0);
      const cant=cantAlim(c.id,a.key);
      rowTotal+=sub; rowCantTotal+=cant;
      row += `<td class="tdc"><div class="cell-pair"><span class="cell-peso">${fmon(sub)}</span><span class="cell-cant">${fn(cant,1)} ${a.unidad}</span></div></td>`;
    });
    row += `<td class="tdc"><div class="cell-pair"><span class="cell-peso">${fmon(rowTotal)}</span><span class="cell-cant">${fn(rowCantTotal,1)} ${a.unidad}</span></div></td>`;
    row += `<td class="tdc">${pct(rowTotal,grandTotal)}</td></tr>`;
    h += row;
  });
  h += `<tr class="total-row"><td><strong>Total</strong></td>`;
  CORRALES.forEach(c => h += `<td class="tdc"><strong>${fmon(costoAlim(c.id))}</strong></td>`);
  h += `<td class="tdc"><strong>${fmon(grandTotal)}</strong></td><td class="tdc">100%</td></tr>`;
  h += `</tbody></table></div>`;
  return h;
}

function buildIngresos() { return buildPesadas(); }

function actualizarStockOpts() {
  const tipoEl = document.getElementById('ct');
  const bolsonEl = document.getElementById('con-bolson');
  if (!tipoEl || !bolsonEl) return;
  const tipo = tipoEl.value;
  const bols = (S.bolsones||[]).filter(b=>b.tipo===tipo&&b.activo!==false&&stockBolson(b.id)>0);
  const alim = ALIMENTOS.find(a=>a.key===tipo)||{unidad:''};
  bolsonEl.innerHTML = '<option value="">Sin asignar</option>' + bols.map(b=>{
    const campo = CAMPOS_GANADEROS.find(c=>c.id===b.campo);
    return `<option value="${b.id}">${campo?.nombre||b.campo} — ${b.nombre} (${fn(stockBolson(b.id),0)} ${alim.unidad})</option>`;
  }).join('');
}

function buildConsumos() {
  const cid = S.corral;
  const list = S.consumos.filter(c => c.cid === cid).sort((a,b) => a.fecha.localeCompare(b.fecha));

  // Mostrar precios vigentes actuales
  const preciosHoy = ALIMENTOS.map(a => {
    const p = precioAlimHoy(a.key);
    return `${a.icon} ${a.label}: ${p ? fmon(p)+'/'+a.unidad : '<span style="color:var(--red)">sin precio</span>'}`;
  }).join(' &nbsp;·&nbsp; ');

  let h = `<div class="panel">
  <div class="panel-title">🌿 Registrar consumo de alimento</div>
  <div style="font-size:11px;color:var(--text3);margin-bottom:8px">Precios vigentes hoy: ${preciosHoy}</div>
  <div class="fgrid">
    <div class="fg"><label>Fecha</label><input type="date" id="cf" value="${today()}" onchange="actualizarStockOpts()"></div>
    <div class="fg"><label>Alimento</label><select id="ct" onchange="actualizarStockOpts()">${ALIMENTOS.map(a=>`<option value="${a.key}">${a.icon} ${a.label} (${a.unidad})</option>`).join('')}</select></div>
    <div class="fg"><label>Cantidad</label><input type="number" id="cc" placeholder="Ej: 500" min="0.01" step="0.01"></div>
    <div class="fg"><label>Precio unitario ($) <span style="color:var(--text3);font-size:11px">— vacío = usa precio vigente</span></label><input type="number" id="cp" placeholder="Automático según vigencia" min="0" step="0.01"></div>
    <div class="fg" style="min-width:260px"><label>Stock origen <span style="color:var(--text3);font-size:11px">— opcional</span></label>
      <select id="con-bolson">
        <option value="">Sin asignar</option>
        ${(()=>{
          const tipo = ALIMENTOS[0]?.key||'maiz';
          const bols = (S.bolsones||[]).filter(b=>b.tipo===tipo&&b.activo!==false&&stockBolson(b.id)>0);
          return bols.map(b=>{
            const campo = CAMPOS_GANADEROS.find(c=>c.id===b.campo);
            return `<option value="${b.id}">${campo?.nombre||b.campo} — ${b.nombre} (${fn(stockBolson(b.id),0)} ${ALIMENTOS.find(a=>a.key===b.tipo)?.unidad||''})</option>`;
          }).join('');
        })()}
      </select>
    </div>
  </div>
  <div class="stock-info">🐄 Animales en corral en esa fecha: <strong id="stk-disp">—</strong></div>
  <button class="btn btn-primary" id="btn-con">✓ Registrar consumo</button>
  </div>`;
  if (!list.length) {
    h += `<div class="empty"><span class="empty-icon">🌿</span>No hay consumos registrados en este corral.</div>`;
  } else {
    h += `<div class="section-label">Historial de alimentación</div>
    <div class="tw"><table class="data-table"><thead><tr><th>Fecha</th><th>Stock ese día</th><th>Alimento</th><th>Cantidad</th><th>Precio</th><th>Subtotal</th><th>$/animal</th><th>Acciones</th></tr></thead><tbody>`;
    list.forEach(c => {
      const stk=stockAt(cid,c.fecha);
      const alim=ALIMENTOS.find(a=>a.key===c.tipo)||{label:c.tipo,unidad:'',icon:'📦'};
      const sub=Number(c.cant)*Number(c.precio);
      h += `<tr><td>${fd(c.fecha)}</td>
      <td><span class="pill pill-blue">${fn(stk,0)} cab.</span></td>
      <td><span class="pill pill-teal">${alim.icon} ${alim.label}</span></td>
      <td>${fn(c.cant)} ${alim.unidad}</td><td>${fmon(c.precio)}</td><td>${fmon(sub)}</td>
      <td>${fmon(stk>0?sub/stk:0)}</td>
      <td class="td-actions">
        <button class="btn-edit" data-edit-con="${c.id}" title="Editar">✏️</button>
        <button class="btn-del" data-del-con="${c.id}" title="Eliminar">🗑</button>
      </td></tr>`;
    });
    h += `</tbody></table></div>`;
    h += `<div class="section-label" style="margin-top:8px">Resumen por tipo de alimento</div><div class="kpi-grid">`;
    ALIMENTOS.forEach(a => {
      const c2=list.filter(c=>c.tipo===a.key);
      const t=c2.reduce((s,c)=>s+Number(c.cant)*Number(c.precio),0);
      const cant=c2.reduce((s,c)=>s+Number(c.cant),0);
      h += `<div class="kpi"><div class="kpi-icon">${a.icon}</div><div class="kpi-label">${a.label}</div><div class="kpi-val" style="font-size:17px">${fmon(t)}</div><div class="kpi-sub">${fn(cant,1)} ${a.unidad}</div></div>`;
    });
    h += `</div>`;
  }
  return h;
}

function buildVentas() {
  const cid = S.corral, stk = stockNow(cid);
  const list = S.ventas.filter(v => v.cid === cid).sort((a,b) => a.fecha.localeCompare(b.fecha));

  // ── Formulario registro de salida ──────────────────────────────────────────
  let h = `<div class="panel">
  <div class="panel-title">🐄 Registrar salida de animales</div>
  <div class="stock-info">🐄 Stock disponible: <strong>${fn(stk,0)} animales</strong></div>
  <div style="font-size:12px;color:var(--text2);margin-bottom:8px">Completá los datos al momento de la carga. La liquidación (kg en frigorífico, rinde, importe) la completás después cuando llegue la liquidación.</div>
  <div class="fgrid">
    <div class="fg"><label>Fecha salida</label><input type="date" id="vf" value="${today()}"></div>
    <div class="fg"><label>Tipo</label>
      <select id="vtipo">
        <option value="frigorifico">🏭 Frigorífico</option>
        <option value="en_pie">🤝 Venta en pie</option>
        <option value="baja">💀 Baja / Muerte</option>
      </select>
    </div>
    <div class="fg"><label>Cantidad</label><input type="number" id="vc" placeholder="Ej: 33" min="1"></div>
    <div class="fg"><label>Kg prom. en campo</label><input type="number" id="vk" placeholder="Ej: 510" min="1"></div>
    <div class="fg"><label>Comprador / destino</label><input type="text" id="vcomprador" placeholder="Ej: Frigo San Jorge..."></div>
    <div class="fg"><label>Precio pactado ($/kg)</label><input type="number" id="vp" placeholder="Ej: 4500" min="0"></div>
    <div class="fg" style="min-width:280px"><label>Observaciones</label><input type="text" id="vobs" placeholder="Ej: pago a 21 días, precio sujeto a TC..."></div>
  </div>
  <button class="btn btn-primary" id="btn-ven">✓ Registrar salida</button>
  </div>`;

  if (!list.length) {
    h += `<div class="empty"><span class="empty-icon">🧾</span>No hay salidas registradas en este corral.</div>`;
    return h;
  }

  // ── Pendientes de liquidación ──────────────────────────────────────────────
  const pendLiq = list.filter(v => !v.baja && !v.liquidado);
  if (pendLiq.length) {
    h += `<div class="section-label" style="color:var(--red)">⏳ Pendientes de liquidación</div>
    <div class="tw"><table class="data-table" style="margin-bottom:14px"><thead><tr>
      <th>Fecha</th><th>Tipo</th><th>Cab.</th><th class="thc">Kg campo</th><th>Comprador</th><th class="thc">Precio pactado</th><th>Obs.</th><th>Acción</th>
    </tr></thead><tbody>`;
    pendLiq.forEach(v => {
      const tipoPill = v.tipo==='frigorifico'?'🏭 Frigorífico':'🤝 En pie';
      h += `<tr style="background:var(--bg2)">
        <td>${fd(v.fecha)}</td>
        <td><span class="pill pill-blue">${tipoPill}</span></td>
        <td><strong>${fn(v.cant,0)}</strong></td>
        <td class="tdc">${fn(Number(v.cant)*Number(v.kg),0)} kg</td>
        <td style="font-size:12px">${v.comprador||'—'}</td>
        <td class="tdc">${v.precioPactado?fmon(v.precioPactado)+'/kg':'—'}</td>
        <td style="font-size:12px;color:var(--text2)">${v.obs||'—'}</td>
        <td class="td-actions">
          <button class="btn btn-primary" style="font-size:11px;padding:3px 8px" data-liq-ven="${v.id}">💰 Liquidar</button>
          <button class="btn-del" data-del-ven="${v.id}">🗑</button>
        </td></tr>`;
    });
    h += `</tbody></table></div>`;
  }

  // ── Historial completo ─────────────────────────────────────────────────────
  h += `<div class="section-label">Historial de salidas</div>
  <div class="tw"><table class="data-table"><thead><tr>
    <th>Fecha</th><th>Tipo</th><th>Cab.</th><th class="thc">Kg campo</th><th>Comprador</th>
    <th class="thc">Kg frigo/netos</th><th class="thc">Rinde/Desbaste</th><th class="thc">Precio liq.</th><th class="thc">Importe</th><th>Estado</th><th>Acc.</th>
  </tr></thead><tbody>`;

  list.forEach(v => {
    const esBaja = v.baja;
    const kgCampo = Number(v.cant)*Number(v.kg);
    const importe = v.importeTotal || (v.kgLiquidados && v.precioLiq ? Number(v.kgLiquidados)*Number(v.precioLiq) : 0);
    const tipoPill = esBaja
      ? `<span class="pill" style="background:#fee2e2;color:#991b1b">💀 Baja</span>`
      : v.tipo==='frigorifico'
        ? `<span class="pill pill-blue">🏭 Frigo</span>`
        : `<span class="pill pill-teal">🤝 En pie</span>`;
    const estadoPill = esBaja ? '—'
      : v.liquidado
        ? `<span class="pill" style="background:#dcfce7;color:#166534">✓ Liquidado</span>`
        : `<span class="pill" style="background:#fef3c7;color:#92400e">⏳ Pendiente</span>`;
    h += `<tr>
      <td>${fd(v.fecha)}</td>
      <td>${tipoPill}</td>
      <td><strong>${fn(v.cant,0)}</strong></td>
      <td class="tdc">${fn(kgCampo,0)} kg</td>
      <td style="font-size:12px">${v.comprador||'—'}</td>
      <td class="tdc">${v.kgLiquidados?fn(v.kgLiquidados,0)+' kg':'—'}</td>
      <td class="tdc">${v.rinde?fn(v.rinde,1)+'%':v.desbaste?fn(v.desbaste,1)+'%':'—'}</td>
      <td class="tdc">${v.precioLiq?fmon(v.precioLiq)+'/kg':'—'}</td>
      <td class="tdc"><strong>${importe>0?fmon(importe):'—'}</strong></td>
      <td>${estadoPill}</td>
      <td class="td-actions">
        <button class="btn-edit" data-edit-ven="${v.id}" title="Editar">✏️</button>
        <button class="btn-del" data-del-ven="${v.id}">🗑</button>
      </td></tr>`;
  });
  h += `</tbody></table></div>`;

  // ── KPIs resumen ───────────────────────────────────────────────────────────
  const soloVentas = list.filter(v => !v.baja && v.liquidado);
  const tc = soloVentas.reduce((s,v)=>s+Number(v.cant),0);
  const tkCampo = soloVentas.reduce((s,v)=>s+Number(v.cant)*Number(v.kg),0);
  const tkLiq = soloVentas.reduce((s,v)=>s+Number(v.kgLiquidados||0),0);
  const ti = soloVentas.reduce((s,v)=>s+(v.importeTotal||Number(v.kgLiquidados||0)*Number(v.precioLiq||0)),0);
  const tb = list.filter(v=>v.baja).reduce((s,v)=>s+Number(v.cant),0);
  const pendCount = pendLiq.length;
  h += `<div class="kpi-grid">
    <div class="kpi"><div class="kpi-label">Animales vendidos</div><div class="kpi-val">${fn(tc,0)} <span style="font-size:14px;font-weight:400">cab.</span></div></div>
    <div class="kpi"><div class="kpi-label">Kg vendidos (liquidados)</div><div class="kpi-val">${fn(tkLiq,0)} <span style="font-size:14px;font-weight:400">kg</span></div></div>
    <div class="kpi"><div class="kpi-label">Ingreso total liquidado</div><div class="kpi-val">${fmon(ti)}</div></div>
    <div class="kpi"><div class="kpi-label">Precio prom. / kg</div><div class="kpi-val">${tkLiq>0?fmon(ti/tkLiq):'—'}</div></div>
    ${tkCampo>0&&tkLiq>0?`<div class="kpi"><div class="kpi-label">Rinde prom.</div><div class="kpi-val">${fn(tkLiq/tkCampo*100,1)}%</div></div>`:''}
    ${tb>0?`<div class="kpi" style="border-top:2px solid var(--red)"><div class="kpi-label">Bajas / muertes</div><div class="kpi-val kpi-neg">${fn(tb,0)} cab.</div></div>`:''}
    ${pendCount>0?`<div class="kpi" style="border-top:2px solid #f59e0b"><div class="kpi-label">Pendientes de liquidación</div><div class="kpi-val" style="color:#f59e0b">${pendCount}</div></div>`:''}
  </div>`;

  return h;
}


function buildPesadas() {
  const cid = S.corral;
  const cor = CORRALES.find(c => c.id === cid);
  const ings = S.ingresos.filter(i => i.cid === cid).sort((a,b) => a.fecha.localeCompare(b.fecha));
  const list = (S.pesadas||[]).filter(p => p.cid === cid).sort((a,b) => a.fecha.localeCompare(b.fecha));

  const totalIngCant = ings.reduce((s,i)=>s+Number(i.cant),0);
  const kgPromIng    = totalIngCant > 0 ? ings.reduce((s,i)=>s+Number(i.cant)*Number(i.kg),0)/totalIngCant : 0;
  const fechaInicio  = ings.length ? ings.map(i=>i.fecha).sort()[0] : null;

  // ── SECCIÓN INGRESOS ────────────────────────────────────────────────────────
  let h = `<div class="panel">
  <div class="panel-title">📥 Registrar ingreso de animales</div>
  <div class="fgrid">
    <div class="fg"><label>Fecha de ingreso</label><input type="date" id="if" value="${today()}"></div>
    <div class="fg"><label>Cantidad de animales</label><input type="number" id="ic" placeholder="Ej: 185" min="1"></div>
    <div class="fg"><label>Kilos promedio / animal</label><input type="number" id="ik" placeholder="Ej: 335" min="1"></div>
    <div class="fg"><label>Precio por kg ($)</label><input type="number" id="ip" placeholder="Ej: 4500" min="0"></div>
  </div>
  <button class="btn btn-primary" id="btn-ing">✓ Registrar ingreso</button>
  </div>`;

  if (ings.length) {
    h += `<div class="section-label">Historial de ingresos — ${cor.nombre}</div>
    <div class="tw"><table class="data-table"><thead><tr>
      <th>Fecha</th><th>Cabezas</th><th>Kg prom.</th><th>Precio/kg</th><th>Total kg</th><th>Costo compra</th><th>Acciones</th>
    </tr></thead><tbody>`;
    ings.forEach(i => {
      const tk = +i.cant * +i.kg;
      h += `<tr><td>${fd(i.fecha)}</td><td><strong>${fn(i.cant,0)}</strong></td><td>${fn(i.kg,1)} kg</td><td>${fmon(i.precio)}</td><td>${fn(tk,0)} kg</td><td>${fmon(tk*+i.precio)}</td>
      <td class="td-actions">
        <button class="btn-edit" data-edit-ing="${i.id}" title="Editar">✏️</button>
        <button class="btn-del" data-del-ing="${i.id}" title="Eliminar">🗑</button>
      </td></tr>`;
    });
    const tc=ings.reduce((s,i)=>s+Number(i.cant),0);
    const tk=ings.reduce((s,i)=>s+Number(i.cant)*Number(i.kg),0);
    const tco=ings.reduce((s,i)=>s+Number(i.cant)*Number(i.kg)*Number(i.precio),0);
    h += `</tbody></table></div>
    <div class="kpi-grid" style="margin-bottom:18px">
      <div class="kpi"><div class="kpi-label">Total ingresado</div><div class="kpi-val">${fn(tc,0)} <span style="font-size:14px;font-weight:400">cab.</span></div></div>
      <div class="kpi"><div class="kpi-label">Stock actual</div><div class="kpi-val">${fn(stockNow(cid),0)} <span style="font-size:14px;font-weight:400">cab.</span></div></div>
      <div class="kpi"><div class="kpi-label">Kg promedio ingreso</div><div class="kpi-val">${fn(kgPromIng,1)} <span style="font-size:14px;font-weight:400">kg</span></div></div>
      <div class="kpi"><div class="kpi-label">Costo total compra</div><div class="kpi-val">${fmon(tco)}</div></div>
    </div>`;
  }

  // ── SEPARADOR ───────────────────────────────────────────────────────────────
  h += `<div style="border-top:2px solid var(--border);margin:4px 0 16px"></div>`;

  // ── SECCIÓN PESADAS ─────────────────────────────────────────────────────────
  h += `<div class="panel">
  <div class="panel-title">⚖️ Registrar pesada</div>
  ${fechaInicio ? `<div class="stock-info">📅 Inicio del lote: <strong>${fd(fechaInicio)}</strong> &nbsp;|&nbsp; 🐄 Kg prom. ingreso: <strong>${fn(kgPromIng,1)} kg</strong></div>` : '<div class="stock-info" style="color:var(--red)">⚠ No hay ingresos registrados en este corral.</div>'}
  <div class="fgrid">
    <div class="fg"><label>Fecha de pesada</label><input type="date" id="pef" value="${today()}"></div>
    <div class="fg"><label>Cantidad de animales</label><input type="number" id="pec" placeholder="Ej: 185" min="1"></div>
    <div class="fg"><label>Kilos promedio / animal</label><input type="number" id="pek" placeholder="Ej: 420" min="1" step="0.1"></div>
  </div>
  <button class="btn btn-primary" id="btn-pes">⚖️ Registrar pesada</button>
  </div>`;

  if (!list.length) {
    h += `<div class="empty"><span class="empty-icon">⚖️</span>No hay pesadas registradas en este corral.</div>`;
  } else {
    // Ganancia total en kg = kg vendidos + (stock actual × kg prom ingreso) - kg ingresados totales
    const kgTotIng  = kgIngresados(cid);
    const kgTotVend = kgVend(cid);
    const stockAct  = stockNow(cid);
    const kgStockAct = kgStockEstimado(cid);  // usa última pesada, igual que Costos
    const ganTotalKg = kgTotVend + kgStockAct - kgTotIng;

    h += `<div class="section-label">Historial de pesadas — ${cor.nombre}</div>
    <div class="tw"><table class="data-table"><thead><tr>
      <th>Fecha</th>
      <th class="thc">Animales</th>
      <th class="thc">Kg prom. actual</th>
      <th class="thc">Kg totales pesada</th>
      <th class="thc">Kg ingresados (esos animales)</th>
      <th class="thc">Kg prom. ingreso</th>
      <th class="thc">Días desde inicio</th>
      <th class="thc">Ganancia diaria</th>
      <th>Acciones</th>
    </tr></thead><tbody>`;

    list.forEach(p => {
      // Kg ingresados proporcionales a la cantidad pesada
      const kgIngPesados = Number(p.cant) * kgPromIng;
      const kgTotal      = Number(p.cant) * Number(p.kg);
      let dias = '—', ganDiaria = '—', ganDiariaNum = null;
      if (fechaInicio) {
        const msInicio = new Date(fechaInicio).getTime();
        const msPesada = new Date(p.fecha).getTime();
        dias = Math.round((msPesada - msInicio) / 86400000);
        if (dias > 0 && kgPromIng > 0) {
          // (kg prom pesada - kg prom ingreso) / días = ganancia diaria por animal
          ganDiariaNum = (Number(p.kg) - kgPromIng) / dias;
          ganDiaria = fn(ganDiariaNum, 2) + ' kg/día/animal';
        }
      }
      const colorGan = ganDiariaNum !== null ? (ganDiariaNum >= 0 ? 'color:var(--green);font-weight:600' : 'color:var(--red);font-weight:600') : '';
      h += `<tr>
        <td>${fd(p.fecha)}</td>
        <td class="tdc"><strong>${fn(p.cant,0)}</strong></td>
        <td class="tdc">${fn(p.kg,1)} kg</td>
        <td class="tdc">${fn(kgTotal,0)} kg</td>
        <td class="tdc">${fn(kgIngPesados,0)} kg</td>
        <td class="tdc">${fn(kgPromIng,1)} kg</td>
        <td class="tdc">${typeof dias === 'number' ? dias + ' días' : '—'}</td>
        <td class="tdc" style="${colorGan}">${ganDiaria}</td>
        <td class="td-actions">
          <button class="btn-edit" data-edit-pes="${p.id}" title="Editar">✏️</button>
          <button class="btn-del" data-del-pes="${p.id}" title="Eliminar">🗑</button>
        </td></tr>`;
    });
    h += `</tbody></table></div>`;

    // KPIs resumen
    const ultima = list[list.length-1];
    const diasUltima = fechaInicio ? Math.round((new Date(ultima.fecha)-new Date(fechaInicio))/86400000) : null;
    const kgIngUltima = Number(ultima.cant) * kgPromIng;
    // Ganancia diaria real: desde ingreso hasta última pesada
    const ganUltima = (diasUltima && diasUltima > 0 && kgPromIng > 0) ? (Number(ultima.kg) - kgPromIng) / diasUltima : null;
    h += `<div class="kpi-grid" style="margin-top:8px">
      <div class="kpi"><div class="kpi-icon">📅</div><div class="kpi-label">Última pesada</div><div class="kpi-val" style="font-size:18px">${fd(ultima.fecha)}</div></div>
      <div class="kpi"><div class="kpi-icon">⚖️</div><div class="kpi-label">Kg prom. última pesada</div><div class="kpi-val">${fn(ultima.kg,1)}</div><div class="kpi-sub">vs ${fn(kgPromIng,1)} kg al ingreso</div></div>
      <div class="kpi" style="border-top:2px solid var(--green)"><div class="kpi-icon">📈</div><div class="kpi-label">Ganancia diaria (real)</div><div class="kpi-val kpi-pos">${ganUltima!==null?fn(ganUltima,3)+' kg/día/animal':'—'}</div><div class="kpi-sub">desde ingreso hasta ${fd(ultima.fecha)}</div></div>
      <div class="kpi" style="border-top:2px solid var(--green)"><div class="kpi-icon">🏆</div><div class="kpi-label">Ganancia total en kg</div><div class="kpi-val kpi-pos">${fn(ganTotalKg,0)} kg</div><div class="kpi-sub">kg vend. + stock (últ. pesada) − kg ing.</div></div>
    </div>`;

    // ── ALERTA DE EFICIENCIA ─────────────────────────────────────────────────
    if (list.length >= 3) {
      // Tenemos al menos 3 pesadas: calcular ganancia entre p1→p2 y p2→p3
      const p1 = list[list.length-3], p2 = list[list.length-2], p3 = list[list.length-1];
      const dias12 = Math.round((new Date(p2.fecha)-new Date(p1.fecha))/86400000);
      const dias23 = Math.round((new Date(p3.fecha)-new Date(p2.fecha))/86400000);
      if (dias12 > 0 && dias23 > 0) {
        const gan12 = (Number(p2.kg) - Number(p1.kg)) / dias12;
        const gan23 = (Number(p3.kg) - Number(p2.kg)) / dias23;
        const caida = gan12 > 0 ? (gan12 - gan23) / gan12 * 100 : 0;
        const mejora = gan23 > gan12;
        if (mejora) {
          h += `<div style="background:var(--green-bg);border:0.5px solid #5DCAA5;border-radius:8px;padding:12px 16px;display:flex;align-items:center;gap:12px;margin-top:8px">
            <span style="font-size:22px">📈</span>
            <div>
              <div style="font-weight:600;color:var(--green-text)">Eficiencia en alza</div>
              <div style="font-size:12px;color:var(--green-text);margin-top:2px">
                La ganancia diaria mejoró de <strong>${fn(gan12,3)} kg/día</strong> a <strong>${fn(gan23,3)} kg/día</strong>
                (+${fn(Math.abs(caida)*-1,1)}% entre ${fd(p2.fecha)} y ${fd(p3.fecha)}).
              </div>
            </div>
          </div>`;
        } else if (caida >= 30) {
          h += `<div style="background:var(--red-bg);border:0.5px solid #F09595;border-radius:8px;padding:12px 16px;display:flex;align-items:center;gap:12px;margin-top:8px">
            <span style="font-size:22px">🚨</span>
            <div>
              <div style="font-weight:600;color:var(--red-text)">Caída significativa de eficiencia</div>
              <div style="font-size:12px;color:var(--red-text);margin-top:2px">
                La ganancia diaria cayó <strong>${fn(caida,1)}%</strong>: de <strong>${fn(gan12,3)} kg/día</strong> a <strong>${fn(gan23,3)} kg/día</strong>
                (entre ${fd(p2.fecha)} y ${fd(p3.fecha)}). Revisar dieta, sanidad o considerar adelantar la salida.
              </div>
            </div>
          </div>`;
        } else if (caida >= 15) {
          h += `<div style="background:#fff7ed;border:0.5px solid #fdba74;border-radius:8px;padding:12px 16px;display:flex;align-items:center;gap:12px;margin-top:8px">
            <span style="font-size:22px">⚠️</span>
            <div>
              <div style="font-weight:600;color:#9a3412">Leve caída de eficiencia</div>
              <div style="font-size:12px;color:#9a3412;margin-top:2px">
                La ganancia diaria bajó <strong>${fn(caida,1)}%</strong>: de <strong>${fn(gan12,3)} kg/día</strong> a <strong>${fn(gan23,3)} kg/día</strong>
                (entre ${fd(p2.fecha)} y ${fd(p3.fecha)}). Monitorear en la próxima pesada.
              </div>
            </div>
          </div>`;
        } else {
          h += `<div style="background:var(--bg2);border:0.5px solid var(--border);border-radius:8px;padding:10px 16px;display:flex;align-items:center;gap:10px;margin-top:8px">
            <span style="font-size:18px">✅</span>
            <div style="font-size:12px;color:var(--text2)">
              Eficiencia estable: ganancia diaria de <strong>${fn(gan23,3)} kg/día</strong>
              (variación de ${fn(caida,1)}% respecto al período anterior).
            </div>
          </div>`;
        }
      }
    } else if (list.length === 2) {
      // Solo dos pesadas: comparamos entre ellas
      const p1 = list[0], p2 = list[1];
      const dias = Math.round((new Date(p2.fecha)-new Date(p1.fecha))/86400000);
      if (dias > 0) {
        const gan = (Number(p2.kg) - Number(p1.kg)) / dias;
        h += `<div style="background:var(--bg2);border:0.5px solid var(--border);border-radius:8px;padding:10px 16px;display:flex;align-items:center;gap:10px;margin-top:8px">
          <span style="font-size:18px">ℹ️</span>
          <div style="font-size:12px;color:var(--text2)">
            Con 2 pesadas registradas la ganancia entre ellas es <strong>${fn(gan,3)} kg/día/animal</strong>.
            Registrá una tercera pesada para detectar tendencias de eficiencia.
          </div>
        </div>`;
      }
    }
  }
  return h;
}

function buildCostos() {
  const cid = S.corral;
  const cor = CORRALES.find(c => c.id === cid);

  const cc   = costoCompra(cid);
  const ca   = costoAlim(cid);            // costo total real (para utilidad)
  const caHastaP = costoAlimHastaPesada(cid); // costo hasta pesada
  const ivVentas = ingVentas(cid);
  const ing  = totIng(cid);
  const stk  = stockNow(cid);
  const vend = ing - stk;
  const kgI  = kgIngresados(cid);
  const kgV  = kgVend(cid);
  const kgG  = kgGanadosHastaPesada(cid); // consistente: siempre hasta la última pesada

  // Kg promedio de la última pesada (para valorizar el stock)
  const pesadasCid = (S.pesadas||[]).filter(p => p.cid === cid).sort((a,b) => a.fecha.localeCompare(b.fecha));
  const ultimaPesada = pesadasCid.length ? pesadasCid[pesadasCid.length-1] : null;
  const kgPromUltimaPesada = ultimaPesada ? Number(ultimaPesada.kg) : 0;
  const fUltPesada = ultimaPesada ? ultimaPesada.fecha : null;

  // Precio de valorización del stock (guardado en localStorage por corral)
  const stkPrecio = Number((S.preciosStock||{})[cid] || 0);

  // Valor stock = precio/kg × kg prom última pesada × animales en stock
  const ivStock = stkPrecio > 0 && kgPromUltimaPesada > 0 ? stk * kgPromUltimaPesada * stkPrecio : 0;
  const ivTotal = ivVentas + ivStock;
  const util    = ivTotal - cc - ca;
  const costoTotal = cc + ca;

  // Costo alim por animal = costo hasta pesada / (vendidos + stock)
  const totalAnimales = vend + stk;
  const caXAnimal     = totalAnimales > 0 ? caHastaP / totalAnimales : 0;
  const caXkgG        = kgG > 0 ? caHastaP / kgG : 0;
  const precioVentaProm = kgV > 0 ? ivVentas / kgV : 0;
  const margenNeto      = kgV > 0 ? util / kgV : 0;

  // ── Panel de valorización del stock ──────────────────────────────────────
  let h = `<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:12px">
    <span style="font-size:13px;font-weight:600;color:var(--text)">📊 Valorización stock</span>
    <span style="font-size:12px;color:var(--text2)">${fn(stk,0)} animales · kg prom. última pesada: <strong>${kgPromUltimaPesada>0?fn(kgPromUltimaPesada,1)+' kg':'sin pesadas'}</strong></span>
    <input type="number" id="stk-precio" value="${stkPrecio||''}" placeholder="$ / kg" min="0" step="1"
      style="width:110px;padding:5px 8px;border:1px solid var(--border2);border-radius:6px;background:var(--bg);color:var(--text);font-size:13px">
    <button class="btn" id="btn-stk-precio" style="padding:5px 12px;font-size:12px">✓ Aplicar</button>
    ${stkPrecio>0 && kgPromUltimaPesada>0 ? `<span style="font-size:13px;font-weight:700;color:var(--green)">= ${fmon(ivStock)}</span><span style="font-size:11px;color:var(--text2)">(${fn(stk,0)} × ${fn(kgPromUltimaPesada,1)} kg × ${fmon(stkPrecio)}/kg)</span>` : ''}
    ${stkPrecio>0 && kgPromUltimaPesada===0 ? `<span style="font-size:12px;color:var(--red)">⚠ Ingresá una pesada para valorizar el stock</span>` : ''}
  </div>`;

  const costoVet    = costoVetTotal(cid);
  const costoVetHP  = costoVetHastaPesada(cid);
  const utilConVet  = util - costoVet;

  const fechaInicioC = S.ingresos.filter(i=>i.cid===cid).length ? S.ingresos.filter(i=>i.cid===cid).map(i=>i.fecha).sort()[0] : null;
  const diasDesdeInicio = (fechaInicioC && ultimaPesada) ? Math.round((new Date(ultimaPesada.fecha)-new Date(fechaInicioC))/86400000) : null;
  const kgPromIngC = ing > 0 ? kgI / ing : 0;
  const ganDiariaReal = (diasDesdeInicio && diasDesdeInicio > 0 && kgPromIngC > 0 && ultimaPesada)
    ? (Number(ultimaPesada.kg) - kgPromIngC) / diasDesdeInicio : null;

  // ── FILA 1: costos base + ingresos ───────────────────────────────────────
  h += `<div class="kpi-grid" style="margin-bottom:1px">
    <div class="kpi">
      <div class="kpi-icon">🛒</div>
      <div class="kpi-label">Costo de compra</div>
      <div class="kpi-val">${fmon(cc)}</div>
      <div class="kpi-sub">${fn(ing,0)} animales ingresados</div>
    </div>
    <div class="kpi">
      <div class="kpi-icon">🌿</div>
      <div class="kpi-label">Costo alim. total acumulado</div>
      <div class="kpi-val">${fmon(ca)}</div>
      <div class="kpi-sub">todos los insumos hasta hoy</div>
    </div>
    <div class="kpi" style="${fUltPesada&&caHastaP<ca?'border-top:2px solid var(--blue)':''}">
      <div class="kpi-icon">🌿</div>
      <div class="kpi-label">Costo alim. hasta pesada</div>
      <div class="kpi-val" style="${fUltPesada&&caHastaP<ca?'color:var(--blue-text)':''}">${fmon(caHastaP)}</div>
      <div class="kpi-sub">${fUltPesada?`hasta ${fd(fUltPesada)} · usado en eficiencia`:'igual al total (sin consumos posteriores)'}</div>
    </div>
    <div class="kpi">
      <div class="kpi-icon">💲</div>
      <div class="kpi-label">Costo total acumulado</div>
      <div class="kpi-val">${fmon(costoTotal)}</div>
      <div class="kpi-sub">compra + alimentación</div>
    </div>
    <div class="kpi">
      <div class="kpi-icon">💵</div>
      <div class="kpi-label">Ingresos por ventas</div>
      <div class="kpi-val">${fmon(ivVentas)}</div>
      <div class="kpi-sub">${fn(vend,0)} animales vendidos</div>
    </div>
  </div>`;

  // ── FILA 2: stock valorizado + ingresos totales + utilidad ────────────────
  h += `<div class="kpi-grid" style="margin-bottom:1px">
    <div class="kpi">
      <div class="kpi-icon">🐄</div>
      <div class="kpi-label">Stock valorizado</div>
      <div class="kpi-val">${stkPrecio>0 ? fmon(ivStock) : '—'}</div>
      <div class="kpi-sub">${fn(stk,0)} animales en corral${stkPrecio>0 ? ' · '+fmon(stkPrecio)+'/kg' : ' · ingresá precio'}</div>
    </div>
    <div class="kpi" style="border-top:2px solid var(--green)">
      <div class="kpi-icon">💰</div>
      <div class="kpi-label">Ingresos totales</div>
      <div class="kpi-val kpi-pos">${fmon(ivTotal)}</div>
      <div class="kpi-sub">ventas + stock valorizado</div>
    </div>
    <div class="kpi" style="border-top:2px solid ${util>=0?'var(--green)':'var(--red)'}">
      <div class="kpi-icon">${util>=0?'📈':'📉'}</div>
      <div class="kpi-label">Utilidad (sin veterinaria)</div>
      <div class="kpi-val ${util>=0?'kpi-pos':'kpi-neg'}">${fmon(util)}</div>
      <div class="kpi-sub">${util>=0?'✓ Ganancia':'⚠ Pérdida'}</div>
    </div>
    ${costoVet>0?`
    <div class="kpi" style="border-top:2px solid #9b59b6">
      <div class="kpi-icon">🩺</div>
      <div class="kpi-label">Costo veterinario</div>
      <div class="kpi-val" style="color:#9b59b6">${fmon(costoVet)}</div>
      <div class="kpi-sub">${fmon(costoVetHP)} hasta pesada</div>
    </div>
    <div class="kpi" style="border-top:2px solid ${utilConVet>=0?'var(--green)':'var(--red)'}">
      <div class="kpi-icon">${utilConVet>=0?'📈':'📉'}</div>
      <div class="kpi-label">Utilidad (con veterinaria)</div>
      <div class="kpi-val ${utilConVet>=0?'kpi-pos':'kpi-neg'}">${fmon(utilConVet)}</div>
      <div class="kpi-sub">incluye ${fmon(costoVet)} en vet.</div>
    </div>`:''}
    <div class="kpi">
      <div class="kpi-icon">🔢</div>
      <div class="kpi-label">% Margen sobre ingresos</div>
      <div class="kpi-val ${util>=0?'kpi-pos':'kpi-neg'}">${ivTotal>0?(util/ivTotal*100).toFixed(1)+'%':'—'}</div>
      <div class="kpi-sub">sin veterinaria</div>
    </div>
  </div>`;

  // Kg en stock
  const kgStock = kgStockEstimado(cid);
  const kgComprobacion = kgV + kgStock - kgI;

  // Kg hasta pesada (consistente)
  const kgVendHP     = ultimaPesada ? S.ventas.filter(v=>v.cid===cid&&!v.baja&&v.fecha<=ultimaPesada.fecha).reduce((s,v)=>s+Number(v.cant)*Number(v.kg),0) : kgV;
  const kgStockPesada = ultimaPesada ? Number(ultimaPesada.cant)*Number(ultimaPesada.kg) : kgStock;

  // ── FILA 3: kg ────────────────────────────────────────────────────────────
  h += `<div class="kpi-grid" style="margin-bottom:1px">
    <div class="kpi">
      <div class="kpi-icon">📥</div>
      <div class="kpi-label">Kg ingresados</div>
      <div class="kpi-val">${fn(kgI,0)}</div>
      <div class="kpi-sub">kg al entrar al corral</div>
    </div>
    <div class="kpi">
      <div class="kpi-icon">⚖️</div>
      <div class="kpi-label">Kg vendidos${ultimaPesada?' hasta pesada':''}</div>
      <div class="kpi-val">${fn(kgVendHP,0)}</div>
      <div class="kpi-sub">${ultimaPesada?`hasta ${fd(ultimaPesada.fecha)}`:'kg totales egresados'}</div>
    </div>
    <div class="kpi">
      <div class="kpi-icon">🐄</div>
      <div class="kpi-label">Kg en pesada</div>
      <div class="kpi-val">${fn(kgStockPesada,0)}</div>
      <div class="kpi-sub">${ultimaPesada?`${fn(ultimaPesada.cant,0)} anim. × ${fn(ultimaPesada.kg,1)} kg`:`${stk} anim. × prom. ingreso`}</div>
    </div>
    <div class="kpi" style="border-top:2px solid var(--green)">
      <div class="kpi-icon">📊</div>
      <div class="kpi-label">Kg ganados${ultimaPesada?' (hasta pesada)':''}</div>
      <div class="kpi-val kpi-pos">${fn(kgG,0)}</div>
      <div class="kpi-sub">${ultimaPesada&&kgPromIngC>0?fn(Number(ultimaPesada.kg)-kgPromIngC,1)+' kg gan./animal':'sin pesadas'}</div>
    </div>
  </div>`;

  // ── Comprobación kg ───────────────────────────────────────────────────────
  h += `<div style="background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:9px 14px;margin-bottom:10px;font-size:13px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
    <span style="font-weight:600">🔍 Comprobación${ultimaPesada?` hasta ${fd(ultimaPesada.fecha)}`:''}:</span>
    <span style="color:var(--text2)">${fn(kgVendHP,0)} vend. + ${fn(kgStockPesada,0)} stock pesada − ${fn(kgI,0)} ing.</span>
    <span style="font-weight:700;color:var(--green)">= ${fn(kgG,0)} kg ganados</span>
    ${!ultimaPesada?`<span style="color:var(--text3);font-size:11px">· sin pesada, usa kg prom. ingreso</span>`:''}
  </div>`;

  // ── FILA 4: eficiencia + break-even ──────────────────────────────────────
  const costoARecuperar = costoTotal - ivVentas;
  const kgTotalSalida = kgStock;
  const breakEven = kgTotalSalida > 0 ? costoARecuperar / kgTotalSalida : null;
  const margenVsBreakEven = breakEven && precioVentaProm > 0 ? precioVentaProm - breakEven : null;

  h += `<div class="kpi-grid" style="margin-bottom:18px">
    <div class="kpi">
      <div class="kpi-icon">💹</div>
      <div class="kpi-label">Precio de venta prom.</div>
      <div class="kpi-val">${kgV>0?fmon(precioVentaProm):'—'}</div>
      <div class="kpi-sub">${S.moneda==='USD'?'U$S':'$'} por kg vendido</div>
    </div>
    <div class="kpi" style="border-top:2px solid var(--green)">
      <div class="kpi-icon">📈</div>
      <div class="kpi-label">Ganancia diaria real</div>
      <div class="kpi-val kpi-pos">${ganDiariaReal!==null?fn(ganDiariaReal,3)+' kg/día':'—'}</div>
      <div class="kpi-sub">${fechaInicioC&&ultimaPesada?`desde ${fd(fechaInicioC)} hasta ${fd(ultimaPesada.fecha)}`:'sin pesadas'}</div>
    </div>
    <div class="kpi">
      <div class="kpi-icon">🌾</div>
      <div class="kpi-label">Alim. hasta pesada / kg ganado</div>
      <div class="kpi-val">${kgG>0?fmon(caXkgG):'—'}</div>
      <div class="kpi-sub">${fmon(caHastaP)} ÷ ${fn(kgG,0)} kg${fUltPesada?` · hasta ${fd(fUltPesada)}`:''}</div>
    </div>
    <div class="kpi">
      <div class="kpi-icon">🐮</div>
      <div class="kpi-label">Alim. hasta pesada / animal</div>
      <div class="kpi-val">${totalAnimales>0?fmon(caXAnimal):'—'}</div>
      <div class="kpi-sub">vendidos + stock (${fn(totalAnimales,0)} cab.)</div>
    </div>
    <div class="kpi" style="border-top:2px solid ${margenNeto>=0?'var(--green)':'var(--red)'}">
      <div class="kpi-icon">📐</div>
      <div class="kpi-label">Margen neto / kg vendido</div>
      <div class="kpi-val ${margenNeto>=0?'kpi-pos':'kpi-neg'}">${kgV>0?fmon(margenNeto):'—'}</div>
      <div class="kpi-sub">utilidad por kg</div>
    </div>
  </div>`;

  // ── BREAK-EVEN ────────────────────────────────────────────────────────────
  h += `<div style="background:var(--bg2);border:0.5px solid var(--border2);border-radius:8px;padding:12px 16px;margin-bottom:16px">
    <div style="font-size:13px;font-weight:600;margin-bottom:10px">🎯 Precio mínimo de venta (break-even)</div>
    <div class="kpi-grid" style="margin-bottom:0">
      <div class="kpi" style="border-top:2px solid ${breakEven&&precioVentaProm>0&&precioVentaProm>=breakEven?'var(--green)':'var(--red)'}">
        <div class="kpi-icon">⚖️</div>
        <div class="kpi-label">Precio mínimo / kg stock</div>
        <div class="kpi-val ${breakEven&&precioVentaProm>0&&precioVentaProm<breakEven?'kpi-neg':''}">
          ${breakEven!==null?fmon(breakEven):'—'}
        </div>
        <div class="kpi-sub">para recuperar el costo total</div>
      </div>
      <div class="kpi">
        <div class="kpi-icon">💲</div>
        <div class="kpi-label">Costo aún a recuperar</div>
        <div class="kpi-val">${fmon(costoARecuperar)}</div>
        <div class="kpi-sub">costo total − ingresos ya obtenidos</div>
      </div>
      <div class="kpi">
        <div class="kpi-icon">🐄</div>
        <div class="kpi-label">Kg disponibles para vender</div>
        <div class="kpi-val">${fn(kgStock,0)} kg</div>
        <div class="kpi-sub">${fn(stk,0)} anim. × última pesada</div>
      </div>
      ${margenVsBreakEven!==null?`
      <div class="kpi" style="border-top:2px solid ${margenVsBreakEven>=0?'var(--green)':'var(--red)'}">
        <div class="kpi-icon">${margenVsBreakEven>=0?'✅':'❌'}</div>
        <div class="kpi-label">Precio actual vs mínimo</div>
        <div class="kpi-val ${margenVsBreakEven>=0?'kpi-pos':'kpi-neg'}">${margenVsBreakEven>=0?'+':''}${fmon(margenVsBreakEven)}/kg</div>
        <div class="kpi-sub">${margenVsBreakEven>=0?'Por encima del break-even':'Por debajo del break-even'}</div>
      </div>`:'<div class="kpi"><div class="kpi-sub" style="padding-top:16px;color:var(--text3)">Registrá ventas para ver la comparación</div></div>'}
    </div>
  </div>`;

  // ── Tabla resumen de costos ───────────────────────────────────────────────
  h += `<div class="section-label">Resumen de costos — ${cor.nombre}</div>
  <div class="tw"><table class="data-table"><thead><tr>
    <th>Concepto</th><th class="thc">Importe</th><th class="thc">% del costo total</th><th class="thc">${S.moneda==='USD'?'U$S':'$'} / kg*</th>
  </tr></thead><tbody>
    <tr><td>🛒 Costo de compra de animales</td><td class="tdc"><strong>${fmon(cc)}</strong></td><td class="tdc">${pct(cc,costoTotal)}</td><td class="tdc">${kgI>0?fmon(cc/kgI):'—'} <span style="color:var(--text3);font-size:10px">/ kg ingresado</span></td></tr>`;

  ALIMENTOS.forEach(a => {
    const subTot = S.consumos.filter(x=>x.cid===cid&&x.tipo===a.key).reduce((s,x)=>s+Number(x.cant)*Number(x.precio),0);
    const subHP  = S.consumos.filter(x=>x.cid===cid&&x.tipo===a.key&&(!fUltPesada||x.fecha<=fUltPesada)).reduce((s,x)=>s+Number(x.cant)*Number(x.precio),0);
    const cantTot= cantAlim(cid, a.key);
    const cantHP = S.consumos.filter(x=>x.cid===cid&&x.tipo===a.key&&(!fUltPesada||x.fecha<=fUltPesada)).reduce((s,x)=>s+Number(x.cant),0);
    if (subTot > 0 || cantTot > 0) {
      // Siempre mostrar parcial / total para ser consistente (aunque sean iguales)
      const cantLabel = fUltPesada
        ? `${fn(cantHP,1)} ${a.unidad} <span style="color:var(--text3);font-size:11px">/ ${fn(cantTot,1)} total</span>`
        : `${fn(cantTot,1)} ${a.unidad}`;
      const importeLabel = fUltPesada
        ? `${fmon(subHP)} <span style="color:var(--text3);font-size:11px">/ ${fmon(subTot)} total</span>`
        : fmon(subTot);
      h += `<tr><td>&nbsp;&nbsp;&nbsp;${a.icon} ${a.label} <span style="color:var(--text3);font-size:12px">(${cantLabel})</span></td><td class="tdc">${importeLabel}</td><td class="tdc">${pct(subHP,costoTotal)}</td><td class="tdc">${kgG>0?fmon(subHP/kgG):'—'}</td></tr>`;
    }
  });
  h += `<tr><td>&nbsp;&nbsp;&nbsp;<strong>Subtotal alimentación${fUltPesada?' hasta pesada':''}</strong></td><td class="tdc"><strong>${fmon(caHastaP)}${fUltPesada?` <span style="color:var(--text3);font-size:11px">/ ${fmon(ca)} total</span>`:''}</strong></td><td class="tdc">${pct(caHastaP,costoTotal)}</td><td class="tdc"><strong>${kgG>0?fmon(caHastaP/kgG):'—'}</strong></td></tr>`;
  h += `<tr class="total-row"><td><strong>COSTO TOTAL (sin vet.)</strong></td><td class="tdc"><strong>${fmon(cc+caHastaP)}${fUltPesada?` <span style="color:var(--text3);font-size:11px">/ ${fmon(costoTotal)} total</span>`:''}</strong></td><td class="tdc">100%</td><td class="tdc">—</td></tr>`;
  if (costoVet>0) {
    h += `<tr style="background:#f5f0ff"><td>🩺 Veterinaria${fUltPesada?' hasta pesada':''}</td><td class="tdc" style="color:#9b59b6"><strong>${fmon(costoVetHP)}${fUltPesada?` <span style="color:var(--text3);font-size:11px">/ ${fmon(costoVet)} total</span>`:''}</strong></td><td class="tdc" style="color:#9b59b6">${pct(costoVetHP,costoTotal+costoVetHP)}</td><td class="tdc" style="color:#9b59b6">${kgG>0?fmon(costoVetHP/kgG):'—'}</td></tr>`;
    h += `<tr class="total-row" style="background:#e8d5f5"><td><strong>COSTO TOTAL (con vet.)</strong></td><td class="tdc"><strong>${fmon(cc+caHastaP+costoVetHP)}</strong></td><td class="tdc">—</td><td class="tdc"><strong>${kgG>0?fmon((cc+caHastaP+costoVetHP)/kgG):'—'}</strong></td></tr>`;
  }
  h += `</tbody></table></div>`;
  if (fUltPesada) h += `<div style="font-size:11px;color:var(--text3);margin-top:4px">* $ / kg: compra = por kg ingresado; alimentación y vet. = por kg ganado al corte de la última pesada (${fd(fUltPesada)}). Total acumulado en gris.</div>`;

  return h;
}


function buildComparacion() {
  // Para cada corral calculamos todos los indicadores
  const rows = CORRALES.map(c => {
    const cid = c.id;
    const ing     = totIng(cid);
    const stk     = stockNow(cid);
    const vend    = ing - stk;
    const kgI     = kgIngresados(cid);
    const kgV     = kgVend(cid);
    const kgG     = kgGanadosHastaPesada(cid); // consistente: hasta última pesada
    const kgStk   = kgStockEstimado(cid);
    const cc      = costoCompra(cid);
    const ca      = costoAlim(cid);
    const caHP    = costoAlimHastaPesada(cid); // hasta última pesada
    const fPes    = fechaUltimaPesada(cid);
    const costoTotal = cc + ca;

    // Costo por alimento (total y hasta pesada)
    const costoAlim_item = {};
    const costoAlim_itemHP = {};
    ALIMENTOS.forEach(a => {
      costoAlim_item[a.key] = S.consumos
        .filter(x => x.cid===cid && x.tipo===a.key)
        .reduce((s,x) => s + Number(x.cant)*Number(x.precio), 0);
      costoAlim_itemHP[a.key] = S.consumos
        .filter(x => x.cid===cid && x.tipo===a.key && (!fPes||x.fecha<=fPes))
        .reduce((s,x) => s + Number(x.cant)*Number(x.precio), 0);
    });

    // Indicadores por kg ganado — consistente con caHP (mismo corte de pesada)
    const ccXkg   = kgG > 0 ? cc / kgG : null;
    const caXkg   = kgG > 0 ? caHP / kgG : null;
    const totXkg  = kgG > 0 ? (cc + caHP) / kgG : null;

    // Indicadores por animal
    const totalAnim = vend + stk;
    const ccXan   = totalAnim > 0 ? cc / totalAnim : null;
    const caXan   = totalAnim > 0 ? caHP / totalAnim : null;

    // Precio e ingresos
    const stkP    = Number((S.preciosStock||{})[cid]||0);
    const pes     = (S.pesadas||[]).filter(p=>p.cid===cid).sort((a,b)=>a.fecha.localeCompare(b.fecha));
    const kgPesUlt = pes.length ? Number(pes[pes.length-1].kg) : 0;
    const ivStock  = stkP>0&&kgPesUlt>0 ? stk*kgPesUlt*stkP : 0;
    const ivVentas = ingVentas(cid);
    const ivTotal  = ivVentas + ivStock;
    const util     = ivTotal - costoTotal;
    const precVentaProm = kgV > 0 ? ivVentas/kgV : null;
    const margenXkg = kgG > 0 ? util/kgG : null;

    // Ganancia diaria real: desde ingreso hasta última pesada
    const ings = S.ingresos.filter(i => i.cid===cid);
    const fechaInicio = ings.length ? ings.map(i=>i.fecha).sort()[0] : null;
    const kgPromIng = ing > 0 ? kgI/ing : 0;
    let ganDiaria = null;
    if (pes.length && fechaInicio) {
      const ultima = pes[pes.length-1];
      const dias = Math.round((new Date(ultima.fecha)-new Date(fechaInicio))/86400000);
      if (dias > 0) ganDiaria = (Number(ultima.kg) - kgPromIng) / dias;
    }

    const cv    = costoVetTotal(cid);
    const cvHP  = costoVetHastaPesada(cid);
    const cvXkg = kgG > 0 ? cvHP / kgG : null;
    const utilConVet = ivTotal - costoTotal - cv;
    return { c, cid, ing, stk, vend, kgI, kgV, kgG, kgStk,
             cc, ca, caHP, costoTotal, costoAlim_item, costoAlim_itemHP,
             ccXkg, caXkg, totXkg, ccXan, caXan,
             cv, cvHP, cvXkg, utilConVet,
             ivVentas, ivStock, ivTotal, util,
             precVentaProm, margenXkg, ganDiaria, kgPromIng, kgPesUlt };  });

  const best = (arr, fn, lowerIsBetter=false) => {
    const vals = arr.map(fn).filter(v => v !== null && v > 0);
    if (!vals.length) return null;
    return lowerIsBetter ? Math.min(...vals) : Math.max(...vals);
  };

  const bestCcXkg  = best(rows, r => r.ccXkg,  true);
  const bestCaXkg  = best(rows, r => r.caXkg,  true);

  const bestGanD   = best(rows, r => r.ganDiaria);
  const bestKgG    = best(rows, r => r.kgG);
  const bestUtil   = best(rows, r => r.util);
  const bestMargen = best(rows, r => r.margenXkg);

  const tag = (val, best, lowerBetter=false) => {
    if (val === null || best === null) return '';
    const isB = lowerBetter ? val === best : val === best;
    return isB ? ' style="color:var(--green);font-weight:700"' : '';
  };

  let h = `<div class="section-label">Comparativa de eficiencia entre corrales</div>`;

  // ── Tabla principal ───────────────────────────────────────────────────────
  h += `<div class="tw"><table class="data-table"><thead><tr>
    <th>Indicador</th>
    ${rows.map(r=>`<th class="thc">${r.c.nombre}</th>`).join('')}
  </tr></thead><tbody>`;

  const row = (label, fn, fmt, lowerBetter=false, best=null) => {
    const vals = rows.map(fn);
    const b = best !== null ? best : (() => {
      const ns = vals.filter(v=>v!==null&&v>0);
      if (!ns.length) return null;
      return lowerBetter ? Math.min(...ns) : Math.max(...ns);
    })();
    return `<tr><td>${label}</td>${vals.map(v =>
      `<td class="tdc"${tag(v,b,lowerBetter)}>${v!==null&&v>0?fmt(v):'—'}</td>`
    ).join('')}</tr>`;
  };

  // Animales
  h += `<tr class="total-row"><td colspan="${rows.length+1}"><strong>📦 Stock y movimiento</strong></td></tr>`;
  h += `<tr><td>Animales ingresados</td>${rows.map(r=>`<td class="tdc">${fn(r.ing,0)}</td>`).join('')}</tr>`;
  h += `<tr><td>Animales vendidos</td>${rows.map(r=>`<td class="tdc">${fn(r.vend,0)}</td>`).join('')}</tr>`;
  h += `<tr><td>Stock actual</td>${rows.map(r=>`<td class="tdc">${fn(r.stk,0)}</td>`).join('')}</tr>`;
  h += `<tr><td>Días en corral</td>${rows.map(r => {
    const ings = S.ingresos.filter(i=>i.cid===r.cid);
    const fi = ings.length ? ings.map(i=>i.fecha).sort()[0] : null;
    const dias = fi ? Math.round((new Date() - new Date(fi))/86400000) : null;
    const tieneVentas = r.vend > 0;
    const label = dias !== null ? `${dias} días` : '—';
    const badge = !tieneVentas ? ` <span style="font-size:10px;color:var(--text3);font-style:italic">(sin ventas)</span>` : '';
    return `<td class="tdc">${label}${badge}</td>`;
  }).join('')}</tr>`;
  h += `<tr><td>Kg prom. ingreso</td>${rows.map(r=>`<td class="tdc">${fn(r.kgPromIng,1)} kg</td>`).join('')}</tr>`;
  h += `<tr><td>Kg prom. última pesada</td>${rows.map(r=>`<td class="tdc">${r.kgPesUlt>0?fn(r.kgPesUlt,1)+' kg':'—'}</td>`).join('')}</tr>`;

  // Kg
  h += `<tr class="total-row"><td colspan="${rows.length+1}"><strong>⚖️ Kilos</strong></td></tr>`;
  h += `<tr><td>Kg ingresados</td>${rows.map(r=>`<td class="tdc">${fn(r.kgI,0)} kg</td>`).join('')}</tr>`;
  h += `<tr><td>Kg vendidos</td>${rows.map(r=>`<td class="tdc">${fn(r.kgV,0)} kg</td>`).join('')}</tr>`;
  h += `<tr><td>Kg en stock</td>${rows.map(r=>`<td class="tdc">${fn(r.kgStk,0)} kg</td>`).join('')}</tr>`;
  h += `<tr><td style="color:var(--green);font-weight:600">Kg ganados (engorde)</td>${rows.map(r=>`<td class="tdc"${tag(r.kgG,bestKgG)}>${fn(r.kgG,0)} kg</td>`).join('')}</tr>`;
  h += `<tr><td>Ganancia diaria / animal</td>${rows.map(r=>`<td class="tdc"${tag(r.ganDiaria,bestGanD)}>${r.ganDiaria!==null?fn(r.ganDiaria,3)+' kg/día':'—'}</td>`).join('')}</tr>`;

  // Costos
  h += `<tr class="total-row"><td colspan="${rows.length+1}"><strong>💲 Costos totales</strong></td></tr>`;
  h += `<tr><td>Costo de compra</td>${rows.map(r=>`<td class="tdc">${fmon(r.cc)}</td>`).join('')}</tr>`;
  h += `<tr><td>Costo alimentación total</td>${rows.map(r=>`<td class="tdc">${fmon(r.ca)}</td>`).join('')}</tr>`;
  ALIMENTOS.forEach(a => {
    const anyHas = rows.some(r => r.costoAlim_item[a.key] > 0);
    if (!anyHas) return;
    const vals = rows.map(r => r.costoAlim_item[a.key]);
    h += `<tr><td>&nbsp;&nbsp;&nbsp;${a.icon} ${a.label}</td>${vals.map(v=>`<td class="tdc">${v>0?fmon(v):'—'}</td>`).join('')}</tr>`;
  });
  h += `<tr><td><strong>Costo total</strong></td>${rows.map(r=>`<td class="tdc"><strong>${fmon(r.costoTotal)}</strong></td>`).join('')}</tr>`;

  // Costo por kg ganado
  h += `<tr class="total-row"><td colspan="${rows.length+1}"><strong>📊 Costo por kg ganado</strong></td></tr>`;
  h += `<tr><td>Costo compra / kg ganado</td>${rows.map(r=>`<td class="tdc"${tag(r.ccXkg,bestCcXkg,true)}>${r.ccXkg!==null?fmon(r.ccXkg):'—'}</td>`).join('')}</tr>`;
  h += `<tr><td>Costo alim. total / kg ganado</td>${rows.map(r=>`<td class="tdc"${tag(r.caXkg,bestCaXkg,true)}>${r.caXkg!==null?fmon(r.caXkg):'—'}</td>`).join('')}</tr>`;
  ALIMENTOS.forEach(a => {
    const anyHas = rows.some(r => r.costoAlim_item[a.key] > 0);
    if (!anyHas) return;
    const vals = rows.map(r => r.kgG > 0 && r.costoAlim_itemHP[a.key] > 0 ? r.costoAlim_itemHP[a.key]/r.kgG : null);
    const b = vals.filter(v=>v!==null).length ? Math.min(...vals.filter(v=>v!==null)) : null;
    h += `<tr><td>&nbsp;&nbsp;&nbsp;${a.icon} ${a.label} / kg ganado</td>${vals.map(v=>`<td class="tdc"${tag(v,b,true)}>${v!==null?fmon(v):'—'}</td>`).join('')}</tr>`;
  });


  const anyVet = rows.some(r=>r.cv>0);
  if (anyVet) {
    const bestCvXkg = best(rows, r=>r.cvXkg, true);
    h += `<tr class="total-row" style="background:#e8d5f5"><td colspan="${rows.length+1}"><strong>🩺 Veterinaria</strong></td></tr>`;
    h += `<tr><td>Costo vet. total</td>${rows.map(r=>`<td class="tdc" style="color:#9b59b6">${r.cv>0?fmon(r.cv):'—'}</td>`).join('')}</tr>`;
    h += `<tr><td>Costo vet. / kg ganado</td>${rows.map(r=>`<td class="tdc"${r.cvXkg!==null?tag(r.cvXkg,bestCvXkg,true):''} style="color:#9b59b6">${r.cvXkg!==null?fmon(r.cvXkg):'—'}</td>`).join('')}</tr>`;
  }
  // Ingresos y resultado
  h += `<tr class="total-row"><td colspan="${rows.length+1}"><strong>💰 Ingresos y resultado</strong></td></tr>`;
  h += `<tr><td>Ingreso por ventas</td>${rows.map(r=>`<td class="tdc">${fmon(r.ivVentas)}</td>`).join('')}</tr>`;
  h += `<tr><td>Stock valorizado</td>${rows.map(r=>`<td class="tdc">${r.ivStock>0?fmon(r.ivStock):'—'}</td>`).join('')}</tr>`;
  h += `<tr><td>Ingresos totales</td>${rows.map(r=>`<td class="tdc">${fmon(r.ivTotal)}</td>`).join('')}</tr>`;
  h += `<tr><td>Precio venta prom. / kg</td>${rows.map(r=>`<td class="tdc">${r.precVentaProm!==null?fmon(r.precVentaProm):'—'}</td>`).join('')}</tr>`;
  h += `<tr><td style="color:var(--green);font-weight:600">Utilidad neta (sin vet.)</td>${rows.map(r=>`<td class="tdc"${tag(r.util,bestUtil)} style="${r.util<0?'color:var(--red)':''}">${fmon(r.util)}</td>`).join('')}</tr>`;
  if (anyVet) {
    const bestUtilCV = best(rows, r=>r.utilConVet);
    h += `<tr><td style="color:#9b59b6;font-weight:600">Utilidad neta (con vet.)</td>${rows.map(r=>`<td class="tdc"${tag(r.utilConVet,bestUtilCV)} style="${r.utilConVet<0?'color:var(--red)':'color:#9b59b6'}">${fmon(r.utilConVet)}</td>`).join('')}</tr>`;
  }
  h += `<tr><td>Margen / kg ganado</td>${rows.map(r=>`<td class="tdc"${tag(r.margenXkg,bestMargen)}>${r.margenXkg!==null?fmon(r.margenXkg):'—'}</td>`).join('')}</tr>`;

  h += `</tbody></table></div>`;
  h += `<div style="font-size:11px;color:var(--text3);margin-top:6px;line-height:1.6">
    Los valores en <span style="color:var(--green);font-weight:700">verde</span> indican el mejor resultado entre corrales para ese indicador.
    Los indicadores de <strong>costo / kg ganado</strong> usan el costo de alimentación hasta la última pesada de cada corral.<br>
    ⚠️ <strong>El "Margen / kg ganado" no es comparable entre corrales en distintas etapas del proceso.</strong>
    Un corral joven o sin ventas realizadas aún tiene pocos kg ganados acumulados, lo que puede inflar o distorsionar este ratio.
    Para una comparación válida, considerar también los días en corral y si el lote ya tiene ventas realizadas.
  </div>`;

  return h;
}


function buildProyeccion() {
  let h = `<div class="section-label">Proyección de salida por corral</div>`;

  CORRALES.forEach(c => {
    const cid = c.id;
    const ings = S.ingresos.filter(i => i.cid === cid);
    const list = (S.pesadas||[]).filter(p => p.cid === cid).sort((a,b) => a.fecha.localeCompare(b.fecha));
    const stk  = stockNow(cid);

    const totalIngCant = ings.reduce((s,i)=>s+Number(i.cant),0);
    const kgPromIng    = totalIngCant > 0 ? ings.reduce((s,i)=>s+Number(i.cant)*Number(i.kg),0)/totalIngCant : 0;
    const fechaInicio  = ings.length ? ings.map(i=>i.fecha).sort()[0] : null;
    const diasEnCorral = fechaInicio ? Math.round((new Date()-new Date(fechaInicio))/86400000) : null;

    const pesoObj  = Number((S.pesoObjetivo||{})[cid] || 520);
    const precioP  = Number((S.precioProyectado||{})[cid] || 0);
    const ultima   = list.length ? list[list.length-1] : null;
    const kgActual = ultima ? Number(ultima.kg) : null;

    // Ganancia diaria: entre las dos últimas pesadas si hay más de una,
    // sino desde el ingreso hasta la única pesada
    let ganDiaria = null;
    let ganDiariaDesc = '';
    if (list.length >= 2) {
      const penultima = list[list.length-2];
      const diasEntre = Math.round((new Date(ultima.fecha)-new Date(penultima.fecha))/86400000);
      if (diasEntre > 0) {
        ganDiaria = (Number(ultima.kg) - Number(penultima.kg)) / diasEntre;
        ganDiariaDesc = `entre pesadas ${fd(penultima.fecha)} → ${fd(ultima.fecha)}`;
      }
    } else if (ultima && fechaInicio) {
      const diasUlt = Math.round((new Date(ultima.fecha)-new Date(fechaInicio))/86400000);
      if (diasUlt > 0 && kgPromIng > 0) {
        ganDiaria = (Number(ultima.kg) - kgPromIng) / diasUlt;
        ganDiariaDesc = `desde ingreso hasta ${fd(ultima.fecha)}`;
      }
    }

    const yaAlcanzo    = kgActual !== null && kgActual >= pesoObj;
    const diasRestantes = (!yaAlcanzo && ganDiaria && ganDiaria > 0 && kgActual !== null)
      ? Math.ceil((pesoObj - kgActual) / ganDiaria) : null;
    const fechaSalida  = (diasRestantes !== null && ultima) ? (() => {
      const d = new Date(ultima.fecha);
      d.setDate(d.getDate() + diasRestantes);
      return d.toISOString().slice(0,10);
    })() : null;

    // Color del borde según estado
    const borderColor = yaAlcanzo ? 'var(--green)' : (diasRestantes !== null ? 'var(--blue)' : 'var(--border2)');

    h += `<div class="card" style="border-left:4px solid ${borderColor};margin-bottom:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:14px">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:18px">🏚️</span>
          <div>
            <div style="font-size:15px;font-weight:600">${c.nombre}</div>
            <div style="font-size:12px;color:var(--text2)">${fn(stk,0)} animales en stock${diasEnCorral!==null?' · '+diasEnCorral+' días en corral':''}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span style="font-size:12px;color:var(--text2)">Peso objetivo:</span>
          <input type="number" id="peso-obj-${cid}" value="${pesoObj}" min="1" step="1"
            style="width:90px;padding:4px 8px;border:1px solid var(--border2);border-radius:6px;background:var(--bg);color:var(--text);font-size:13px;font-weight:600">
          <span style="font-size:12px;color:var(--text2)">kg &nbsp;·&nbsp; Precio estimado:</span>
          <input type="number" id="precio-proy-${cid}" value="${precioP||''}" placeholder="$ / kg" min="0" step="1"
            style="width:110px;padding:4px 8px;border:1px solid var(--border2);border-radius:6px;background:var(--bg);color:var(--text);font-size:13px;font-weight:600">
          <span style="font-size:12px;color:var(--text2)">$/kg</span>
          <button class="btn btn-primary" id="btn-peso-obj-${cid}" data-cid="${cid}" style="padding:4px 12px;font-size:12px">✓</button>
        </div>
      </div>`;

    if (!ultima) {
      h += `<div class="alert alert-r" style="margin:0">Sin pesadas registradas. Registrá al menos una pesada para calcular la proyección.</div>`;
    } else if (yaAlcanzo) {
      h += `<div style=\"background:var(--green-bg);border:0.5px solid #5DCAA5;border-radius:8px;padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:14px\">
        <span style=\"font-size:26px\">✅</span>
        <div>
          <div style=\"font-size:14px;font-weight:700;color:var(--green-text)\">¡Peso objetivo alcanzado!</div>
          <div style=\"font-size:12px;color:var(--green-text);margin-top:2px\">Promedio actual <strong>${fn(kgActual,1)} kg</strong> — objetivo ${fn(pesoObj,0)} kg. Lote listo para salida.</div>
        </div>
      </div>
      <div class=\"kpi-grid\">
        <div class=\"kpi\" style=\"border-top:2px solid var(--green)\">
          <div class=\"kpi-icon\">⚖️</div>
          <div class=\"kpi-label\">Peso promedio actual</div>
          <div class=\"kpi-val\">${fn(kgActual,1)} kg/animal</div>
          <div class=\"kpi-sub\">última pesada ${fd(ultima.fecha)}</div>
        </div>
        <div class=\"kpi\" style=\"border-top:2px solid var(--green)\">
          <div class=\"kpi-icon\">🐄</div>
          <div class=\"kpi-label\">Kg totales a vender</div>
          <div class=\"kpi-val\">${fn(stk*kgActual,0)} kg</div>
          <div class=\"kpi-sub\">${fn(stk,0)} animales × ${fn(kgActual,1)} kg</div>
        </div>
        ${precioP>0?`
        <div class=\"kpi\" style=\"border-top:2px solid var(--green)\">
          <div class=\"kpi-icon\">💵</div>
          <div class=\"kpi-label\">Ingreso proyectado</div>
          <div class=\"kpi-val kpi-pos\">${fmon(stk*kgActual*precioP)}</div>
          <div class=\"kpi-sub\">${fn(stk,0)} × ${fn(kgActual,1)} kg × ${fmon(precioP)}/kg</div>
        </div>`:`
        <div class=\"kpi\" style=\"border-top:2px solid var(--border2)\">
          <div class=\"kpi-icon\">💵</div>
          <div class=\"kpi-label\">Ingreso proyectado</div>
          <div class=\"kpi-val\" style=\"color:var(--text2);font-size:14px\">Ingresá precio estimado →</div>
          <div class=\"kpi-sub\">completá el campo $/kg arriba</div>
        </div>`}
      </div>`;
    } else if (diasRestantes !== null) {
      h += `<div class="kpi-grid">
        <div class="kpi" style="border-top:2px solid var(--green)">
          <div class="kpi-icon">📅</div>
          <div class="kpi-label">Fecha estimada de salida</div>
          <div class="kpi-val kpi-pos" style="font-size:18px">${fd(fechaSalida)}</div>
          <div class="kpi-sub">en ${diasRestantes} días</div>
        </div>
        <div class="kpi">
          <div class="kpi-icon">⚖️</div>
          <div class="kpi-label">Peso actual → objetivo</div>
          <div class="kpi-val" style="font-size:17px">${fn(kgActual,1)} → ${fn(pesoObj,0)} kg</div>
          <div class="kpi-sub">faltan ${fn(pesoObj-kgActual,1)} kg / animal</div>
        </div>
        <div class="kpi">
          <div class="kpi-icon">📈</div>
          <div class="kpi-label">Ganancia diaria</div>
          <div class="kpi-val">${fn(ganDiaria,3)} kg/día/animal</div>
          <div class="kpi-sub">${ganDiariaDesc}</div>
        </div>
        <div class="kpi">
          <div class="kpi-icon">🐄</div>
          <div class="kpi-label">Kg totales al vender</div>
          <div class="kpi-val">${fn(stk*pesoObj,0)} kg</div>
          <div class="kpi-sub">${fn(stk,0)} animales × ${fn(pesoObj,0)} kg</div>
        </div>
        ${precioP>0?`
        <div class="kpi" style="border-top:2px solid var(--green)">
          <div class="kpi-icon">💵</div>
          <div class="kpi-label">Ingreso proyectado</div>
          <div class="kpi-val kpi-pos">${fmon(stk*pesoObj*precioP)}</div>
          <div class="kpi-sub">${fn(stk,0)} × ${fn(pesoObj,0)} kg × ${fmon(precioP)}/kg</div>
        </div>`:''}
      </div>`;
    } else {
      h += `<div class="alert alert-r" style="margin:0">No se puede calcular la proyección. Verificá que haya al menos una pesada con ganancia diaria positiva.</div>`;
    }

    h += `</div>`;
  });

  h += `<div style="font-size:11px;color:var(--text3);margin-top:4px">⚠ La proyección usa la ganancia diaria calculada desde el primer ingreso hasta la última pesada de cada corral. Se actualiza automáticamente al registrar nuevas pesadas.</div>`;
  return h;
}

function buildCostoCierre() {
  const hoy = today();

  // Función auxiliar: calcula fecha de salida proyectada igual que buildProyeccion
  function fechaSalidaCorral(cid) {
    const ings  = S.ingresos.filter(i => i.cid === cid);
    const list  = (S.pesadas||[]).filter(p => p.cid === cid).sort((a,b) => a.fecha.localeCompare(b.fecha));
    const pesoObj = Number((S.pesoObjetivo||{})[cid] || 520);
    if (!list.length) return null;
    const ultima = list[list.length-1];
    const kgActual = Number(ultima.kg);
    if (kgActual >= pesoObj) return null; // ya listo
    let ganDiaria = null;
    if (list.length >= 2) {
      const pen = list[list.length-2];
      const d = Math.round((new Date(ultima.fecha)-new Date(pen.fecha))/86400000);
      if (d > 0) ganDiaria = (Number(ultima.kg) - Number(pen.kg)) / d;
    } else {
      const totalIngCant = ings.reduce((s,i)=>s+Number(i.cant),0);
      const kgPromIng = totalIngCant > 0 ? ings.reduce((s,i)=>s+Number(i.cant)*Number(i.kg),0)/totalIngCant : 0;
      const fechaInicio = ings.length ? ings.map(i=>i.fecha).sort()[0] : null;
      if (fechaInicio) {
        const d = Math.round((new Date(ultima.fecha)-new Date(fechaInicio))/86400000);
        if (d > 0 && kgPromIng > 0) ganDiaria = (kgActual - kgPromIng) / d;
      }
    }
    if (!ganDiaria || ganDiaria <= 0) return null;
    const diasRestantes = Math.ceil((pesoObj - kgActual) / ganDiaria);
    const d = new Date(ultima.fecha);
    d.setDate(d.getDate() + diasRestantes);
    return d.toISOString().slice(0,10);
  }

  let h = `<div class="section-label">Costo proyectado al cierre por corral</div>`;

  let totCostoAcum=0, totCostoProyect=0, totCostoTotal=0;

  CORRALES.forEach(c => {
    const cid = c.id;
    const stk = stockNow(cid);
    const pesoObj = Number((S.pesoObjetivo||{})[cid] || 520);

    // Fecha de salida proyectada
    const fSalida = fechaSalidaCorral(cid);
    const list = (S.pesadas||[]).filter(p => p.cid === cid).sort((a,b) => a.fecha.localeCompare(b.fecha));
    const ultima = list.length ? list[list.length-1] : null;

    // Días que faltan desde hoy hasta la salida
    const diasHastaSalida = fSalida ? Math.max(0, Math.round((new Date(fSalida)-new Date(hoy))/86400000)) : null;

    // Costo de alimentación acumulado total (lo que ya se gastó)
    const caAcum = costoAlim(cid);

    // Costo diario promedio de los últimos 30 días
    const hace30 = new Date(hoy); hace30.setDate(hace30.getDate()-30);
    const fecha30 = hace30.toISOString().slice(0,10);
    const consumosUlt30 = S.consumos.filter(x => x.cid===cid && x.fecha >= fecha30);
    const costoUlt30 = consumosUlt30.reduce((s,x)=>s+Number(x.cant)*Number(x.precio),0);
    const costoDiario = costoUlt30 / 30;

    // Costo proyectado desde hoy hasta la salida
    const costoProyect = diasHastaSalida !== null ? Math.round(costoDiario * diasHastaSalida) : null;

    // Costo total proyectado al cierre = acumulado + proyectado
    const costoTotalCierre = costoProyect !== null ? caAcum + costoProyect : null;

    // Costo de compra
    const cc = costoCompra(cid);
    const costoTotalFinal = costoTotalCierre !== null ? cc + costoTotalCierre : null;

    // Ingresos proyectados = stk * pesoObj * precioStock
    const stkP = Number((S.preciosStock||{})[cid]||0);
    const ivProyect = stkP > 0 ? stk * pesoObj * stkP : null;
    const ivVentasYa = ingVentas(cid);
    const ivTotal = ivProyect !== null ? ivVentasYa + ivProyect : null;
    const utilProyect = (ivTotal !== null && costoTotalFinal !== null) ? ivTotal - costoTotalFinal : null;

    if (costoProyect !== null) { totCostoAcum += caAcum; totCostoProyect += costoProyect; totCostoTotal += costoTotalCierre; }

    const borderColor = utilProyect !== null ? (utilProyect >= 0 ? 'var(--green)' : 'var(--red)') : 'var(--border2)';

    h += `<div class="card" style="border-left:4px solid ${borderColor};margin-bottom:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:14px">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:18px">🏚️</span>
          <div>
            <div style="font-size:15px;font-weight:600">${c.nombre}</div>
            <div style="font-size:12px;color:var(--text2)">${fn(stk,0)} animales · salida proyectada: <strong>${fSalida?fd(fSalida):'sin datos'}</strong>${diasHastaSalida!==null?' ('+diasHastaSalida+' días)':''}</div>
          </div>
        </div>
      </div>`;

    if (diasHastaSalida === null || costoProyect === null) {
      h += `<div class="alert alert-r" style="margin:0">No hay proyección de salida disponible. Verificá que el corral tenga pesadas registradas.</div>`;
    } else {
      h += `<div class="kpi-grid" style="margin-bottom:1px">
        <div class="kpi">
          <div class="kpi-icon">🌿</div>
          <div class="kpi-label">Alim. acumulada (ya gastado)</div>
          <div class="kpi-val">${fmon(caAcum)}</div>
          <div class="kpi-sub">hasta hoy</div>
        </div>
        <div class="kpi">
          <div class="kpi-icon">📅</div>
          <div class="kpi-label">Costo diario (últ. 30 días)</div>
          <div class="kpi-val">${fmon(costoDiario)}</div>
          <div class="kpi-sub">${fmon(costoUlt30)} en 30 días</div>
        </div>
        <div class="kpi" style="border-top:2px solid var(--blue)">
          <div class="kpi-icon">🔮</div>
          <div class="kpi-label">Alim. proyectada (resta)</div>
          <div class="kpi-val" style="color:var(--blue-text)">${fmon(costoProyect)}</div>
          <div class="kpi-sub">${diasHastaSalida} días × ${fmon(costoDiario)}/día</div>
        </div>
        <div class="kpi" style="border-top:2px solid var(--navy)">
          <div class="kpi-icon">💲</div>
          <div class="kpi-label">Total alim. al cierre</div>
          <div class="kpi-val">${fmon(costoTotalCierre)}</div>
          <div class="kpi-sub">acumulado + proyectado</div>
        </div>
      </div>
      <div class="kpi-grid">
        <div class="kpi">
          <div class="kpi-icon">🛒</div>
          <div class="kpi-label">Costo de compra</div>
          <div class="kpi-val">${fmon(cc)}</div>
        </div>
        <div class="kpi" style="border-top:2px solid var(--navy)">
          <div class="kpi-icon">💲</div>
          <div class="kpi-label">Costo total al cierre</div>
          <div class="kpi-val">${fmon(costoTotalFinal)}</div>
          <div class="kpi-sub">compra + alim. total</div>
        </div>
        ${ivProyect !== null ? `
        <div class="kpi">
          <div class="kpi-icon">💵</div>
          <div class="kpi-label">Ingreso proyectado stock</div>
          <div class="kpi-val">${fmon(ivProyect)}</div>
          <div class="kpi-sub">${fn(stk,0)} × ${fn(pesoObj,0)} kg × ${fmon(stkP)}/kg</div>
        </div>
        <div class="kpi" style="border-top:2px solid ${utilProyect>=0?'var(--green)':'var(--red)'}">
          <div class="kpi-icon">${utilProyect>=0?'📈':'📉'}</div>
          <div class="kpi-label">Utilidad proyectada al cierre</div>
          <div class="kpi-val ${utilProyect>=0?'kpi-pos':'kpi-neg'}">${fmon(utilProyect)}</div>
          <div class="kpi-sub">ventas ya realizadas + stock</div>
        </div>` : `
        <div class="kpi"><div class="kpi-icon">ℹ️</div><div class="kpi-label">Utilidad proyectada</div><div class="kpi-val" style="font-size:13px;color:var(--text3)">Ingresá precio en Costos</div></div>`}
      </div>`;

      // Desglose por alimento
      h += `<div class="section-label" style="margin-top:4px;margin-bottom:8px">Desglose por alimento — proyección al cierre</div>
      <div class="tw"><table class="data-table"><thead><tr>
        <th>Alimento</th><th class="thc">Costo acumulado</th><th class="thc">Cant. diaria (30d)</th><th class="thc">Cant. proyectada</th><th class="thc">Costo proyectado</th><th class="thc">Total al cierre</th>
      </tr></thead><tbody>`;
      ALIMENTOS.forEach(a => {
        const subAcum  = S.consumos.filter(x=>x.cid===cid&&x.tipo===a.key).reduce((s,x)=>s+Number(x.cant)*Number(x.precio),0);
        const sub30    = consumosUlt30.filter(x=>x.tipo===a.key).reduce((s,x)=>s+Number(x.cant)*Number(x.precio),0);
        const cant30   = consumosUlt30.filter(x=>x.tipo===a.key).reduce((s,x)=>s+Number(x.cant),0);
        const diario   = sub30/30;
        const cantDiaria = cant30/30;
        const proyect  = Math.round(diario * diasHastaSalida);
        const cantProyect = cantDiaria * diasHastaSalida;
        if (subAcum===0 && sub30===0) return;
        h += `<tr>
          <td><span class="pill pill-teal">${a.icon} ${a.label}</span></td>
          <td class="tdc">${fmon(subAcum)}</td>
          <td class="tdc">${fn(cantDiaria,1)} ${a.unidad}/día</td>
          <td class="tdc" style="color:var(--blue-text);font-weight:600">${fn(cantProyect,0)} ${a.unidad}</td>
          <td class="tdc" style="color:var(--blue-text)">${fmon(proyect)}</td>
          <td class="tdc"><strong>${fmon(subAcum+proyect)}</strong></td>
        </tr>`;
      });
      h += `<tr class="total-row"><td><strong>Total</strong></td>
        <td class="tdc"><strong>${fmon(caAcum)}</strong></td>
        <td class="tdc">—</td>
        <td class="tdc" style="color:var(--blue-text)">—</td>
        <td class="tdc" style="color:var(--blue-text)"><strong>${fmon(costoProyect)}</strong></td>
        <td class="tdc"><strong>${fmon(costoTotalCierre)}</strong></td>
      </tr></tbody></table></div>
      <div style="font-size:11px;color:var(--blue-text);font-weight:600;margin-top:6px;padding:8px 12px;background:var(--blue-bg);border-radius:6px">
        📦 Stock necesario para el cierre: ${ALIMENTOS.map(a => {
          const cant30 = consumosUlt30.filter(x=>x.tipo===a.key).reduce((s,x)=>s+Number(x.cant),0);
          const cantProyect = (cant30/30) * diasHastaSalida;
          return cantProyect > 0 ? `<strong>${fn(cantProyect,0)} ${a.unidad}</strong> de ${a.label}` : null;
        }).filter(Boolean).join(' · ')}
      </div>`;
    }

    h += `</div>`;
  });

  h += `<div style="font-size:11px;color:var(--text3);margin-top:4px;line-height:1.6">
    🔮 El costo proyectado se calcula con el promedio diario de los últimos 30 días × días hasta la fecha de salida proyectada de cada corral.<br>
    La utilidad proyectada incluye ventas ya realizadas + valorización del stock al precio y peso objetivo configurados.
  </div>`;
  return h;
}

function buildHistorial() {
  const lotes = (S.lotesCerrados||[]).slice().sort((a,b) => b.fechaCierre.localeCompare(a.fechaCierre));

  // Detectar corrales con stock = 0 que no tienen lote cerrado aún
  const corralesCerrados = CORRALES.filter(c => {
    const stk = stockNow(c.id);
    const yaGuardado = lotes.some(l => l.cid === c.id && l.fechaCierre === today());
    return stk === 0 && totIng(c.id) > 0 && !yaGuardado;
  });

  let h = `<div class="section-label">Historial de lotes cerrados</div>`;

  // Banner para cerrar lotes disponibles
  if (corralesCerrados.length) {
    corralesCerrados.forEach(c => {
      h += `<div style="background:var(--blue-bg);border:0.5px solid #85B7EB;border-radius:8px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:20px">📋</span>
          <div>
            <div style="font-size:13px;font-weight:600;color:var(--blue-text)">${c.nombre} — lote completado</div>
            <div style="font-size:12px;color:var(--blue-text)">Stock en 0. Podés guardar este lote en el historial para comparar con futuros lotes.</div>
          </div>
        </div>
        <button class="btn btn-primary" id="btn-cerrar-${c.id}" data-cid="${c.id}" style="font-size:12px;padding:6px 14px">📋 Guardar en historial</button>
      </div>`;
    });
  }

  if (!lotes.length) {
    h += `<div class="empty"><span class="empty-icon">📋</span>No hay lotes cerrados aún. Cuando un corral llegue a stock 0 podrás guardarlo aquí.</div>`;
    return h;
  }

  // Tabla resumen de lotes
  h += `<div class="tw"><table class="data-table"><thead><tr>
    <th>Corral</th><th class="thc">Fecha apertura</th><th class="thc">Fecha cierre</th><th class="thc">Días</th>
    <th class="thc">Animales</th><th class="thc">Kg ganados</th><th class="thc">Gan. diaria</th>
    <th class="thc">Costo alim.</th><th class="thc">Alim./kg gan.</th><th class="thc">Ingreso ventas</th>
    <th class="thc">Utilidad</th><th class="thc">Acciones</th>
  </tr></thead><tbody>`;

  lotes.forEach(l => {
    const dias = Math.round((new Date(l.fechaCierre)-new Date(l.fechaApertura))/86400000);
    const util = l.ingVentas - l.costoCompra - l.costoAlim;
    const uc = util >= 0 ? 'color:var(--green);font-weight:600' : 'color:var(--red);font-weight:600';
    h += `<tr>
      <td><strong>${l.nombreCorral}</strong></td>
      <td class="tdc">${fd(l.fechaApertura)}</td>
      <td class="tdc">${fd(l.fechaCierre)}</td>
      <td class="tdc">${dias} días</td>
      <td class="tdc">${fn(l.animales,0)} cab.</td>
      <td class="tdc">${fn(l.kgGanados,0)} kg</td>
      <td class="tdc">${l.ganDiaria?fn(l.ganDiaria,3)+' kg/día':'—'}</td>
      <td class="tdc">${fmon(l.costoAlim)}</td>
      <td class="tdc">${l.kgGanados>0?fmon(l.costoAlim/l.kgGanados):'—'}</td>
      <td class="tdc">${fmon(l.ingVentas)}</td>
      <td class="tdc" style="${uc}">${fmon(util)}</td>
      <td class="td-actions"><button class="btn-del" data-del-lote="${l.id}">🗑</button></td>
    </tr>`;
  });
  h += `</tbody></table></div>`;

  // KPIs promedio histórico
  if (lotes.length > 1) {
    const promGanDiaria = lotes.filter(l=>l.ganDiaria).reduce((s,l)=>s+l.ganDiaria,0) / lotes.filter(l=>l.ganDiaria).length;
    const promAlimXkg   = lotes.filter(l=>l.kgGanados>0).reduce((s,l)=>s+l.costoAlim/l.kgGanados,0) / lotes.filter(l=>l.kgGanados>0).length;
    const promUtil      = lotes.reduce((s,l)=>s+(l.ingVentas-l.costoCompra-l.costoAlim),0) / lotes.length;
    h += `<div class="section-label" style="margin-top:16px">Promedios históricos (${lotes.length} lotes)</div>
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-icon">📈</div><div class="kpi-label">Ganancia diaria prom.</div><div class="kpi-val">${fn(promGanDiaria,3)} kg/día</div></div>
      <div class="kpi"><div class="kpi-icon">🌾</div><div class="kpi-label">Alim. / kg ganado prom.</div><div class="kpi-val">${fmon(promAlimXkg)}</div></div>
      <div class="kpi" style="border-top:2px solid ${promUtil>=0?'var(--green)':'var(--red)'}"><div class="kpi-icon">${promUtil>=0?'📈':'📉'}</div><div class="kpi-label">Utilidad prom. / lote</div><div class="kpi-val ${promUtil>=0?'kpi-pos':'kpi-neg'}">${fmon(promUtil)}</div></div>
    </div>`;
  }

  h += `<div style="font-size:11px;color:var(--text3);margin-top:8px">Los lotes se guardan manualmente cuando el stock llega a 0. Los datos quedan fijos como snapshot del momento del cierre.</div>`;
  return h;
}

function buildVeterinaria() {
  const PVETS = getProductosVet();
  const allVet = (S.consumosVet||[]);
  const corOpts  = CORRALES.map(c=>`<option value="${c.id}"${c.id===S.corral?' selected':''}>${c.nombre}</option>`).join('');
  const prodOpts = PVETS.map(p=>`<option value="${p.key}">${p.icon} ${p.label}</option>`).join('');

  let h = `<div class="section-label">🩺 Registro de gastos veterinarios</div>`;

  // Referencia de precios vigentes

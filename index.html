  h += `<div style="font-size:12px;color:var(--text2);margin-bottom:10px;display:flex;gap:16px;flex-wrap:wrap;background:var(--bg2);padding:8px 12px;border-radius:8px;border:1px solid var(--border)">`;
  PVETS.forEach(p => {
    const prHoy = precioVetHoy(p.key);
    h += `<span>${p.icon} <strong>${p.label}</strong>: ${prHoy?fmon(prHoy)+'/frasco':'<span style="color:var(--text3)">default '+fmon(p.precioDefault)+'/frasco</span>'}</span>`;
  });
  h += `</div>`;

  h += `<div class="panel">
    <div class="panel-title">Registrar aplicación</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:8px">El precio es <strong>por frasco completo</strong>. Podés ingresar fracciones de frasco (ej: 0.5).</div>
    <div class="fgrid">
      <div class="fg"><label>Corral</label><select id="vt-cid">${corOpts}</select></div>
      <div class="fg"><label>Fecha</label><input type="date" id="vt-fecha" value="${today()}"></div>
      <div class="fg"><label>Producto</label><select id="vt-producto">${prodOpts}</select></div>
      <div class="fg"><label>Frascos usados</label><input type="number" id="vt-frascos" placeholder="Ej: 0.5 · 1 · 2.5" min="0" step="0.01"></div>
      <div class="fg"><label>Animales tratados</label><input type="number" id="vt-animales" placeholder="Ej: 185" min="0" step="1"></div>
      <div class="fg"><label>Precio / frasco <span style="font-size:11px;color:var(--text3)">(vacío = usa vigente)</span></label><input type="number" id="vt-precio" placeholder="se llena automático" min="0" step="0.01"></div>
      <div class="fg" style="min-width:260px"><label>Observación</label><input type="text" id="vt-obs" placeholder="Ej: vacunación aftosa, desparasitación..."></div>
    </div>
    <div id="vt-precio-ref" style="font-size:12px;font-weight:600;color:var(--green);margin-bottom:4px"></div>
    <div id="vt-subtotal-ref" style="font-size:13px;font-weight:700;color:#9b59b6;margin-bottom:4px"></div>
    <div id="vt-warn-stock" style="font-size:12px;color:var(--red);background:#fff0f0;border:1px solid #fcc;border-radius:6px;padding:6px 10px;margin-bottom:6px;display:none"></div>
    <div id="vt-warn-dosis" style="font-size:12px;color:#b45309;background:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:6px 10px;margin-bottom:6px;display:none"></div>
    <button class="btn btn-primary" id="btn-vt-add">✓ Registrar</button>
  </div>`;

  if (!allVet.length) {
    h += `<div class="panel" style="color:var(--text2);text-align:center;padding:24px">Sin registros veterinarios aún.</div>`;
    return h;
  }

  CORRALES.forEach(cor => {
    const cid   = cor.id;
    const lista = allVet.filter(v=>v.cid===cid).sort((a,b)=>a.fecha.localeCompare(b.fecha));
    if (!lista.length) return;
    const totCosto   = lista.reduce((s,v)=>s+Number(v.frascos)*Number(v.precio),0);
    const totFrascos = {};
    PVETS.forEach(p => { totFrascos[p.key] = lista.filter(v=>v.producto===p.key).reduce((s,v)=>s+Number(v.frascos),0); });
    const kgG = kgGanadosHastaPesada(cid);

    h += `<div class="section-label" style="margin-top:14px">🏚️ ${cor.nombre}
      <span style="color:#9b59b6;font-weight:700;margin-left:8px">${fmon(totCosto)}</span>
      ${kgG>0?`<span style="color:var(--text2);font-size:12px;font-weight:400;margin-left:8px">· ${fmon(totCosto/kgG)} / kg ganado</span>`:''}
    </div>`;
    h += `<div class="tw"><table class="data-table"><thead><tr>
      <th>Fecha</th><th>Producto</th>
      <th class="thc">Frascos</th><th class="thc">Animales</th>
      <th class="thc">Precio/frasco</th><th class="thc">Subtotal</th>
      <th>Observación</th><th>Acc.</th>
    </tr></thead><tbody>`;

    lista.forEach(v => {
      const prod = PVETS.find(p=>p.key===v.producto)||{label:v.producto,icon:'💉'};
      const sub  = Number(v.frascos)*Number(v.precio);
      h += `<tr>
        <td>${fd(v.fecha)}</td>
        <td>${prod.icon} ${prod.label}</td>
        <td class="tdc"><strong>${fn(v.frascos,2)}</strong> frascos</td>
        <td class="tdc">${v.animales?fn(v.animales,0)+' cab.':'—'}</td>
        <td class="tdc">${fmon(v.precio)}</td>
        <td class="tdc"><strong>${fmon(sub)}</strong></td>
        <td style="font-size:12px;color:var(--text2)">${v.obs||'—'}</td>
        <td class="td-actions">
          <button class="btn-edit" data-edit-vt="${v.id}">✏️</button>
          <button class="btn-del" data-del-vt="${v.id}">🗑</button>
        </td></tr>`;
    });

    // Fila totales con resumen de frascos por producto
    const resumen = PVETS.map(p=>{
      const f = totFrascos[p.key]||0;
      return f>0 ? `${p.icon} ${p.label}: ${fn(f,2)} frascos` : '';
    }).filter(Boolean).join(' &nbsp;|&nbsp; ');
    h += `<tr class="total-row">
      <td colspan="2">TOTAL ${cor.nombre}</td>
      <td colspan="3" style="font-size:11px;color:var(--text3)">${resumen}</td>
      <td class="tdc"><strong style="color:#9b59b6">${fmon(totCosto)}</strong></td>
      <td colspan="2"></td>
    </tr>`;
    h += `</tbody></table></div>`;
  });
  return h;
}

function getBolsonesOpts(tipo) {
  const bols = (S.bolsones||[]).filter(b=>b.tipo===tipo&&b.activo!==false&&stockBolson(b.id)>0);
  const ins = getInsumos().find(a=>a.key===tipo);
  if (!bols.length) return '<select id="cc-bolson"><option value="">Sin stock disponible</option></select>';
  return '<select id="cc-bolson">' + bols.map(b=>{
    const campo = CAMPOS_GANADEROS.find(c=>c.id===b.campo);
    return `<option value="${b.id}">${campo?.nombre||b.campo} — ${b.nombre} (${fn(stockBolson(b.id),0)} ${ins?.unidad||''})</option>`;
  }).join('') + '</select>';
}

function buildStock() {
  const PVETS = getProductosVet();
  let h = `<div class="section-label">📦 Stock de insumos</div>`;

  // ── ALIMENTOS por campo ───────────────────────────────────────────────────
  h += `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:14px;margin-bottom:18px">`;
  CAMPOS_GANADEROS.forEach(campo => {
    h += `<div class="panel" style="margin:0">
      <div class="panel-title">🏡 ${campo.nombre}</div>`;
    getInsumos().forEach(a => {
      const bolsonesCampo = (S.bolsones||[]).filter(b=>b.campo===campo.id&&b.tipo===a.key&&b.activo!==false);
      const stockTotal = bolsonesCampo.reduce((s,b)=>s+Math.max(0,stockBolson(b.id)),0);
      const minimo = bolsonesCampo.length ? Math.min(...bolsonesCampo.map(b=>Number(b.minimo)||0)) : 0;
      const alerta = minimo > 0 && stockTotal <= minimo;
      h += `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)">
        <span>${a.icon} ${a.label}</span>
        <span style="font-weight:700;color:${alerta?'var(--red)':bolsonesCampo.length?'var(--green)':'var(--text3)'}">${bolsonesCampo.length?fn(stockTotal,0)+' '+a.unidad:'sin bolsones'} ${alerta?'⚠️':''}</span>
      </div>`;
      // Detalle bolsones
      bolsonesCampo.forEach(b => {
        const stk = stockBolson(b.id);
        h += `<div style="font-size:11px;color:var(--text2);padding:2px 0 2px 12px;display:flex;justify-content:space-between">
          <span>📦 ${b.nombre}</span>
          <span style="color:${stk<=0?'var(--red)':'var(--text2)'}">${fn(stk,0)} ${a.unidad}
            <button class="btn-del" data-del-bolson="${b.id}" style="font-size:10px;padding:1px 5px;margin-left:4px">🗑</button>
          </span>
        </div>`;
      });
    });
    h += `</div>`;
  });
  h += `</div>`;

  // ── VETERINARIA stock central ─────────────────────────────────────────────
  h += `<div class="section-label">🩺 Stock veterinario (central)</div>`;
  h += `<div class="tw"><table class="data-table" style="margin-bottom:14px"><thead><tr>
    <th>Producto</th><th class="thc">Comprado</th><th class="thc">Consumido</th><th class="thc">Stock actual</th><th class="thc">Mínimo</th>
  </tr></thead><tbody>`;
  PVETS.forEach(p => {
    const comprado = (S.comprasVet||[]).filter(c=>c.key===p.key).reduce((s,c)=>s+Number(c.frascos),0);
    const consumido = (S.consumosVet||[]).filter(c=>c.producto===p.key).reduce((s,c)=>s+Number(c.frascos||0),0);
    const stock = comprado - consumido;
    const minimo = Number((S.minimoVet||{})[p.key]||0);
    const alerta = minimo > 0 && stock <= minimo;
    h += `<tr>
      <td>${p.icon} <strong>${p.label}</strong></td>
      <td class="tdc">${fn(comprado,2)} frascos</td>
      <td class="tdc">${fn(consumido,2)} frascos</td>
      <td class="tdc" style="font-weight:700;color:${alerta?'var(--red)':stock>0?'var(--green)':'var(--text3)'}">
        ${fn(stock,2)} frascos ${alerta?'⚠️':stock<=0?'🔴':''}
      </td>
      <td class="tdc">${minimo>0?fn(minimo,0)+' frascos':'—'}</td>
    </tr>`;
  });
  h += `</tbody></table></div>`;

  // ── Cargar compra de veterinaria ──────────────────────────────────────────
  h += `<div class="panel">
    <div class="panel-title">➕ Registrar compra de veterinaria</div>
    <div class="fgrid">
      <div class="fg"><label>Producto</label>
        <select id="cv-producto">${PVETS.map(p=>`<option value="${p.key}">${p.icon} ${p.label}</option>`).join('')}</select>
      </div>
      <div class="fg"><label>Fecha</label><input type="date" id="cv-fecha" value="${today()}"></div>
      <div class="fg"><label>Frascos comprados</label><input type="number" id="cv-frascos" placeholder="Ej: 10" min="0" step="0.01"></div>
      <div class="fg"><label>Precio / frasco</label><input type="number" id="cv-precio" placeholder="Ej: 750000" min="0" step="0.01"></div>
      <div class="fg"><label>Proveedor (opcional)</label><input type="text" id="cv-proveedor" placeholder="Nombre del proveedor"></div>
    </div>
    <button class="btn btn-primary" id="btn-cv-add">✓ Registrar compra</button>
  </div>`;

  // Historial compras vet
  const comprasVet = (S.comprasVet||[]).slice().sort((a,b)=>b.fecha.localeCompare(a.fecha));
  if (comprasVet.length) {
    h += `<div class="tw"><table class="data-table" style="margin-bottom:18px"><thead><tr>
      <th>Fecha</th><th>Producto</th><th class="thc">Frascos</th><th class="thc">Precio/frasco</th><th class="thc">Total</th><th>Proveedor</th><th>Acc.</th>
    </tr></thead><tbody>`;
    comprasVet.forEach(c => {
      const prod = PVETS.find(p=>p.key===c.key)||{label:c.key,icon:'💉'};
      h += `<tr>
        <td>${fd(c.fecha)}</td>
        <td>${prod.icon} ${prod.label}</td>
        <td class="tdc">${fn(c.frascos,2)}</td>
        <td class="tdc">${fmon(c.precio)}</td>
        <td class="tdc"><strong>${fmon(c.frascos*c.precio)}</strong></td>
        <td style="font-size:12px;color:var(--text2)">${c.proveedor||'—'}</td>
        <td class="td-actions"><button class="btn-del" data-del-cv="${c.id}">🗑</button></td>
      </tr>`;
    });
    h += `</tbody></table></div>`;
  }

  // ── Consumo de campo (no corral) ────────────────────────────────────────
  h += `<div class="section-label" style="margin-top:18px">🐄 Consumo de campo (rodeos fuera del corral)</div>
  <div style="font-size:12px;color:var(--text2);margin-bottom:10px">
    Registrá los consumos en rodeos de campo. <strong>Descuenta del stock pero NO afecta costos de corrales.</strong>
  </div>
  <div class="panel">
    <div class="panel-title">Registrar consumo de campo</div>
    <div class="fgrid">
      <div class="fg"><label>Fecha</label><input type="date" id="cc-fecha" value="${today()}"></div>
      <div class="fg"><label>Insumo</label>
        <select id="cc-tipo" onchange="document.getElementById('cc-bolson-wrap').innerHTML=getBolsonesOpts(this.value)">
          ${getInsumos().map(a=>`<option value="${a.key}">${a.icon} ${a.label}</option>`).join('')}
        </select>
      </div>
      <div class="fg" style="min-width:240px"><label>Stock origen</label>
        <div id="cc-bolson-wrap">
          ${(()=>{
            const tipo = getInsumos()[0]?.key||'maiz';
            const bols = (S.bolsones||[]).filter(b=>b.tipo===tipo&&b.activo!==false&&stockBolson(b.id)>0);
            if (!bols.length) return '<select id="cc-bolson"><option value="">Sin stock disponible</option></select>';
            return '<select id="cc-bolson">' + bols.map(b=>{
              const campo = CAMPOS_GANADEROS.find(c=>c.id===b.campo);
              return `<option value="${b.id}">${campo?.nombre||b.campo} — ${b.nombre} (${fn(stockBolson(b.id),0)} ${getInsumos().find(a=>a.key===b.tipo)?.unidad||''})</option>`;
            }).join('') + '</select>';
          })()}
        </div>
      </div>
      <div class="fg"><label>Cantidad</label><input type="number" id="cc-cant" placeholder="Ej: 500" min="0" step="0.01"></div>
      <div class="fg" style="min-width:200px"><label>Rodeo / destino</label><input type="text" id="cc-rodeo" placeholder="Ej: Vacas Rodeo 3..."></div>
      <div class="fg" style="min-width:200px"><label>Observación</label><input type="text" id="cc-obs" placeholder="Opcional"></div>
    </div>
    <button class="btn btn-primary" id="btn-cc-add">✓ Registrar consumo</button>
  </div>`;

  const ccLista = (S.consumosCampo||[]).slice().sort((a,b)=>b.fecha.localeCompare(a.fecha)).slice(0,20);
  if (ccLista.length) {
    h += `<div class="tw"><table class="data-table" style="margin-bottom:14px"><thead><tr>
      <th>Fecha</th><th>Insumo</th><th>Stock origen</th><th class="thc">Cantidad</th><th>Rodeo</th><th>Obs.</th><th>Acc.</th>
    </tr></thead><tbody>`;
    ccLista.forEach(c => {
      const ins = getInsumos().find(a=>a.key===c.tipo)||{label:c.tipo,unidad:'',icon:'🌿'};
      const bol = (S.bolsones||[]).find(b=>b.id===c.bolsonId);
      const campoNom = bol ? (CAMPOS_GANADEROS.find(x=>x.id===bol.campo)?.nombre||bol.campo) : '—';
      h += `<tr>
        <td>${fd(c.fecha)}</td><td>${ins.icon} ${ins.label}</td>
        <td style="font-size:12px;color:var(--text2)">${bol?campoNom+' — '+bol.nombre:'—'}</td>
        <td class="tdc">${fn(c.cant,1)} ${ins.unidad}</td>
        <td style="font-size:12px">${c.rodeo||'—'}</td>
        <td style="font-size:12px;color:var(--text2)">${c.obs||'—'}</td>
        <td class="td-actions"><button class="btn-del" data-del-cc="${c.id}">🗑</button></td>
      </tr>`;
    });
    h += `</tbody></table></div>`;
  }

  // ── Cargar bolsón de alimento ─────────────────────────────────────────────
  const campoOpts = CAMPOS_GANADEROS.map(c=>`<option value="${c.id}">${c.nombre}</option>`).join('');
  const alimentoOpts = getInsumos().map(a=>`<option value="${a.key}">${a.icon} ${a.label}</option>`).join('');
  h += `<div class="section-label">📦 Gestión de stock de insumos</div>
  <div class="panel">
    <div class="panel-title">➕ Agregar al stock</div>
    <div class="fgrid">
      <div class="fg"><label>Campo</label><select id="nb-campo">${campoOpts}</select></div>
      <div class="fg"><label>Insumo</label><select id="nb-tipo">${alimentoOpts}</select></div>
      <div class="fg"><label>Identificación <span style="font-size:11px;color:var(--text3)">(opcional)</span></label><input type="text" id="nb-nombre" placeholder="Ej: Stock 1, Silo Norte, Lote Rollos..."></div>
      <div class="fg"><label>Cantidad inicial</label><input type="number" id="nb-cant" placeholder="Ej: 50000 kg · 150 rollos" min="0" step="0.01"></div>
      <div class="fg"><label>Fecha ingreso</label><input type="date" id="nb-fecha" value="${today()}"></div>
      <div class="fg"><label>Mínimo de alerta</label><input type="number" id="nb-minimo" placeholder="Ej: 5000" min="0" step="0.01"></div>
      <div class="fg"><label>Proveedor (opcional)</label><input type="text" id="nb-proveedor" placeholder="Nombre del proveedor"></div>
    </div>
    <button class="btn btn-primary" id="btn-nb-add">✓ Agregar al stock</button>
  </div>`;

  // Transferencia entre campos
  const bolsonesActivos = (S.bolsones||[]).filter(b=>b.activo!==false&&stockBolson(b.id)>0);
  if (bolsonesActivos.length > 0) {
    const bolsonOpts = bolsonesActivos.map(b=>{
      const campo = CAMPOS_GANADEROS.find(c=>c.id===b.campo);
      const alim  = ALIMENTOS.find(a=>a.key===b.tipo);
      return `<option value="${b.id}">${campo?.nombre||b.campo} — ${alim?.label||b.tipo} — ${b.nombre} (${fn(stockBolson(b.id),0)} ${alim?.unidad||''})</option>`;
    }).join('');
    h += `<div class="panel">
      <div class="panel-title">🔄 Transferir entre campos</div>
      <div class="fgrid">
        <div class="fg" style="min-width:280px"><label>Stock origen</label><select id="tr-origen">${bolsonOpts}</select></div>
        <div class="fg"><label>Campo destino</label><select id="tr-campo-dest">${campoOpts}</select></div>
        <div class="fg"><label>Cantidad a transferir</label><input type="number" id="tr-cant" placeholder="Ej: 10000" min="0" step="0.01"></div>
        <div class="fg"><label>Nombre stock destino</label><input type="text" id="tr-nombre-dest" placeholder="Ej: Stock transferido"></div>
        <div class="fg"><label>Fecha</label><input type="date" id="tr-fecha" value="${today()}"></div>
      </div>
      <button class="btn btn-primary" id="btn-tr-add">✓ Registrar transferencia</button>
    </div>`;
  }

  return h;
}


function buildConfig() {

      <th>Válido desde</th><th class="thc">$/USD (venta BNA)</th><th>Acciones</th>
    </tr></thead><tbody>`;
    tcList.forEach(t => {
      h += `<tr>
        <td>${fd(t.fecha)}</td>
        <td class="tdc"><strong>$ ${fn(Number(t.valor),2)}</strong></td>
        <td class="td-actions">
          <button class="btn-edit" data-edit-tc="${t.id}" title="Editar">✏️</button>
          <button class="btn-del" data-del-tc="${t.id}">🗑</button>
        </td>
      </tr>`;
    });
    h += `</tbody></table></div>`;
  }

  // ── GITHUB SYNC ──────────────────────────────────────────────────────────
  const ghToken = getGithubToken();
  const ghStatus = ghToken ? '✅ Token configurado — los datos se sincronizan con GitHub' : '⚠️ Sin token — los datos se guardan solo en este navegador';
  h += `<div style="border-top:2px solid var(--border);margin:18px 0 14px"></div>
  <div class="section-label">☁️ Sincronización con GitHub</div>
  <div style="font-size:12px;margin-bottom:10px;padding:10px 14px;border-radius:8px;background:${ghToken?'var(--green-bg)':'var(--bg2)'};border:1px solid ${ghToken?'#5DCAA5':'var(--border)'}">
    <span style="font-weight:600">${ghStatus}</span><br>
    <span style="color:var(--text2);font-size:11px">Con el token configurado, cada vez que guardás los datos se suben automáticamente a GitHub y están disponibles desde cualquier PC.</span>
  </div>
  <div class="panel">
    <div class="panel-title">${ghToken?'🔄 Actualizar token':'🔑 Configurar token de GitHub'}</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:8px">
      Pegá el token de acceso personal (empieza con <code>ghp_</code>). Se guarda solo en este navegador, nunca se sube a ningún servidor.
    </div>
    <div class="fgrid">
      <div class="fg" style="min-width:340px">
        <label>Token de acceso personal</label>
        <input type="password" id="gh-token-input" placeholder="ghp_..." value="${ghToken}" style="font-family:monospace;font-size:12px">
      </div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
      <button class="btn btn-primary" id="btn-gh-token-save">✓ Guardar token</button>
      ${ghToken?`<button class="btn" id="btn-gh-token-test" style="background:var(--bg2)">🔍 Probar conexión</button>`:''}
      ${ghToken?`<button class="btn btn-del" id="btn-gh-token-clear">🗑 Eliminar token</button>`:''}
    </div>
    <div id="gh-token-status" style="font-size:12px;margin-top:8px"></div>
  </div>
  <div style="font-size:11px;color:var(--text3);margin-top:6px;line-height:1.6">
    💡 Para crear el token: github.com → Foto de perfil → Configuración → Configuración de desarrollador → Tokens de acceso personal → Tokens (clásico) → Generar nuevo token → marcá solo <strong>repo</strong> → Sin caducidad.
  </div>`;

  return h;
}

function attachEvents() {
  document.querySelectorAll('[data-page]').forEach(b => b.addEventListener('click', () => { S.page = b.dataset.page; render(); }));
  document.querySelectorAll('[data-corral]').forEach(b => b.addEventListener('click', () => { S.corral = Number(b.dataset.corral); render(); }));
  // TRUE TEST IMPORT
  const btnTT = document.getElementById('btn-truetest-file');
  if (btnTT) btnTT.addEventListener('change', function() {
    const file = this.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        // Parse XLS using SheetJS
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array', cellDates: true });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, { defval: null });

        if (!rows.length) { setAlert('El archivo no tiene datos.'); render(); return; }

        // Extraer datos clave
        const pesos = rows.map(r => Number(r['Peso'])).filter(p => p > 0);
        const fechas = rows.map(r => {
          const f = r['Fecha'];
          if (!f) return null;
          // Puede venir como string "16/12/2025" o como Date
          if (typeof f === 'string') {
            const parts = f.split('/');
            if (parts.length === 3) return `${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}`;
          }
          if (f instanceof Date) return f.toISOString().slice(0,10);
          return null;
        }).filter(Boolean);

        const cant = pesos.length;
        const kgProm = cant > 0 ? Math.round(pesos.reduce((s,p)=>s+p,0)/cant * 10) / 10 : 0;
        const kgTotal = pesos.reduce((s,p)=>s+p,0);
        const fechaDetectada = fechas.length ? fechas.sort()[0] : today();

        // Mostrar modal de confirmación
        const corralesOpts = getCorrales().map(c =>
          `<option value="${c.id}">${c.nombre}</option>`
        ).join('');

        document.getElementById('modal-container').innerHTML = `
        <div class="modal-overlay" id="modal-overlay">
          <div class="modal">
            <div class="modal-header">
              <div class="modal-title">⚖️ Importar pesada True Test</div>
              <button class="modal-close" id="mc">✕</button>
            </div>
            <div class="modal-body">
              <div class="modal-info">
                📊 <strong>${cant} animales</strong> · Peso promedio: <strong>${kgProm} kg</strong> · Total: <strong>${kgTotal.toLocaleString('es-AR')} kg</strong>
              </div>
              <div class="fgrid">
                <div class="fg">
                  <label>Corral destino</label>
                  <select id="tt-corral">${corralesOpts}</select>
                </div>
                <div class="fg">
                  <label>Fecha de pesada</label>
                  <input type="date" id="tt-fecha" value="${fechaDetectada}">
                </div>
              </div>
              <div style="font-size:12px;color:var(--text3);margin-top:8px">
                Se creará una pesada con ${cant} animales a ${kgProm} kg promedio.
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn btn-cancel" id="mc2">Cancelar</button>
              <button class="btn btn-save" id="tt-save">✓ Importar pesada</button>
            </div>
          </div>
        </div>`;

        document.getElementById('mc').onclick = closeModal;
        document.getElementById('mc2').onclick = closeModal;
        document.getElementById('modal-overlay').onclick = ev => { if (ev.target.id==='modal-overlay') closeModal(); };
        document.getElementById('tt-save').onclick = () => {
          const cid = Number(document.getElementById('tt-corral').value);
          const fecha = document.getElementById('tt-fecha').value;
          if (!fecha) { alert('Completá la fecha.'); return; }
          if (!S.pesadas) S.pesadas = [];
          S.pesadas.push({ id: gid(), cid, fecha, cant, kg: kgProm });
          save(); closeModal();
          setAlert(`✓ Pesada importada: ${cant} animales a ${kgProm} kg promedio (${fecha}).`, 'g');
          render();
        };

        this.value = ''; // reset input
      } catch(err) {
        setAlert('Error al leer el archivo. Verificá que sea un XLS del True Test.');
        render();
        this.value = '';
      }
    };
    reader.readAsArrayBuffer(file);
  });
  const bpdf = document.getElementById('btn-pdf'); if (bpdf) bpdf.addEventListener('click', generarPDF);
  const bsave = document.getElementById('btn-save-manual');
  if (bsave) bsave.addEventListener('click', guardarDatos);
  const bimport = document.getElementById('btn-import-file');
  if (bimport) bimport.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const d = JSON.parse(ev.target.result);
        if (!d.ingresos || !d.ventas || !d.consumos) { alert('El archivo no es un respaldo válido de esta aplicación.'); return; }
        if (!confirm(`¿Importar datos del archivo "${file.name}"?\nEsto reemplazará los datos actuales.`)) return;
        S.ingresos = d.ingresos; S.ventas = d.ventas; S.consumos = d.consumos;
        S.pesadas = d.pesadas||[]; S.preciosStock = d.preciosStock||{}; S.pesoObjetivo = d.pesoObjetivo||{}; S.precioProyectado = d.precioProyectado||{}; S.lotesCerrados = d.lotesCerrados||[]; S.corrales = d.corrales||null;
        S.tipoCambio = d.tipoCambio||[]; S.preciosAlim = d.preciosAlim||[]; S.notas = d.notas||[]; S.productosVet = d.productosVet||null; S.preciosVet = d.preciosVet||[]; S.consumosVet = d.consumosVet||[]; S.bolsones = d.bolsones||[]; S.transferenciasBolson = d.transferenciasBolson||[]; S.comprasVet = d.comprasVet||[]; S.insumosExtra = d.insumosExtra||[]; S.consumosCampo = d.consumosCampo||[]; if(d.moneda) S.moneda = d.moneda;
        save(); setAlert('Datos importados correctamente.', 'g'); render();
      } catch(err) { alert('No se pudo leer el archivo. Asegurate de que sea un backup válido (.json).'); }
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  // NEW INGRESO
  const bi = document.getElementById('btn-ing');
  if (bi) bi.addEventListener('click', () => {
    const f=document.getElementById('if').value, c=Number(document.getElementById('ic').value),
          k=Number(document.getElementById('ik').value), p=Number(document.getElementById('ip').value);
    if (!f||c<1||k<1||p<0) { setAlert('Completá todos los campos correctamente.'); render(); return; }
    S.ingresos.push({ id:gid(), cid:S.corral, fecha:f, cant:c, kg:k, precio:p });
    save(); setAlert('Ingreso registrado correctamente.','g'); render();
  });

  // NEW CONSUMO
  const cf = document.getElementById('cf');
  if (cf) {
    const upd = () => { const el=document.getElementById('stk-disp'); if(el) el.textContent=fn(stockAt(S.corral,cf.value),0)+' animales'; };
    cf.addEventListener('change', upd); setTimeout(upd, 60);
  }
  const bc = document.getElementById('btn-con');
  if (bc) bc.addEventListener('click', () => {
    const f=document.getElementById('cf').value, t=document.getElementById('ct').value,
          c=Number(document.getElementById('cc').value);
    const pInput = document.getElementById('cp').value.trim();
    // Si precio vacío, usar precio vigente a esa fecha
    let p = pInput ? Number(pInput) : precioAlimVigente(t, f);
    if (!f||c<=0) { setAlert('Completá fecha y cantidad.'); render(); return; }
    if (!p || p <= 0) {
      const alim = ALIMENTOS.find(a=>a.key===t);
      setAlert(`Sin precio vigente para ${alim?.label||t} al ${fd(f)}. Cargá el precio en Configuración o ingresalo manualmente.`);
      render(); return;
    }
    const stk=stockAt(S.corral,f);
    if (stk<=0) { setAlert('No hay animales en el corral en esa fecha.'); render(); return; }
    const bolsonId = document.getElementById('con-bolson')?.value || null;
    if (bolsonId) {
      const stkBol = stockBolson(bolsonId);
      if (c > stkBol) { setAlert('La cantidad supera el stock del origen ('+fn(stkBol,0)+' disponibles). Verificá o dejá "Sin asignar".'); render(); return; }
    }
    S.consumos.push({ id:gid(), cid:S.corral, fecha:f, tipo:t, cant:c, precio:p, bolsonId: bolsonId||null });
    save(); setAlert('Consumo registrado correctamente.','g'); render();
  });

  // NEW VENTA / BAJA
  const bv = document.getElementById('btn-ven');
  if (bv) bv.addEventListener('click', () => {
    const f       = document.getElementById('vf').value;
    const tipo    = document.getElementById('vtipo').value;
    const c       = Number(document.getElementById('vc').value);
    const k       = Number(document.getElementById('vk').value);
    const comprador = (document.getElementById('vcomprador').value||'').trim();
    const pPactado  = Number(document.getElementById('vp').value)||0;
    const obs       = (document.getElementById('vobs').value||'').trim();
    const esBaja    = tipo === 'baja';
    if (!f||c<1||k<1) { setAlert('Completá fecha, cantidad y kilos.'); render(); return; }
    const stk=stockAt(S.corral,f);
    if (c>stk) { setAlert('No hay '+c+' animales disponibles el '+fd(f)+'. Hay '+stk+'.'); render(); return; }
    S.ventas.push({ id:gid(), cid:S.corral, fecha:f, tipo, cant:c, kg:k,
      comprador, precioPactado:pPactado, obs, baja:esBaja, liquidado:false,
      // legacy compat
      precio: pPactado
    });
    save(); setAlert(esBaja?'Baja registrada.':'Salida registrada — pendiente de liquidación.','g'); render();
  });

  // Liquidar venta
  document.querySelectorAll('[data-liq-ven]').forEach(b => b.addEventListener('click', () => {
    const id = b.dataset.liqVen;
    const v  = S.ventas.find(x=>x.id===id);
    if (!v) return;
    const esFrigo = v.tipo === 'frigorifico';
    document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">💰 Liquidar — ${esFrigo?'🏭 Frigorífico':'🤝 Venta en pie'} · ${fd(v.fecha)} · ${fn(v.cant,0)} cab.</div>
          <button class="modal-close" id="mc">✕</button>
        </div>
        <div class="modal-body">
          <div style="font-size:12px;color:var(--text2);margin-bottom:12px">
            Kg en campo: ${fn(Number(v.cant)*Number(v.kg),0)} kg · Precio pactado: ${v.precioPactado?fmon(v.precioPactado)+'/kg':'no cargado'}
          </div>
          <div class="fgrid">
            ${esFrigo?`
            <div class="fg"><label>Kg vivos en frigorífico</label><input type="number" id="liq-kg" placeholder="Ej: 16900" min="0" step="1" oninput="calcLiq()"></div>
            <div class="fg"><label>Rinde % (kg gancho / kg vivo)</label><input type="number" id="liq-rinde" placeholder="Ej: 58" min="0" step="0.1" oninput="calcLiq()"></div>
            <div class="fg"><label>Precio proporcional ($/kg vivo)</label><input type="number" id="liq-precio" placeholder="Ej: 2610" min="0" step="0.01" oninput="calcLiq()"></div>
            `:`
            <div class="fg"><label>Kg brutos pesados</label><input type="number" id="liq-kg" placeholder="Ej: 17000" min="0" step="1" oninput="calcLiq()"></div>
            <div class="fg"><label>Desbaste %</label><input type="number" id="liq-desbaste" placeholder="Ej: 3" min="0" step="0.1" oninput="calcLiq()"></div>
            <div class="fg"><label>Precio ($/kg neto)</label><input type="number" id="liq-precio" placeholder="Ej: 4500" min="0" step="0.01" oninput="calcLiq()"></div>
            `}
            <div class="fg"><label>Importe total $</label><input type="number" id="liq-importe" placeholder="Calculado automático o ingresá manual" min="0" step="0.01"></div>
          </div>
          <div id="liq-preview" style="font-size:13px;font-weight:600;color:var(--green);margin-top:8px"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-cancel" id="mc2">Cancelar</button>
          <button class="btn btn-save" id="liq-save">✓ Guardar liquidación</button>
        </div>
      </div>
    </div>`;
    const calcLiq = () => {
      const kgEl  = document.getElementById('liq-kg');
      const prEl  = document.getElementById('liq-precio');
      const impEl = document.getElementById('liq-importe');
      const prevEl = document.getElementById('liq-preview');
      const kg = Number(kgEl?.value)||0;
      const pr = Number(prEl?.value)||0;
      let kgNetos = kg;
      if (!esFrigo) {
        const desb = Number(document.getElementById('liq-desbaste')?.value)||0;
        kgNetos = kg * (1 - desb/100);
      }
      if (kg > 0 && pr > 0) {
        const imp = Math.round(kgNetos * pr);
        impEl.value = imp;  // always update
        if (prevEl) prevEl.textContent = '→ ' + fn(kgNetos,0) + ' kg × ' + fmon(pr) + '/kg = ' + fmon(imp);
      } else {
        if (prevEl) prevEl.textContent = '';
      }
    };
    window.calcLiq = calcLiq;
    document.getElementById('mc').onclick = closeModal;
    document.getElementById('mc2').onclick = closeModal;
    document.getElementById('modal-overlay').onclick = e=>{if(e.target.id==='modal-overlay')closeModal();};
    document.getElementById('liq-save').onclick = () => {
      const kg     = Number(document.getElementById('liq-kg')?.value)||0;
      const precio = Number(document.getElementById('liq-precio')?.value)||0;
      const importe = Number(document.getElementById('liq-importe')?.value)||0;
      const rinde  = esFrigo ? Number(document.getElementById('liq-rinde')?.value)||0 : 0;
      const desb   = !esFrigo ? Number(document.getElementById('liq-desbaste')?.value)||0 : 0;
      if (!kg||!importe) { alert('Completá los kg y el importe.'); return; }
      const kgNetos = esFrigo ? kg : kg*(1-desb/100);
      S.ventas = S.ventas.map(x => x.id===id ? {
        ...x,
        liquidado: true,
        kgLiquidados: kgNetos,
        rinde: esFrigo ? rinde : null,
        desbaste: esFrigo ? null : desb,
        precioLiq: precio,
        importeTotal: importe,
        precio: kgNetos > 0 ? importe/kgNetos : x.precio  // update legacy precio
      } : x);
      save(); closeModal(); setAlert('Liquidación guardada correctamente.','g'); render();
    };
  }));

  // PESO OBJETIVO (pesadas)
  document.querySelectorAll('[id^="btn-peso-obj-"]').forEach(b => {
    b.addEventListener('click', () => {
      const cid = Number(b.dataset.cid);
      const val = Number(document.getElementById('peso-obj-'+cid).value);
      if (!val || val < 1) return;
      if (!S.pesoObjetivo) S.pesoObjetivo = {};

      const ings = S.ingresos.filter(i => i.cid === cid);
      const pesadasCid = (S.pesadas||[]).filter(p => p.cid === cid).sort((a,b)=>a.fecha.localeCompare(b.fecha));
      const fechaApertura = ings.length ? ings.map(i=>i.fecha).sort()[0] : today();

      const animales = totIng(cid);

      const costoCompra_ = costoCompra(cid);
      const ingVentas_ = ingVentas(cid);
      // Ganancia diaria entre últimas dos pesadas

      if (pesadasCid.length >= 2) {

        const totalIngCant = ings.reduce((s,i)=>s+Number(i.cant),0);

        const d = Math.round((new Date(pesadasCid[0].fecha)-new Date(fechaApertura))/86400000);
        if (d>0&&kgPromIng>0) ganDiaria = (Number(pesadasCid[0].kg)-kgPromIng)/d;
      }
      if (!S.lotesCerrados) S.lotesCerrados = [];
      S.lotesCerrados.push({
        id: gid(), cid, nombreCorral: cor.nombre,
        fechaApertura, fechaCierre, animales,

    }
    if (!S.consumosVet) S.consumosVet = [];
    S.consumosVet.push({ id: gid(), cid, fecha, producto, frascos, animales, precio, obs });
    save(); setAlert('Registro veterinario guardado.','g'); render();
  });

  // Preview precio + subtotal al cambiar producto/frascos/fecha
  function actualizarVetRefs() {
    const prEl   = document.getElementById('vt-producto');
    const feEl   = document.getElementById('vt-fecha');
    const frEl   = document.getElementById('vt-frascos');
    const anEl   = document.getElementById('vt-animales');
    const cidEl  = document.getElementById('vt-cid');
    const pIn    = document.getElementById('vt-precio');
    const prRef  = document.getElementById('vt-precio-ref');
    const subRef = document.getElementById('vt-subtotal-ref');
    const wStock = document.getElementById('vt-warn-stock');
    const wDosis = document.getElementById('vt-warn-dosis');
    if (!prEl || !prRef) return;

    const key   = prEl.value;
    const fecha = feEl ? feEl.value || today() : today();
    const p     = precioVetVigente(key, fecha);
    const prod  = getProductosVet().find(x => x.key === key);

    // Rellenar campo precio con el vigente si está vacío
    if (pIn && !pIn.value && p) {
      pIn.value = p;
      pIn.style.color = 'var(--text3)'; // gris para indicar que es automático
    } else if (pIn && pIn.value && Number(pIn.value) === p) {
      pIn.style.color = 'var(--text3)';
    } else if (pIn && pIn.value) {
      pIn.style.color = 'var(--text)'; // negro = ingresado manualmente
    }

    const manualP = Number(pIn ? pIn.value : 0) || 0;
    const precioEfectivo = manualP > 0 ? manualP : (p || 0);

    // Precio vigente — referencia
    if (prRef) {
      if (p) {
        prRef.textContent = '✓ Precio vigente: ' + fmon(p) + '/frasco' + (manualP && manualP !== p ? ' (usando precio manual: ' + fmon(manualP) + ')' : '');
        prRef.style.color = 'var(--green)';
      } else {
        prRef.textContent = '⚠ Sin precio configurado para este producto';
        prRef.style.color = 'var(--red)';
      }
    }

    // Subtotal
    const fr = Number(frEl ? frEl.value : 0) || 0;
    if (subRef) {
      if (fr > 0 && precioEfectivo > 0) {
        let txt = '→ Subtotal: ' + fmon(fr * precioEfectivo);
        if (prod?.mlFrasco && prod?.mlDosis) {
          txt += '  ·  ~' + Math.round(fr * prod.mlFrasco / prod.mlDosis) + ' animales estimados';
        }
        subRef.textContent = txt;
      } else {
        subRef.textContent = '';
      }
    }

    // Validación stock
    const an  = Number(anEl ? anEl.value : 0) || 0;
    const cid = Number(cidEl ? cidEl.value : 0);
    if (wStock) {
      wStock.style.display = 'none';
      if (an > 0 && cid > 0) {
        const stk = stockAt(cid, fecha);
        if (an > stk) {
          wStock.textContent = '⛔ Animales tratados (' + fn(an,0) + ') supera el stock en esa fecha (' + fn(stk,0) + ' cab.).';
          wStock.style.display = 'block';
        }
      }
    }

    // Advertencia dosis
    if (wDosis) {
      wDosis.style.display = 'none';
      if (fr > 0 && an > 0 && prod?.mlFrasco && prod?.mlDosis) {
        const mlPorAnim = (fr * prod.mlFrasco) / an;
        const ratio = mlPorAnim / prod.mlDosis;
        if (ratio > 1.5) {
          wDosis.innerHTML = '⚠️ <strong>Dosis alta:</strong> ' + fn(mlPorAnim,1) + ' ml/animal (' + fn(ratio,1) + 'x la esperada de ' + fn(prod.mlDosis,1) + ' ml). ¿Revisás frascos o animales?';
          wDosis.style.display = 'block';
        } else if (ratio < 0.5) {
          wDosis.innerHTML = '⚠️ <strong>Dosis baja:</strong> ' + fn(mlPorAnim,1) + ' ml/animal (' + fn(ratio,2) + 'x la esperada). ¿Revisás frascos o animales?';
          wDosis.style.display = 'block';
        }
      }
    }
  }
  ['vt-producto','vt-fecha','vt-frascos','vt-animales','vt-precio','vt-cid'].forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      el.addEventListener('input',  actualizarVetRefs);
      el.addEventListener('change', actualizarVetRefs);
      el.addEventListener('keyup',  actualizarVetRefs);
    }
  });
  // Limpiar campo precio al cambiar producto/fecha para que se re-autocomplete
  ['vt-producto','vt-fecha'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('change', () => {
      const pIn = document.getElementById('vt-precio');
      if (pIn) { pIn.value = ''; pIn.style.color = 'var(--text3)'; }
    });
  });
  actualizarVetRefs();

  document.querySelectorAll('[data-edit-vt]').forEach(b => b.addEventListener('click', () => openEditConsumoVet(b.dataset.editVt)));
  document.querySelectorAll('[data-del-vt]').forEach(b => b.addEventListener('click', () => {
    if (confirm('¿Eliminás este registro?')) {
      S.consumosVet = (S.consumosVet||[]).filter(v=>v.id!==b.dataset.delVt);
      save(); render();
    }
  }));

  // ── CONFIG — ABM productos vet ────────────────────────────────────────────
  document.querySelectorAll('[data-edit-pvet]').forEach(b => b.addEventListener('click', () => openEditProductoVet(b.dataset.editPvet)));
  document.querySelectorAll('[data-del-pvet]').forEach(b => b.addEventListener('click', () => {
    if (confirm('¿Eliminás este producto?')) {
      if (!S.productosVet||!S.productosVet.length) S.productosVet = JSON.parse(JSON.stringify(getProductosVet()));
      S.productosVet = S.productosVet.filter(p=>p.key!==b.dataset.delPvet);
      S.preciosVet   = (S.preciosVet||[]).filter(p=>p.key!==b.dataset.delPvet);
      save(); render();
    }
  }));
  const btnNpvAdd = document.getElementById('btn-npv-add');
  if (btnNpvAdd) btnNpvAdd.addEventListener('click', () => {
    const label  = (document.getElementById('npv-label').value||'').trim();
    const icon   = (document.getElementById('npv-icon').value||'💉').trim();
    const mlFrasco = Number(document.getElementById('npv-frasco').value)||0;
    const mlDosis  = Number(document.getElementById('npv-dosis').value)||0;
    const precioDefault = Number(document.getElementById('npv-precio').value)||0;
    if (!label) { setAlert('Ingresá el nombre del producto.'); render(); return; }
    if (!S.productosVet||!S.productosVet.length) S.productosVet = JSON.parse(JSON.stringify(getProductosVet()));
    if (S.productosVet.some(p=>p.label.toLowerCase()===label.toLowerCase())) { setAlert('Ya existe un producto con ese nombre.'); render(); return; }
    const key = label.toLowerCase().replace(/[^a-z0-9]/g,'_') + '_' + Date.now().toString(36);
    S.productosVet.push({ key, label, icon, mlFrasco, mlDosis, precioDefault });
    save(); setAlert('"'+label+'" agregado.','g'); render();
  });

  // CONFIG — precios vet con vigencia
  const btnPvAdd = document.getElementById('btn-pv-add');
  if (btnPvAdd) btnPvAdd.addEventListener('click', () => {
    const key   = document.getElementById('pv-tipo').value;
    const fecha = document.getElementById('pv-fecha').value;
    const valor = Number(document.getElementById('pv-valor').value);
    if (!fecha||!valor||valor<=0) { setAlert('Completá todos los campos.'); render(); return; }
    if (!S.preciosVet) S.preciosVet = [];
    S.preciosVet = S.preciosVet.filter(p=>!(p.key===key&&p.fecha===fecha));
    S.preciosVet.push({ id: gid(), key, fecha, valor });
    save(); setAlert('Precio registrado.','g'); render();
  });
  document.querySelectorAll('[data-del-pv]').forEach(b => b.addEventListener('click', () => {
    if (confirm('¿Eliminás este precio?')) {
      S.preciosVet = (S.preciosVet||[]).filter(p=>p.id!==b.dataset.delPv);
      save(); render();
    }
  }));

}

<!DOCTYPE html>
<html lang="es"><head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Corrales — Agroganadera Los Médanos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #faf8f4; --bg2: #f3efe6; --bg3: #ece5d6;
  --text: #2b261f; --text2: #6b6357; --text3: #a39a89;
  --border: rgba(43,38,31,0.1); --border2: rgba(43,38,31,0.18);
  --green: #2f6b3f; --green-dark: #1f4d2b; --green-darker: #163a20;
  --green-bg: #e6efe3; --green-text: #1f4d2b;
  --blue: #b8860b; --blue-bg: #f5edd8; --blue-text: #8a6508;
  --red: #b3261e; --red-bg: #fbeae8; --red-text: #8c1d17;
  --teal-bg: #f6e8e0; --teal-text: #7a3a20;
  --navy: #1f4d2b; --navy-text: #e6efe3;
  --radius: 10px; --radius-lg: 16px;
  --serif: 'Aptos', 'Calibri', 'Segoe UI', -apple-system, sans-serif;
  --sans: 'Aptos', 'Calibri', 'Segoe UI', -apple-system, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--sans); background: var(--bg3); color: var(--text); font-size: 14px; min-height: 100vh; display: flex; flex-direction: column; }
.shell { flex: 1; display: flex; flex-direction: column; }

.app-header { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px 20px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.btn-inicio { position: absolute; top: 12px; left: 20px; font-size: 13px; font-weight: 700; color: #fff; background: var(--green); border: none; border-radius: 20px; padding: 7px 16px; text-decoration: none; transition: all .15s; }
.btn-inicio:hover { background: var(--green-dark); }
.app-header { position: relative; padding-top: 46px; }
.app-brand { display: flex; align-items: center; gap: 12px; }
.brand-icon { width: 42px; height: 42px; background: var(--green-dark); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 22px; }
.brand-name { font-family: var(--serif); font-size: 17px; font-weight: 700; letter-spacing: -.3px; color: var(--text); }
.brand-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }

.sidenav { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 8px; margin-bottom: 16px; display: flex; gap: 4px; flex-wrap: wrap; }
.snav { padding: 8px 14px; border-radius: var(--radius); cursor: pointer; font-size: 13px; background: transparent; color: var(--text2); transition: all .15s; display: flex; align-items: center; gap: 6px; border: none; font-family: inherit; }
.snav:hover { background: var(--bg2); color: var(--text); }
.snav.active { background: var(--navy); color: var(--navy-text); font-weight: 500; }

.corral-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.ctab { padding: 8px 16px; border: 0.5px solid var(--border); border-radius: var(--radius); cursor: pointer; font-size: 13px; font-weight: 500; background: var(--bg); color: var(--text2); transition: all .15s; font-family: inherit; }
.ctab:hover { border-color: var(--border2); color: var(--text); }
.ctab.active { background: var(--navy); color: var(--navy-text); border-color: var(--navy); }
.ctab .stk { font-size: 11px; opacity: .7; margin-left: 4px; }

.kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 1px; background: var(--border); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 18px; }
.kpi { background: var(--bg); padding: 16px 18px; }
.kpi.compact { padding: 7px 12px; }
.kpi.compact .kpi-icon { font-size: 14px; margin-bottom: 2px; }
.kpi.compact .kpi-label { font-size: 11px; margin-bottom: 2px; }
.kpi.compact .kpi-val { font-size: 16px; }
.kpi.compact .kpi-sub { font-size: 10.5px; }
.kpi-icon { font-size: 20px; margin-bottom: 6px; }
.kpi-label { font-size: 11px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 4px; }
.kpi-val { font-size: 21px; font-weight: 600; letter-spacing: -.5px; line-height: 1; color: var(--text); }
.kpi-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }
.kpi-pos { color: var(--green); }
.kpi-neg { color: var(--red); }

.tw { overflow-x: auto; border: 0.5px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 16px; background: var(--bg); }
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th { text-align: left; padding: 9px 12px; font-size: 11px; font-weight: 600; color: var(--text2); border-bottom: 0.5px solid var(--border); text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; background: var(--bg2); }
.data-table th.thc, .data-table td.tdc { text-align: center; border-left: 0.5px solid var(--border); }
.data-table td { padding: 9px 12px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tbody tr:hover td { background: var(--bg2); }
.total-row td { background: var(--bg2) !important; font-weight: 600; }
.cell-pair { display: flex; flex-direction: column; gap: 2px; align-items: center; }
.cell-peso { font-size: 13px; font-weight: 600; color: var(--text); }
.cell-cant { font-size: 11px; color: var(--text2); }

.panel { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px; margin-bottom: 16px; }
.card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px; margin-bottom: 16px; }
.panel-title { font-size: 14px; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; color: var(--text); }
.corral-summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 16px; }
.corral-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; }
.corral-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 0.5px solid var(--border); gap: 8px; }
.corral-card-name { font-size: 13px; font-weight: 500; line-height: 1.3; }
.corral-card-body { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.cc-item-label { font-size: 10px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: .4px; margin-bottom: 2px; }
.cc-item-val { font-size: 14px; font-weight: 600; color: var(--text); }

.fgrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 12px; }
.fg { display: flex; flex-direction: column; gap: 4px; }
.fg label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .4px; font-weight: 500; }
.fg input, .fg select { padding: 8px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); font-size: 13px; font-family: inherit; outline: none; transition: border-color .15s, box-shadow .15s; }
.fg input:focus, .fg select:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(29,158,117,.12); }

.btn { padding: 9px 16px; border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; border: none; display: inline-flex; align-items: center; gap: 6px; font-family: inherit; }
.btn-primary { background: var(--green); color: #fff; }
.btn-primary:hover { background: var(--green-dark); }
.btn-save { background: var(--green); color: #fff; padding: 7px 14px; font-size: 13px; }
.btn-save:hover { background: var(--green-dark); }
.btn-cancel { background: var(--bg2); color: var(--text2); border: 0.5px solid var(--border2); padding: 7px 14px; font-size: 13px; }
.btn-cancel:hover { background: var(--bg3); }
.btn-export { background: var(--navy); color: var(--navy-text); }
.btn-export:hover { background: var(--green-darker); }
.btn-save-manual { background: var(--green); color: #fff; }
.btn-save-manual:hover { background: var(--green-dark); }
.btn-import { background: var(--bg); color: var(--text2); border: 0.5px solid var(--border2); cursor: pointer; }
.btn-import:hover { background: var(--bg2); color: var(--text); }
.btn-del { background: transparent; border: 0.5px solid var(--border); color: var(--text3); padding: 4px 9px; font-size: 12px; border-radius: var(--radius); cursor: pointer; font-family: inherit; transition: all .15s; }
.btn-del:hover { background: var(--red-bg); color: var(--red-text); border-color: #F09595; }
.btn-edit { background: transparent; border: 0.5px solid var(--border); color: var(--text3); padding: 4px 9px; font-size: 12px; border-radius: var(--radius); cursor: pointer; font-family: inherit; transition: all .15s; margin-right: 4px; }
.btn-edit:hover { background: var(--blue-bg); color: var(--blue-text); border-color: #85B7EB; }
.td-actions { white-space: nowrap; }

.pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 99px; font-size: 11px; font-weight: 500; white-space: nowrap; }
.pill-green { background: var(--green-bg); color: var(--green-text); }
.pill-red { background: var(--red-bg); color: var(--red-text); }
.pill-blue { background: var(--blue-bg); color: var(--blue-text); }
.pill-teal { background: var(--teal-bg); color: var(--teal-text); }

.alert { padding: 10px 14px; border-radius: var(--radius); font-size: 13px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.alert-r { background: var(--red-bg); color: var(--red-text); border: 0.5px solid #F09595; }
.alert-g { background: var(--green-bg); color: var(--green-text); border: 0.5px solid #5DCAA5; }

.section-label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 10px; }
.stock-info { background: var(--green-bg); border: 0.5px solid #5DCAA5; border-radius: var(--radius); padding: 9px 13px; font-size: 13px; color: var(--green-text); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.chart-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 16px; }
.empty { text-align: center; padding: 36px; color: var(--text3); font-size: 13px; }
.empty-icon { font-size: 36px; display: block; margin-bottom: 8px; opacity: .4; }

/* ===== MODAL ===== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45);
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; padding: 20px;
}
.modal {
  background: var(--bg); border: 0.5px solid var(--border2);
  border-radius: var(--radius-lg); padding: 24px;
  width: 100%; max-width: 560px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.18);
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px; padding-bottom: 14px;
  border-bottom: 0.5px solid var(--border);
}
.modal-title { font-size: 15px; font-weight: 600; }
.modal-close { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--text3); line-height: 1; padding: 2px 6px; border-radius: var(--radius); }
.modal-close:hover { background: var(--bg2); color: var(--text); }
.modal-body .fgrid { margin-bottom: 0; }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; padding-top: 14px; border-top: 0.5px solid var(--border); }
.modal-info { background: var(--green-bg); border: 0.5px solid #5DCAA5; border-radius: var(--radius); padding: 8px 12px; font-size: 12px; color: var(--green-text); margin-bottom: 14px; }


/* ── SIDEBAR LAYOUT ─────────────────────────────────────────────────────── */
#root { flex: 1; }
.app-shell { display: flex; min-height: 100vh; }
.sidebar { width: 236px; flex-shrink: 0; background: var(--text); color: #e8e4dc; display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
.sidebar-brand { padding: 20px 18px 16px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.sidebar-brand .farm-icon { font-size: 24px; display: block; margin-bottom: 8px; }
.sidebar-brand .farm-name { font-family: var(--serif); font-size: 17px; font-weight: 600; color: #fff; letter-spacing: -.01em; line-height: 1.25; }
.sidebar-brand .farm-sub { font-size: 11px; color: #a39a89; margin-top: 3px; }
.btn-inicio-sidebar { display: inline-block; margin-top: 14px; font-size: 13px; font-weight: 700; color: #fff; text-decoration: none; border: 1.5px solid rgba(255,255,255,0.45); border-radius: 20px; padding: 8px 18px; transition: all .15s; letter-spacing: .01em; }
.btn-inicio-sidebar:hover { color: #fff; border-color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.1); }
.sidebar-nav { padding: 10px 8px; display: flex; flex-direction: column; gap: 2px; flex: 1; }
.snav-item { display: flex; align-items: center; gap: 9px; padding: 9px 12px; border-radius: var(--radius); color: #cfcbc0; font-size: 13px; background: transparent; border: none; cursor: pointer; width: 100%; text-align: left; font-family: inherit; transition: all .15s; }
.snav-item:hover { background: rgba(255,255,255,0.07); color: #fff; }
.snav-item.active { background: var(--green); color: #fff; }
.sidebar-footer { padding: 14px 18px; border-top: 1px solid rgba(255,255,255,0.08); font-size: 11px; color: #a39a89; display: flex; align-items: center; gap: 6px; }
.dot-ok { width: 7px; height: 7px; border-radius: 50%; background: #5DCAA5; flex-shrink: 0; }
.main-area { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.topbar { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.topbar h1 { font-family: var(--serif); font-size: 20px; font-weight: 700; letter-spacing: -.3px; }
.topbar-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }
.topbar-actions { display: flex; gap: 7px; flex-wrap: wrap; align-items: center; }
.main-content { padding: 20px 24px 60px; }

/* Row highlight when editing */
tr.editing td { background: var(--blue-bg) !important; }
</style>

</head>
<body>

<div class="shell">
  <div id="root"></div>
  <div id="modal-container"></div>
</div>

<script>
// CORRALES se gestiona dinámicamente desde S.corrales
// Esta función devuelve los corrales desde el estado (activos o todos)
function getCorrales(soloActivos=true) {
  const defecto = [
    { id: 1, nombre: 'Corral 1 El Cencerro', activo: true },
    { id: 2, nombre: 'Corral 1 El Misterio', activo: true },
    { id: 3, nombre: 'Corral 2 El Misterio', activo: true }
  ];
  const lista = (typeof S !== 'undefined' && S.corrales) ? S.corrales : defecto;
  return soloActivos ? lista.filter(c => c.activo !== false) : lista;
}
// Se actualiza en cada render()
let CORRALES = [];

const ALIMENTOS_DEFAULT = [
  { key: 'maiz',        label: 'Maíz',        unidad: 'kg',     icon: '🌽' },
  { key: 'rollos',      label: 'Rollos',      unidad: 'rollos', icon: '🌾' },
  { key: 'concentrado', label: 'Concentrado', unidad: 'kg',     icon: '📦' },
  { key: 'pasturas',    label: 'Pasturas',    unidad: 'kg',     icon: '🌿' },
];
// ALIMENTOS es siempre la lista activa (default + personalizados)
function getInsumos() { return (S.insumosExtra && S.insumosExtra.length) ? [...ALIMENTOS_DEFAULT, ...S.insumosExtra] : ALIMENTOS_DEFAULT; }
// Para compatibilidad con código existente que usa ALIMENTOS
const ALIMENTOS = ALIMENTOS_DEFAULT;

// Productos vet — unidad = frasco, precio = por frasco completo
const PRODUCTOS_VET_DEFAULT = [
  { key: 'suplenut', label: 'Suplenut', icon: '💉', precioDefault: 750000, mlFrasco: 500, mlDosis: 10 },
  { key: 'adevet',   label: 'Adevet',   icon: '💊', precioDefault: 500000, mlFrasco: 250, mlDosis: 4  },
];
function getProductosVet() { return (S.productosVet && S.productosVet.length) ? S.productosVet : PRODUCTOS_VET_DEFAULT; }
function precioVetVigente(key, fecha) {
  const lista = (S.preciosVet||[]).filter(p=>p.key===key&&p.fecha<=fecha).sort((a,b)=>b.fecha.localeCompare(a.fecha));
  if (lista.length) return Number(lista[0].valor);
  return getProductosVet().find(p=>p.key===key)?.precioDefault || null;
}
function precioVetHoy(key) { return precioVetVigente(key, today()); }
function costoVetTotal(cid) {
  return (S.consumosVet||[]).filter(v=>v.cid===cid).reduce((s,v)=>s+Number(v.frascos)*Number(v.precio),0);
}
function costoVetHastaPesada(cid) {
  const pes = (S.pesadas||[]).filter(p=>p.cid===cid).sort((a,b)=>a.fecha.localeCompare(b.fecha));
  const ultP = pes.length ? pes[pes.length-1] : null;
  if (!ultP) return costoVetTotal(cid);
  return (S.consumosVet||[]).filter(v=>v.cid===cid&&v.fecha<=ultP.fecha).reduce((s,v)=>s+Number(v.frascos)*Number(v.precio),0);
}
// Campos ganaderos del establecimiento
const CAMPOS_GANADEROS = [
  { id: 'cencerro',   nombre: 'El Cencerro' },
  { id: 'misterio',   nombre: 'El Misterio' },
  { id: 'clavo_chico',nombre: 'El Clavo Chico' },
];

// ── Funciones de stock de insumos ─────────────────────────────────────────
// Stock de un item: compras - consumos que lo referencian
function stockBolson(bid) {
  const b = (S.bolsones||[]).find(x=>x.id===bid);
  if (!b) return 0;
  const comprado = Number(b.cantInicial)||0;
  const consumido = (S.consumos||[]).filter(c=>c.bolsonId===bid).reduce((s,c)=>s+Number(c.cant),0);
  const consumidoCampo = (S.consumosCampo||[]).filter(c=>c.bolsonId===bid).reduce((s,c)=>s+Number(c.cant),0);
  const transferidoSalida = (S.transferenciasBolson||[]).filter(t=>t.bolsonOrigen===bid).reduce((s,t)=>s+Number(t.cant),0);
  const transferidoEntrada = (S.transferenciasBolson||[]).filter(t=>t.bolsonDestino===bid).reduce((s,t)=>s+Number(t.cant),0);
  return comprado - consumido - consumidoCampo - transferidoSalida + transferidoEntrada;
}
// Stock total de un alimento en un campo
function stockAlimCampo(campoId, tipoAlim) {
  return (S.bolsones||[]).filter(b=>b.campo===campoId&&b.tipo===tipoAlim&&b.activo!==false)
    .reduce((s,b)=>s+Math.max(0,stockBolson(b.id)),0);
}
// Stock total de un producto vet
function stockVetProducto(key) {
  const comprado = (S.comprasVet||[]).filter(c=>c.key===key).reduce((s,c)=>s+Number(c.frascos),0);
  const consumido = (S.consumosVet||[]).filter(c=>c.producto===key).reduce((s,c)=>s+Number(c.frascos||0),0);
  return comprado - consumido;
}

let S = { ingresos: [], ventas: [], consumos: [], pesadas: [], preciosStock: {}, pesoObjetivo: {}, precioProyectado: {}, lotesCerrados: [], corrales: null, notas: [], tipoCambio: [], preciosAlim: [], productosVet: null, preciosVet: [], consumosVet: [], bolsones: [], transferenciasBolson: [], comprasVet: [], insumosExtra: [], consumosCampo: [], moneda: 'ARS', page: 'dashboard', corral: 1, alert: null };
let chartInst = null, chartInst2 = null;

function gid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function today() { return new Date().toISOString().slice(0, 10); }
function fd(d) { if (!d) return '—'; const [y, m, dd] = d.split('-'); return `${dd}/${m}/${y}`; }
function fn(n, dec=2) { if (n == null || isNaN(n)) return '—'; return Number(n).toLocaleString('es-AR', { maximumFractionDigits: dec }); }
function fp(n) { if (n == null || isNaN(n)) return '—'; return '$ ' + Number(n).toLocaleString('es-AR', { maximumFractionDigits: 0 }); }
function pct(a, b) { if (!b) return '—'; return (a / b * 100).toFixed(1) + '%'; }

// Precio vigente de un alimento a una fecha dada
function precioAlimVigente(tipo, fecha) {
  const lista = (S.preciosAlim||[]).filter(p => p.tipo===tipo && p.fecha<=fecha)
                                    .sort((a,b) => b.fecha.localeCompare(a.fecha));
  return lista.length ? Number(lista[0].valor) : null;
}
// Precio vigente hoy para un alimento
function precioAlimHoy(tipo) { return precioAlimVigente(tipo, today()); }

// Tipo de cambio vigente a una fecha dada (último TC con fecha <= fecha dada)
function tcVigente(fecha) {
  const lista = (S.tipoCambio||[]).filter(t => t.fecha <= fecha).sort((a,b) => b.fecha.localeCompare(a.fecha));
  return lista.length ? Number(lista[0].valor) : null;
}
// TC vigente hoy
function tcHoy() { return tcVigente(today()); }
// Convertir pesos a USD usando TC de una fecha
function toUSD(pesos, fecha) {
  const tc = fecha ? tcVigente(fecha) : tcHoy();
  return tc && tc > 0 ? pesos / tc : null;
}
// Formatear en USD
function fusd(n) { if (n == null || isNaN(n)) return '—'; return 'U$S ' + Number(n).toLocaleString('es-AR', { maximumFractionDigits: 0 }); }
// Formatear según moneda activa
function fmon(n, fecha) {
  if (S.moneda === 'USD') { const u = toUSD(n, fecha||today()); return fusd(u); }
  return fp(n);
}

function stockAt(cid, f) {
  return S.ingresos.filter(i => i.cid === cid && i.fecha <= f).reduce((s,i) => s + Number(i.cant), 0)
       - S.ventas.filter(v => v.cid === cid && v.fecha <= f).reduce((s,v) => s + Number(v.cant), 0);
}
function stockNow(cid) { return stockAt(cid, '9999-12-31'); }
function totIng(cid)   { return S.ingresos.filter(i => i.cid === cid).reduce((s,i) => s + Number(i.cant), 0); }
function costoAlim(cid){ return S.consumos.filter(c => c.cid === cid).reduce((s,c) => s + Number(c.cant)*Number(c.precio), 0); }
// Costo de alimentación SOLO hasta la fecha de la última pesada (para calcular $/kg ganado)
function costoAlimHastaPesada(cid) {
  const pes = (S.pesadas||[]).filter(p => p.cid === cid).sort((a,b) => a.fecha.localeCompare(b.fecha));
  if (!pes.length) return costoAlim(cid); // sin pesada, usa el total
  const fechaUltPesada = pes[pes.length-1].fecha;
  return S.consumos.filter(c => c.cid === cid && c.fecha <= fechaUltPesada)
                   .reduce((s,c) => s + Number(c.cant)*Number(c.precio), 0);
}
// Fecha de última pesada (para mostrar en UI)
function fechaUltimaPesada(cid) {
  const pes = (S.pesadas||[]).filter(p => p.cid === cid).sort((a,b) => a.fecha.localeCompare(b.fecha));
  return pes.length ? pes[pes.length-1].fecha : null;
}
function costoCompra(cid){ return S.ingresos.filter(i => i.cid === cid).reduce((s,i) => s + Number(i.cant)*Number(i.kg)*Number(i.precio), 0); }
function ingVentas(cid){ return S.ventas.filter(v => v.cid === cid && !v.baja).reduce((s,v) => s + Number(v.cant)*Number(v.kg)*Number(v.precio), 0); }
function kgVend(cid)   { return S.ventas.filter(v => v.cid === cid && !v.baja).reduce((s,v) => s + Number(v.cant)*Number(v.kg), 0); }
function cantAlim(cid, tipo) { return S.consumos.filter(c => c.cid === cid && c.tipo === tipo).reduce((s,c) => s + Number(c.cant), 0); }
// Kilos totales ingresados al corral (suma cant*kg de cada lote)
function kgIngresados(cid) { return S.ingresos.filter(i => i.cid === cid).reduce((s,i) => s + Number(i.cant)*Number(i.kg), 0); }
// Kilos de los animales vendidos al momento de ingreso (kg base de los vendidos)
// Kg en stock estimados por corral (usa última pesada si existe, sino prom ingreso)
function kgStockEstimado(cid) {
  const stk = stockNow(cid);
  if (!stk) return 0;
  const pesadas = (S.pesadas||[]).filter(p => p.cid === cid).sort((a,b) => a.fecha.localeCompare(b.fecha));
  if (pesadas.length) {
    return stk * Number(pesadas[pesadas.length-1].kg);
  }
  const totalIng = totIng(cid);
  if (!totalIng) return 0;
  return stk * (kgIngresados(cid) / totalIng);
}
// Kilos ganados = kg vendidos + kg stock estimado - kg ingresados
function kgGanados(cid) { return Math.max(0, kgVend(cid) + kgStockEstimado(cid) - kgIngresados(cid)); }

// Kilos ganados CONSISTENTES con el corte de la última pesada:
// usa kg vendidos HASTA la pesada + (cant de la pesada × kg pesada) - kg ingresados
// Así numerador y denominador están al mismo corte de fecha para indicadores de eficiencia
function kgGanadosHastaPesada(cid) {
  const pes = (S.pesadas||[]).filter(p => p.cid === cid).sort((a,b) => a.fecha.localeCompare(b.fecha));
  if (!pes.length) return kgGanados(cid); // sin pesada, usa el total
  const ultima = pes[pes.length-1];
  const kgVendHP = S.ventas.filter(v => v.cid===cid && !v.baja && v.fecha <= ultima.fecha)
                           .reduce((s,v) => s + Number(v.cant)*Number(v.kg), 0);
  const kgStockPesada = Number(ultima.cant) * Number(ultima.kg);
  return Math.max(0, kgVendHP + kgStockPesada - kgIngresados(cid));
}

// ========== GITHUB SYNC ==========
const GITHUB_REPO  = 'agroganaderalosmedanos/corrales';
const GITHUB_FILE  = 'datos.json';
const GITHUB_API   = 'https://api.github.com/repos/' + GITHUB_REPO + '/contents/' + GITHUB_FILE;

function getGithubToken() { return localStorage.getItem('gh_token') || ''; }
function setGithubToken(t) { localStorage.setItem('gh_token', t); }

async function syncToGithub() {
  const token = getGithubToken();
  if (!token) return; // silently skip if no token
  const data = JSON.stringify({ ingresos: S.ingresos, ventas: S.ventas, consumos: S.consumos, pesadas: S.pesadas, preciosStock: S.preciosStock, pesoObjetivo: S.pesoObjetivo, precioProyectado: S.precioProyectado, lotesCerrados: S.lotesCerrados, corrales: S.corrales, tipoCambio: S.tipoCambio, preciosAlim: S.preciosAlim, notas: S.notas, productosVet: S.productosVet, preciosVet: S.preciosVet, consumosVet: S.consumosVet, moneda: S.moneda }, null, 2);
  try {
    // Get current SHA
    const getRes = await fetch(GITHUB_API, { headers: { Authorization: 'token ' + token, 'User-Agent': 'corrales-app' }});
    let sha = null;
    if (getRes.ok) { const j = await getRes.json(); sha = j.sha; }
    // Put new content
    const body = { message: 'Actualizacion de datos', content: btoa(unescape(encodeURIComponent(data))) };
    if (sha) body.sha = sha;
    const putRes = await fetch(GITHUB_API, { method: 'PUT', headers: { Authorization: 'token ' + token, 'Content-Type': 'application/json', 'User-Agent': 'corrales-app' }, body: JSON.stringify(body) });
    if (!putRes.ok) throw new Error('HTTP ' + putRes.status);
  } catch(e) { console.warn('GitHub sync error:', e); }
}

async function loadFromGithub() {
  const token = getGithubToken();
  if (!token) return false;
  try {
    const res = await fetch(GITHUB_API, { headers: { Authorization: 'token ' + token, 'User-Agent': 'corrales-app' }});
    if (!res.ok) return false;
    const j = await res.json();
    const d = JSON.parse(decodeURIComponent(escape(atob(j.content))));
    S.ingresos = d.ingresos||[]; S.ventas = d.ventas||[]; S.consumos = d.consumos||[]; S.pesadas = d.pesadas||[];
    S.preciosStock = d.preciosStock||{}; S.pesoObjetivo = d.pesoObjetivo||{}; S.precioProyectado = d.precioProyectado||{};
    S.lotesCerrados = d.lotesCerrados||[]; S.corrales = d.corrales||null; S.tipoCambio = d.tipoCambio||[];
    S.preciosAlim = d.preciosAlim||[]; S.notas = d.notas||[]; S.productosVet = d.productosVet||null;
    S.preciosVet = d.preciosVet||[]; S.consumosVet = d.consumosVet||[];
    if (d.moneda) S.moneda = d.moneda;
    return true;
  } catch(e) { console.warn('GitHub load error:', e); return false; }
}

function getHtmlContentRaw() {
  const data = JSON.stringify({ ingresos: S.ingresos, ventas: S.ventas, consumos: S.consumos, pesadas: S.pesadas, preciosStock: S.preciosStock, pesoObjetivo: S.pesoObjetivo, precioProyectado: S.precioProyectado, lotesCerrados: S.lotesCerrados, corrales: S.corrales, tipoCambio: S.tipoCambio, preciosAlim: S.preciosAlim, notas: S.notas, productosVet: S.productosVet, preciosVet: S.preciosVet, consumosVet: S.consumosVet, bolsones: S.bolsones, transferenciasBolson: S.transferenciasBolson, comprasVet: S.comprasVet, insumosExtra: S.insumosExtra, consumosCampo: S.consumosCampo, moneda: S.moneda });

  // Limpiamos #root antes de capturar el outerHTML (evita guardar DOM renderizado)
  const rootEl = document.getElementById('root');
  const savedRoot = rootEl.innerHTML;
  rootEl.innerHTML = '';
  let html = document.documentElement.outerHTML;
  rootEl.innerHTML = savedRoot;

  // Reemplaza el bloque INIT completo (datos + render) con datos frescos
  html = html.replace(
    /\/\/ INIT\ntry\{const _d=[\s\S]*?render\(\);\n<\/script>/,
    `// INIT\ntry{const _d=${data};S.ingresos=_d.ingresos;S.ventas=_d.ventas;S.consumos=_d.consumos;S.pesadas=_d.pesadas||[];S.preciosStock=_d.preciosStock||{};S.pesoObjetivo=_d.pesoObjetivo||{};S.precioProyectado=_d.precioProyectado||{};S.lotesCerrados=_d.lotesCerrados||[];S.corrales=_d.corrales||null;S.tipoCambio=_d.tipoCambio||[];S.preciosAlim=_d.preciosAlim||[];S.notas=_d.notas||[];S.productosVet=_d.productosVet||null;S.preciosVet=_d.preciosVet||[];S.consumosVet=_d.consumosVet||[];S.bolsones=_d.bolsones||[];S.transferenciasBolson=_d.transferenciasBolson||[];S.comprasVet=_d.comprasVet||[];S.insumosExtra=_d.insumosExtra||[];S.consumosCampo=_d.consumosCampo||[];if(_d.moneda)S.moneda=_d.moneda;}catch(e){loadData();}\nrender();\n<\/script>`
  );
  return html;
}
function loadData() {
  try {
    const r = localStorage.getItem('corrales_data');
    if (r) { const d = JSON.parse(r); S.ingresos = d.ingresos||[]; S.ventas = d.ventas||[]; S.consumos = d.consumos||[]; S.pesadas = d.pesadas||[]; S.preciosStock = d.preciosStock||{}; S.pesoObjetivo = d.pesoObjetivo||{}; S.precioProyectado = d.precioProyectado||{}; S.lotesCerrados = d.lotesCerrados||[]; S.tipoCambio = d.tipoCambio||[]; S.preciosAlim = d.preciosAlim||[]; S.notas = d.notas||[]; S.productosVet = d.productosVet||null; S.preciosVet = d.preciosVet||[]; S.consumosVet = d.consumosVet||[]; S.bolsones = d.bolsones||[]; S.transferenciasBolson = d.transferenciasBolson||[]; S.comprasVet = d.comprasVet||[]; S.insumosExtra = d.insumosExtra||[]; S.consumosCampo = d.consumosCampo||[]; if(d.moneda) S.moneda = d.moneda; }
  } catch(e) {}
  // Try to load fresh data from GitHub (async — updates after first render)
  if (getGithubToken()) {
    loadFromGithub().then(ok => { if (ok) { save(); render(); } });
  }
}

    const kg = Number(kgEl?.value)||0;
    const pr = Number(prEl?.value)||0;
    let kgNetos = kg;
    if (!esFrigo) {
      const desb = Number(document.getElementById('me-liq-desbaste')?.value)||0;
      kgNetos = kg * (1 - desb/100);
    }
    if (kg > 0 && pr > 0) {
      const imp = Math.round(kgNetos * pr);
      if (impEl) impEl.value = imp;
      if (prevEl) prevEl.textContent = '→ ' + fn(kgNetos,0) + ' kg × ' + fmon(pr) + '/kg = ' + fmon(imp);
    }
  };
  document.getElementById('me-save').onclick = () => {
    const f        = document.getElementById('me-fecha').value;
    const tipo     = document.getElementById('me-tipo').value;
    const c        = Number(document.getElementById('me-cant').value);
    const k        = Number(document.getElementById('me-kg').value);
    const comprador = (document.getElementById('me-comprador').value||'').trim();
    const pPactado = Number(document.getElementById('me-precio').value)||0;
    const obs      = (document.getElementById('me-obs').value||'').trim();
    const esBaja   = tipo === 'baja';
    if (!f || c < 1 || k < 1) { alert('Completá fecha, cantidad y kilos.'); return; }
    const tempVentas = S.ventas.filter(v => v.id !== id);
    const ingF = S.ingresos.filter(i => i.cid === item.cid && i.fecha <= f).reduce((s,i)=>s+Number(i.cant),0);
    const venF = tempVentas.filter(v => v.cid === item.cid && v.fecha <= f).reduce((s,v)=>s+Number(v.cant),0);
    if (c > ingF - venF) { alert('No hay '+c+' animales disponibles en esa fecha.'); return; }
    let updated = { ...item, fecha:f, tipo, cant:c, kg:k, comprador, precioPactado:pPactado, obs, baja:esBaja, precio:pPactado };
    // Update liquidacion if present
    if (item.liquidado) {
      const kgLiq  = Number(document.getElementById('me-liq-kg')?.value)||0;
      const prLiq  = Number(document.getElementById('me-liq-precio')?.value)||0;
      const impLiq = Number(document.getElementById('me-liq-importe')?.value)||0;
      const rinde  = esFrigo ? Number(document.getElementById('me-liq-rinde')?.value)||0 : null;
      const desb   = !esFrigo ? Number(document.getElementById('me-liq-desbaste')?.value)||0 : null;
      const kgNetos = esFrigo ? kgLiq : kgLiq*(1-(desb||0)/100);
      updated = { ...updated, kgLiquidados:kgNetos, rinde, desbaste:desb, precioLiq:prLiq, importeTotal:impLiq,
        precio: kgNetos>0 ? impLiq/kgNetos : pPactado };
    }
    S.ventas = S.ventas.map(v => v.id === id ? updated : v);
    save(); closeModal(); setAlert('Salida actualizada correctamente.', 'g'); render();
  };
}

// ========== FILE SYSTEM ACCESS API — guardar en carpeta elegida ==========
let _fileHandle = null; // persiste en memoria mientras la página está abierta

function getHtmlContent() {
  save();
  return getHtmlContentRaw();
}

async function guardarDatos() {
  const html = getHtmlContent();
  const blob = new Blob([html], { type: 'text/html' });

  // File System Access API available (Chrome / Edge)
  if (window.showSaveFilePicker) {
    try {
      // If we already have a handle, write directly without asking
      if (_fileHandle) {
        try {
          const writable = await _fileHandle.createWritable();
          await writable.write(blob);
          await writable.close();
          setAlert('✓ Guardado en ' + _fileHandle.name, 'g');
          render();
          return;
        } catch(e) {
          // Handle expired or revoked — ask again
          _fileHandle = null;
        }
      }
      // First time: ask the user where to save
      _fileHandle = await window.showSaveFilePicker({
        suggestedName: 'corrales_engorde.html',
        types: [{ description: 'Página web', accept: { 'text/html': ['.html'] } }]
      });
      const writable = await _fileHandle.createWritable();
      await writable.write(blob);
      await writable.close();
      setAlert('✓ Archivo guardado en ' + _fileHandle.name + ' — la próxima vez se guardará automáticamente ahí.', 'g');
      render();
      return;
    } catch(e) {
      if (e.name === 'AbortError') return; // user cancelled — do nothing
      _fileHandle = null;
    }
  }

  // Fallback para Firefox / Safari
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'corrales_engorde.html';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  setAlert('Archivo guardado (tu navegador no soporta elección de carpeta — usá Chrome o Edge).', 'g');
  render();
}
function generarPDF() {
  const hoy = today();
  const fd2 = d => { if(!d) return '—'; const [y,m,dd]=d.split('-'); return `${dd}/${m}/${y}`; };
  const fm = n => n==null||isNaN(n)?'—':Number(n).toLocaleString('es-AR',{maximumFractionDigits:0});
  const fm2 = (n,d=2) => n==null||isNaN(n)?'—':Number(n).toLocaleString('es-AR',{maximumFractionDigits:d});
  const fp2 = n => n==null||isNaN(n)?'—':'$ '+Number(n).toLocaleString('es-AR',{maximumFractionDigits:0});

  // Tipo de cambio para el PDF — usar TC de hoy
  const tcPDF = tcHoy();
  const showUSD = S.moneda === 'USD' && tcPDF;
  // fu2: formatea en USD para el PDF
  const fu2 = n => n==null||isNaN(n)||!tcPDF ? '—' : 'U$S '+Number(n/tcPDF).toLocaleString('es-AR',{maximumFractionDigits:0});
  // fdu: muestra $ y U$S si hay lugar, o solo U$S si toggle activo, o solo $ si toggle ARS
  const fdu = (n, compact=false) => {
    if (!tcPDF) return fp2(n);
    if (compact) return showUSD ? fu2(n) : fp2(n);
    return `${fp2(n)}<br><span style="font-size:8px;color:#888">${fu2(n)}</span>`;
  };

  // ── Calcular datos de cada corral ────────────────────────────────────────
  const datos = CORRALES.map(c => {
    const cid = c.id;
    const ings = S.ingresos.filter(i=>i.cid===cid);
    const pes  = (S.pesadas||[]).filter(p=>p.cid===cid).sort((a,b)=>a.fecha.localeCompare(b.fecha));
    const stk  = stockNow(cid);
    const ing  = totIng(cid);
    const vend = ing - stk;
    const kgI  = kgIngresados(cid);
    const kgV  = kgVend(cid);
    const kgG  = kgGanadosHastaPesada(cid);
    const kgStk= kgStockEstimado(cid);
    const cc   = costoCompra(cid);
    const ca   = costoAlim(cid);
    const caHP = costoAlimHastaPesada(cid);
    const ivV  = ingVentas(cid);
    const ultima = pes.length ? pes[pes.length-1] : null;
    const stkP = Number((S.preciosStock||{})[cid]||0);
    const ivStock = stkP>0&&ultima ? stk*ultima.kg*stkP : 0;
    const ivTotal = ivV + ivStock;
    const util = ivTotal - cc - ca;
    // Ganancia diaria real
    const totI2 = ings.reduce((s,i)=>s+Number(i.cant),0);
    const kgProm = totI2>0 ? ings.reduce((s,i)=>s+Number(i.cant)*Number(i.kg),0)/totI2 : 0;
    const fi = ings.length ? ings.map(i=>i.fecha).sort()[0] : null;
    const diasLote = fi&&ultima ? Math.round((new Date(ultima.fecha)-new Date(fi))/86400000) : null;
    const ganDiaria = diasLote&&diasLote>0&&kgProm>0&&ultima ? (Number(ultima.kg)-kgProm)/diasLote : null;
    // Break-even
    const costoARecuperar = (cc+ca) - ivV;
    const breakEven = kgStk>0 ? costoARecuperar/kgStk : null;
    // Proyeccion
    const pesoObj = Number((S.pesoObjetivo||{})[cid]||520);
    const precioP = Number((S.precioProyectado||{})[cid]||0);
    let ganProy=null, diasRest=null, fSalida=null;
    if (pes.length>=2) {
      const p1=pes[pes.length-2],p2=pes[pes.length-1];
      const d=Math.round((new Date(p2.fecha)-new Date(p1.fecha))/86400000);
      if(d>0) ganProy=(Number(p2.kg)-Number(p1.kg))/d;
    } else if (ultima&&fi&&kgProm>0) {
      ganProy = ganDiaria;
    }
    if (ganProy&&ganProy>0&&ultima&&Number(ultima.kg)<pesoObj) {
      diasRest = Math.ceil((pesoObj-Number(ultima.kg))/ganProy);
      const ds = new Date(ultima.fecha); ds.setDate(ds.getDate()+diasRest);
      fSalida = ds.toISOString().slice(0,10);
    }
    return { c, cid, stk, ing, vend, kgI, kgV, kgG, kgStk,
             cc, ca, caHP, ivV, ivStock, ivTotal, util,
             kgProm, ultima, fi, diasLote, ganDiaria, ganProy,
             pesoObj, precioP, diasRest, fSalida, breakEven,
             pes, kgG_animal: (ultima && kgProm>0) ? Number(ultima.kg)-kgProm : null };
  });

  const totStk   = datos.reduce((s,d)=>s+d.stk,0);

          const caXkgG = d.kgG>0 ? d.caHP/d.kgG : null;
      
          const pvProm = d.kgV>0 ? d.ivV/d.kgV : null;
          const beOk = d.breakEven!==null && pvProm!==null && pvProm >= d.breakEven;
          return `<tr>
            <td><strong>${d.c.nombre}</strong></td>
            <td class="c">${d.diasLote!==null?d.diasLote+' días':'—'}</td>
            <td class="r" style="color:#1D9E75;font-weight:700">${fm(d.kgG)} kg</td>
            <td class="r">${d.ganDiaria?fm2(d.ganDiaria,3)+' kg/d':'—'}</td>
            <td class="r">${caXkgG?fdu(caXkgG, true):'—'}</td>
            <td class="r">${pvProm?fdu(pvProm, true):'—'}</td>
            <td class="r" style="font-weight:700;${d.breakEven?(beOk?'color:#1D9E75':'color:#E24B4A'):''}">
              ${d.breakEven?fdu(d.breakEven, true):'—'}
            </td>
            <td class="c">
              ${d.breakEven&&pvProm ? `<span class="pill ${beOk?'pill-g':'pill-r'}">${beOk?'✓ OK':'⚠ Bajo'}</span>` : '—'}
            </td>
          </tr>`;
        }).join('')}
        </tbody>
      </table>
      <div style="font-size:8px;color:#888;margin-top:-6px">* Break-even = precio mínimo por kg de stock para recuperar costos totales. "Alim./kg gan." calculado al corte de la última pesada de cada corral.</div>
    </div>

    <div class="section">
      <h2>📈 Evolución de Peso por Corral</h2>
      ${(() => {
        const chartH = 130, chartW = 480, padL=50, padR=30, padT=15, padB=30;
        const innerW = chartW-padL-padR, innerH = chartH-padT-padB;
        const colors = ['#1D9E75','#185FA5','#E24B4A'];

        const series = datos.map((d,i) => {
          const pts = [];
          if (d.fi) pts.push({ fecha: d.fi, kg: d.kgProm });
          d.pes.forEach(p => pts.push({ fecha: p.fecha, kg: Number(p.kg) }));
          return { nombre: d.c.nombre, color: colors[i%colors.length], pts };
        }).filter(s => s.pts.length >= 2);

        if (!series.length) return '<div style="text-align:center;color:#888;padding:20px">Sin pesadas registradas</div>';

        const allDates = series.flatMap(s=>s.pts.map(p=>p.fecha)).sort();
        const allKg    = series.flatMap(s=>s.pts.map(p=>p.kg));
        const minDate  = new Date(allDates[0]);
        const maxDate  = new Date(allDates[allDates.length-1]);
        const totalDays= Math.max(1, Math.round((maxDate-minDate)/86400000));
        const minKg    = Math.floor(Math.min(...allKg)/50)*50;
        const maxKg    = Math.ceil(Math.max(...allKg)/50)*50+50;
        const rangeKg  = maxKg - minKg;
        const xOf = f => padL + (Math.round((new Date(f)-minDate)/86400000)/totalDays)*innerW;
        const yOf = k => padT + innerH - ((k-minKg)/rangeKg)*innerH;

        let svg = `<svg viewBox="0 0 ${chartW} ${chartH}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:${chartH}px">`;
        for(let k=minKg; k<=maxKg; k+=50) {
          const y=yOf(k);
          svg += `<line x1="${padL}" y1="${y}" x2="${chartW-padR}" y2="${y}" stroke="#e8f0e8" stroke-width="0.5"/>`;
          svg += `<text x="${padL-4}" y="${y+3}" text-anchor="end" font-size="7" fill="#999">${k}</text>`;
        }
        svg += `<line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT+innerH}" stroke="#ccc" stroke-width="1"/>`;
        svg += `<line x1="${padL}" y1="${padT+innerH}" x2="${chartW-padR}" y2="${padT+innerH}" stroke="#ccc" stroke-width="1"/>`;
        const pObjGlobal = datos[0]?.pesoObj||520;
        if (pObjGlobal>=minKg && pObjGlobal<=maxKg) {
          const yObj = yOf(pObjGlobal);
          svg += `<line x1="${padL}" y1="${yObj}" x2="${chartW-padR}" y2="${yObj}" stroke="#1D9E75" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>`;
          svg += `<text x="${chartW-padR+2}" y="${yObj+3}" font-size="7" fill="#1D9E75">Obj</text>`;
        }
        series.forEach(s => {
          const pts = s.pts.map(p=>({x:xOf(p.fecha),y:yOf(p.kg),kg:p.kg}));
          svg += `<path d="${pts.map((p,i)=>(i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`)).join(' ')}" stroke="${s.color}" stroke-width="2" fill="none" stroke-linejoin="round"/>`;
          pts.forEach(p => {
            svg += `<circle cx="${p.x}" cy="${p.y}" r="3" fill="${s.color}"/>`;
            svg += `<text x="${p.x}" y="${p.y-5}" text-anchor="middle" font-size="7" fill="${s.color}" font-weight="600">${p.kg}</text>`;
          });
        });
        const legY = padT+innerH+20;
        series.forEach((s,i) => {
          const lx = padL + i*(innerW/series.length);
          svg += `<rect x="${lx}" y="${legY-7}" width="12" height="4" rx="2" fill="${s.color}"/>`;
          svg += `<text x="${lx+15}" y="${legY}" font-size="7.5" fill="#444">${s.nombre}</text>`;
        });
        svg += `</svg>`;
        return svg;
      })()}
    </div>

    <div class="section">
      <h2>📊 Eficiencia de Conversión — Costo Alim. por Kg Ganado</h2>
      <div style="font-size:8px;color:#666;margin-bottom:8px">Indicador comparativo real: cuánto costó producir cada kg de engorde, al corte de la última pesada de cada corral. Menor valor = mayor eficiencia.</div>
      ${(() => {
        const barData = datos.map((d,i) => ({
          nombre: d.c.nombre,
          val: d.kgG>0 ? d.caHP/d.kgG : null,
          color: ['#1D9E75','#185FA5','#E24B4A'][i%3],
        })).filter(x=>x.val!==null);

        if (!barData.length) return '<div style="color:#888;font-size:9px">Sin datos suficientes</div>';

        const maxVal = Math.max(...barData.map(x=>x.val));
        const chartH2=100, chartW2=480, padL2=55, padR2=20, padT2=10, padB2=25;
        const innerW2=chartW2-padL2-padR2, innerH2=chartH2-padT2-padB2;
        const barW = Math.min(60, (innerW2/barData.length)*0.5);
        const gap  = innerW2/barData.length;

        let svg2 = `<svg viewBox="0 0 ${chartW2} ${chartH2}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:${chartH2}px">`;
        // Grid lines
        const gridStep = Math.ceil(maxVal/4/100)*100;
        for(let v=0; v<=maxVal+gridStep; v+=gridStep) {
          const y2 = padT2 + innerH2 - (v/maxVal)*innerH2;
          if(y2 >= padT2) {
            svg2 += `<line x1="${padL2}" y1="${y2}" x2="${chartW2-padR2}" y2="${y2}" stroke="#e8f0e8" stroke-width="0.5"/>`;
            svg2 += `<text x="${padL2-4}" y="${y2+3}" text-anchor="end" font-size="7" fill="#999">$${(v/1000).toFixed(0)}k</text>`;
          }
        }
        svg2 += `<line x1="${padL2}" y1="${padT2}" x2="${padL2}" y2="${padT2+innerH2}" stroke="#ccc" stroke-width="1"/>`;
        svg2 += `<line x1="${padL2}" y1="${padT2+innerH2}" x2="${chartW2-padR2}" y2="${padT2+innerH2}" stroke="#ccc" stroke-width="1"/>`;

        barData.forEach((b,i) => {
          const x = padL2 + i*gap + gap/2 - barW/2;
          const barH2 = (b.val/maxVal)*innerH2;
          const y2 = padT2 + innerH2 - barH2;
          // Bar with gradient effect
          svg2 += `<rect x="${x}" y="${y2}" width="${barW}" height="${barH2}" rx="3" fill="${b.color}" opacity="0.85"/>`;
          // Value label on top
          svg2 += `<text x="${x+barW/2}" y="${y2-3}" text-anchor="middle" font-size="8" fill="${b.color}" font-weight="700">$${(b.val/1000).toFixed(1)}k</text>`;
          // Corral label below
          const shortName = b.nombre.replace('Corral ','C').replace(' El ',' ');
          svg2 += `<text x="${x+barW/2}" y="${padT2+innerH2+14}" text-anchor="middle" font-size="7" fill="#444">${shortName}</text>`;
        });
        svg2 += `</svg>`;
        return svg2;
      })()}
    </div>
    ${footer(2,3)}
  </div>`;

  // ════════════════════════════════════════════════════
  // PÁGINA 3 — PROYECCIÓN DE SALIDAS + DETALLE CORRALES
  // ════════════════════════════════════════════════════
  html += `<div class="page">
    <div class="header">
      <div class="brand"><div class="brand-icon">🐄</div>
        <div><div class="brand-name">Agroganadera Los Médanos</div><div class="brand-sub">Proyección de Salidas</div></div>
      </div>
      <div class="report-info"><div>${fd2(hoy)}</div></div>
    </div>

    <div class="section">
      <h2>🎯 Proyección de Salida por Corral</h2>
      <div class="kpi-row kpi-row-3">
        ${datos.map(d => {
          const kgActual = d.ultima ? Number(d.ultima.kg) : null;
          const yaOk = kgActual !== null && kgActual >= d.pesoObj;
          return `<div class="kpi ${yaOk?'green':'blue'}">
            <div class="kpi-label">${d.c.nombre}</div>
            ${yaOk
              ? `<div class="kpi-val sm pos">✅ Listo</div><div class="kpi-sub">${kgActual} kg ≥ ${d.pesoObj} kg objetivo</div>`
              : d.fSalida
                ? `<div class="kpi-val" style="font-size:13px">${fd2(d.fSalida)}</div>
                   <div class="kpi-sub">en ${d.diasRest} días · ${kgActual||'?'} → ${d.pesoObj} kg</div>`
                : `<div class="kpi-val sm" style="color:#888">Sin datos</div><div class="kpi-sub">registrá pesadas</div>`
            }
          </div>`;
        }).join('')}
      </div>
      <table style="margin-top:8px">
        <thead><tr>
          <th>Corral</th><th class="c">Días</th><th class="c">Stock</th><th class="r">Kg actual</th>
          <th class="r">Kg objetivo</th><th class="r">Faltan (kg)</th>
          <th class="r">Gan. diaria proy.</th><th class="c">Fecha salida</th>
          <th class="r">Kg totales</th><th class="r">Ingreso estimado</th>
        </tr></thead><tbody>
        ${datos.map(d => {
          const kgActual = d.ultima ? Number(d.ultima.kg) : null;
          const yaOk = kgActual!==null && kgActual>=d.pesoObj;
          const ingEst = d.precioP>0 ? d.stk*d.pesoObj*d.precioP : null;
          return `<tr>
            <td><strong>${d.c.nombre}</strong></td>
            <td class="c">${d.diasLote!==null?d.diasLote+' d':'—'}</td>
            <td class="c">${fm(d.stk)}</td>
            <td class="r">${kgActual?fm(kgActual)+' kg':'—'}</td>
            <td class="r">${fm(d.pesoObj)} kg</td>
            <td class="r">${kgActual&&!yaOk?fm(d.pesoObj-kgActual)+' kg':'—'}</td>
            <td class="r">${d.ganProy?fm2(d.ganProy,3)+' kg/d':'—'}</td>
            <td class="c" style="${yaOk?'color:#1D9E75;font-weight:700':''}">${yaOk?'✅ Listo':(d.fSalida?fd2(d.fSalida):'—')}</td>
            <td class="r">${fm(d.stk*d.pesoObj)} kg</td>
            <td class="r" style="color:#1D9E75;font-weight:700">${ingEst?fdu(ingEst, true):'—'}</td>
          </tr>`;
        }).join('')}
        </tbody>
      </table>
    </div>

    <div class="section">
      <h2>🏚️ Detalle por Corral</h2>
      ${datos.map(d => {
        const kgActual = d.ultima ? Number(d.ultima.kg) : null;
        return `
        <div class="corral-header">${d.c.nombre} &nbsp;·&nbsp; ${fm(d.stk)} animales en stock &nbsp;·&nbsp; ${d.diasLote!==null?d.diasLote+' días en lote &nbsp;·&nbsp; ':''} ${fd2(d.fi||'')} → ${fd2(d.ultima?.fecha||'')}</div>
        <div class="corral-body">
          <div class="two-col">
            <div>
              <h3>Productivo</h3>
              <table style="margin-bottom:0">
                <tr><td>Kg ingresados</td><td class="r">${fm(d.kgI)} kg</td></tr>
                <tr><td>Kg vendidos</td><td class="r">${fm(d.kgV)} kg</td></tr>
                <tr><td>Kg en stock (pesada)</td><td class="r">${fm(d.kgStk)} kg</td></tr>
                <tr><td style="color:#1D9E75;font-weight:700">Kg ganados</td><td class="r" style="color:#1D9E75;font-weight:700">${fm(d.kgG)} kg</td></tr>
                <tr><td>Ganancia por animal</td><td class="r">${d.kgG_animal?fm2(d.kgG_animal,1)+' kg':'—'}</td></tr>
                <tr><td>Ganancia diaria real</td><td class="r">${d.ganDiaria?fm2(d.ganDiaria,3)+' kg/día':'—'}</td></tr>
                <tr><td>Kg prom. ingreso</td><td class="r">${fm2(d.kgProm,1)} kg</td></tr>
                <tr><td>Kg prom. última pesada</td><td class="r">${kgActual?fm2(kgActual,1)+' kg':'—'}</td></tr>
              </table>
            </div>
            <div>
              <h3>Económico</h3>
              <table style="margin-bottom:0">
                <tr><td>Costo de compra</td><td class="r">${fdu(d.cc, true)}</td></tr>
                <tr><td>Costo alim. total</td><td class="r">${fdu(d.ca, true)}</td></tr>
                <tr><td>Costo alim. hasta pesada</td><td class="r">${fdu(d.caHP, true)}</td></tr>
                <tr><td>Alim. hasta pesada / kg gan.</td><td class="r">${d.kgG>0?fdu(d.caHP/d.kgG, true):'—'}</td></tr>
                <tr><td>Ingreso por ventas</td><td class="r">${fdu(d.ivV, true)}</td></tr>
                <tr><td>Stock valorizado</td><td class="r">${d.ivStock>0?fdu(d.ivStock, true):'—'}</td></tr>
                <tr><td style="font-weight:700">Utilidad neta</td><td class="r" style="font-weight:700;${d.util>=0?'color:#1D9E75':'color:#E24B4A'}">${fdu(d.util, true)}</td></tr>
                <tr><td>Break-even ($/kg stock)</td><td class="r" style="font-weight:700">${d.breakEven?fdu(d.breakEven, true):'—'}</td></tr>
              </table>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>
    ${footer(3,3)}
  </div>
  </body></html>`;

  // ── Abrir en ventana e imprimir ──────────────────────────────────────────
  const win = window.open('','_blank','width=900,height=700');
  win.document.write(html);
  win.document.close();
  win.onload = () => {
    setTimeout(() => win.print(), 400);
  };
}

function exportarExcel() {
  // Generamos un .xls con HTML interno — una sola pestaña con colores reales

  const esc = v => String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const fnum = (n, dec=0) => isNaN(n)||n==null ? '' : Number(n).toLocaleString('es-AR',{maximumFractionDigits:dec});
  const fpeso = n => isNaN(n)||n==null ? '' : '$ '+Number(n).toLocaleString('es-AR',{maximumFractionDigits:0});

  const css = `<style>
    body{font-family:Calibri,Arial,sans-serif;font-size:11pt}
    table{border-collapse:collapse;margin-bottom:20pt}
    td,th{border:1px solid #CCCCCC;padding:4px 10px;vertical-align:middle;white-space:nowrap}
    .titulo   {background:#0F3D2E;color:#fff;font-size:14pt;font-weight:bold;padding:10px 14px}
    .subtitulo{background:#0F3D2E;color:#9FE1CB;font-size:11pt;font-weight:bold;padding:6px 14px}
    .sec-g    {background:#1D9E75;color:#fff;font-weight:bold;font-size:10pt;padding:5px 10px}
    .sec-b    {background:#185FA5;color:#fff;font-weight:bold;font-size:10pt;padding:5px 10px}
    .sec-a    {background:#854F0B;color:#fff;font-weight:bold;font-size:10pt;padding:5px 10px}
    .sec-n    {background:#0F3D2E;color:#fff;font-weight:bold;font-size:10pt;padding:5px 10px}
    .hg{background:#1D9E75;color:#fff;font-weight:bold;text-align:center}
    .hb{background:#185FA5;color:#fff;font-weight:bold;text-align:center}
    .ha{background:#854F0B;color:#fff;font-weight:bold;text-align:center}
    .hn{background:#0F3D2E;color:#fff;font-weight:bold;text-align:center}
    .alt{background:#F7F7F5}
    .tot{background:#D8F5EC;font-weight:bold}
    .tot-n{background:#FCEBEB;font-weight:bold;color:#791F1F}
    .kgg{background:#E1F5EE;color:#085041;font-weight:bold}
    .pos{background:#E1F5EE;color:#085041;font-weight:bold;text-align:right}
    .neg{background:#FCEBEB;color:#791F1F;font-weight:bold;text-align:right}
    .lbl{background:#F0EEEA;font-weight:bold}
    .r{text-align:right} .c{text-align:center}
    .sep td{border:none;height:10px}
  </style>`;

  let h = `<html xmlns:o="urn:schemas-microsoft-com:office:office"
    xmlns:x="urn:schemas-microsoft-com:office:excel"
    xmlns="http://www.w3.org/TR/REC-html40">
  <head><meta charset="UTF-8">${css}</head><body>`;

  // ── helper ──────────────────────────────────────────────────────────────
  const sep = n => `<tr class="sep">${'<td></td>'.repeat(n)}</tr>`;
  const blk = () => h += `<tr class="sep"><td colspan="20" style="border:none;height:16px"></td></tr>`;

  // ══════════════════════════════════════════════════════════════════════════
  // TABLA 1 — RESUMEN GENERAL
  // ══════════════════════════════════════════════════════════════════════════
  h += `<table>`;
  h += `<tr><td colspan="11" class="titulo">AGROGANADERA LOS MÉDANOS — Resumen de corrales &nbsp;&nbsp; ${fd(today())}</td></tr>`;
  h += `<tr><td colspan="11" style="border:none;height:8px"></td></tr>`;
  h += `<tr>
    <th class="hn">Corral</th><th class="hn">Ingresados</th><th class="hn">Stock actual</th>
    <th class="hn">Vendidos</th><th class="hn">Kg ingresados</th><th class="hn">Kg vendidos</th>
    <th class="hn">Kg ganados</th><th class="hn">Costo compra</th><th class="hn">Costo alim.</th>
    <th class="hn">Ingreso ventas</th><th class="hn">Utilidad</th>
  </tr>`;

  let tCab=0,tStk=0,tVnd=0,tKgI=0,tKgV=0,tKgG=0,tCC=0,tCA=0,tIV=0;
  CORRALES.forEach((cor,ri) => {
    const ing=totIng(cor.id),stk=stockNow(cor.id),vend=ing-stk;
    const cc=costoCompra(cor.id),ca=costoAlim(cor.id),iv=ingVentas(cor.id),util=iv-cc-ca;
    const kgi=kgIngresados(cor.id),kgv=kgVend(cor.id),kgg=kgGanadosHastaPesada(cor.id);
    tCab+=ing;tStk+=stk;tVnd+=vend;tKgI+=kgi;tKgV+=kgv;tKgG+=kgg;tCC+=cc;tCA+=ca;tIV+=iv;
    const a=ri%2===1?' class="alt"':'';
    const uc=util>=0?'pos':'neg';
    h+=`<tr><td${a}><b>${esc(cor.nombre)}</b></td>
      <td${a} class="c">${fnum(ing)}</td><td${a} class="c">${fnum(stk)}</td><td${a} class="c">${fnum(vend)}</td>
      <td${a} class="r">${fnum(kgi)} kg</td><td${a} class="r">${fnum(kgv)} kg</td>
      <td class="kgg r">${fnum(kgg)} kg</td>
      <td${a} class="r">${fpeso(cc)}</td><td${a} class="r">${fpeso(ca)}</td><td${a} class="r">${fpeso(iv)}</td>
      <td class="${uc}">${fpeso(util)}</td></tr>`;
  });
  const tUtil=tIV-tCC-tCA;
  h+=`<tr><td class="tot"><b>TOTALES</b></td>
    <td class="tot c">${fnum(tCab)}</td><td class="tot c">${fnum(tStk)}</td><td class="tot c">${fnum(tVnd)}</td>
    <td class="tot r">${fnum(tKgI)} kg</td><td class="tot r">${fnum(tKgV)} kg</td>
    <td class="kgg r">${fnum(tKgG)} kg</td>
    <td class="tot r">${fpeso(tCC)}</td><td class="tot r">${fpeso(tCA)}</td><td class="tot r">${fpeso(tIV)}</td>
    <td class="${tUtil>=0?'pos':'neg'}">${fpeso(tUtil)}</td></tr>`;
  h+=`</table>`;

  // ══════════════════════════════════════════════════════════════════════════
  // TABLA 2 — DISTRIBUCIÓN ALIMENTACIÓN
  // ══════════════════════════════════════════════════════════════════════════
  h+=`<table><tr><td colspan="${3+CORRALES.length*2}" class="subtitulo">Distribución del costo de alimentación</td></tr>`;
  h+=`<tr><th class="hn">Alimento</th>`;
  CORRALES.forEach(c=>h+=`<th class="hn">${esc(c.nombre)} ($)</th><th class="hn">${esc(c.nombre)} (cant)</th>`);
  h+=`<th class="hn">Total $</th><th class="hn">Total cant</th><th class="hn">%</th></tr>`;

  const grandTotalAlim = CORRALES.reduce((s,c)=>s+costoAlim(c.id),0);
  ALIMENTOS.forEach((a,ri) => {
    const alt=ri%2===1?' class="alt"':'';
    let rowTot=0, rowCant=0;
    h+=`<tr><td${alt}>${a.icon} ${a.label}</td>`;
    CORRALES.forEach(c=>{
      const sub=S.consumos.filter(x=>x.cid===c.id&&x.tipo===a.key).reduce((s,x)=>s+Number(x.cant)*Number(x.precio),0);
      const cant=S.consumos.filter(x=>x.cid===c.id&&x.tipo===a.key).reduce((s,x)=>s+Number(x.cant),0);
      rowTot+=sub; rowCant+=cant;
      h+=`<td${alt} class="r">${fpeso(sub)}</td><td${alt} class="r">${fnum(cant,1)} ${a.unidad}</td>`;
    });
    const pct=grandTotalAlim>0?(rowTot/grandTotalAlim*100).toFixed(1)+'%':'—';
    h+=`<td class="tot r">${fpeso(rowTot)}</td><td class="tot r">${fnum(rowCant,1)} ${a.unidad}</td><td class="tot c">${pct}</td></tr>`;
  });
  // Fila total
  h+=`<tr><td class="tot"><b>Total</b></td>`;
  CORRALES.forEach(c=>h+=`<td class="tot r">${fpeso(costoAlim(c.id))}</td><td class="tot"></td>`);
  h+=`<td class="tot r">${fpeso(grandTotalAlim)}</td><td class="tot"></td><td class="tot c">100%</td></tr>`;
  h+=`</table>`;

  // ══════════════════════════════════════════════════════════════════════════
  // TABLAS POR CORRAL — INGRESOS / ALIMENTACIÓN / VENTAS / RESULTADO
  // ══════════════════════════════════════════════════════════════════════════
  CORRALES.forEach(cor => {
    // Título corral
    h+=`<table><tr><td colspan="7" class="titulo">${esc(cor.nombre.toUpperCase())}</td></tr></table>`;

    // ── INGRESOS ──────────────────────────────────────────────────────────
    h+=`<table>`;
    h+=`<tr><td colspan="6" class="sec-g">INGRESOS DE ANIMALES</td></tr>`;
    h+=`<tr><th class="hg">Fecha</th><th class="hg">Cabezas</th><th class="hg">Kg promedio</th><th class="hg">Precio / kg</th><th class="hg">Total kg</th><th class="hg">Costo compra</th></tr>`;
    const ingresos=S.ingresos.filter(i=>i.cid===cor.id).sort((a,b)=>a.fecha.localeCompare(b.fecha));
    let tIC=0,tIK=0,tICo=0;
    ingresos.forEach((i,ri)=>{
      const tk=+i.cant*+i.kg,tc=tk*+i.precio; tIC+=+i.cant;tIK+=tk;tICo+=tc;
      const a=ri%2===1?' class="alt"':'';
      h+=`<tr><td${a} class="c">${fd(i.fecha)}</td><td${a} class="c">${fnum(i.cant)}</td>
        <td${a} class="r">${fnum(i.kg,1)} kg</td><td${a} class="r">${fpeso(i.precio)}</td>
        <td${a} class="r">${fnum(tk)} kg</td><td${a} class="r">${fpeso(tc)}</td></tr>`;
    });
    if(!ingresos.length) h+=`<tr><td colspan="6" style="color:#999;font-style:italic">Sin registros</td></tr>`;
    h+=`<tr><td class="tot">Subtotal</td><td class="tot c">${fnum(tIC)} cab.</td><td class="tot"></td><td class="tot"></td><td class="tot r">${fnum(tIK)} kg</td><td class="tot r">${fpeso(tICo)}</td></tr>`;
    h+=`</table>`;

    // ── ALIMENTACIÓN ──────────────────────────────────────────────────────
    h+=`<table>`;
    h+=`<tr><td colspan="7" class="sec-b">ALIMENTACIÓN</td></tr>`;
    h+=`<tr><th class="hb">Fecha</th><th class="hb">Alimento</th><th class="hb">Cantidad</th><th class="hb">Precio unit.</th><th class="hb">Subtotal</th><th class="hb">Stock ese día</th><th class="hb">Costo / animal</th></tr>`;
    const consumos=S.consumos.filter(c=>c.cid===cor.id).sort((a,b)=>a.fecha.localeCompare(b.fecha));
    let tCC2=0;
    consumos.forEach((c,ri)=>{
      const sub=+c.cant*+c.precio,stk2=stockAt(cor.id,c.fecha); tCC2+=sub;
      const alim=ALIMENTOS.find(a=>a.key===c.tipo)||{label:c.tipo,unidad:'',icon:''};
      const a=ri%2===1?' class="alt"':'';
      h+=`<tr><td${a} class="c">${fd(c.fecha)}</td><td${a}>${alim.icon} ${esc(alim.label)}</td>
        <td${a} class="r">${fnum(c.cant,1)}</td><td${a} class="r">${fpeso(c.precio)}</td>
        <td${a} class="r">${fpeso(sub)}</td><td${a} class="c">${fnum(stk2)} cab.</td>
        <td${a} class="r">${fpeso(stk2>0?sub/stk2:0)}</td></tr>`;
    });
    if(!consumos.length) h+=`<tr><td colspan="7" style="color:#999;font-style:italic">Sin registros</td></tr>`;
    h+=`<tr><td class="tot">Subtotal</td><td class="tot"></td><td class="tot"></td><td class="tot"></td><td class="tot r">${fpeso(tCC2)}</td><td class="tot"></td><td class="tot"></td></tr>`;
    // Resumen por alimento
    h+=`<tr><td colspan="7" style="border:none;height:6px"></td></tr>`;
    h+=`<tr><th class="hb" colspan="2">Alimento</th><th class="hb" colspan="3">Costo total</th><th class="hb" colspan="2">Cantidad</th></tr>`;
    ALIMENTOS.forEach(a=>{
      const c2=consumos.filter(c=>c.tipo===a.key);
      const t=c2.reduce((s,c)=>s+Number(c.cant)*Number(c.precio),0);
      const cant=c2.reduce((s,c)=>s+Number(c.cant),0);
      h+=`<tr><td colspan="2">${a.icon} ${a.label}</td><td class="r" colspan="3">${fpeso(t)}</td><td class="r" colspan="2">${fnum(cant,1)} ${a.unidad}</td></tr>`;
    });
    h+=`</table>`;

    // ── VENTAS ────────────────────────────────────────────────────────────
    h+=`<table>`;
    h+=`<tr><td colspan="6" class="sec-a">VENTAS</td></tr>`;
    h+=`<tr><th class="ha">Fecha</th><th class="ha">Cabezas</th><th class="ha">Kg promedio</th><th class="ha">Precio / kg</th><th class="ha">Total kg</th><th class="ha">Ingreso</th></tr>`;
    const ventas=S.ventas.filter(v=>v.cid===cor.id).sort((a,b)=>a.fecha.localeCompare(b.fecha));
    let tVC=0,tVK=0,tVI=0;
    ventas.forEach((v,ri)=>{
      const tk=+v.cant*+v.kg,ing=tk*+v.precio; tVC+=+v.cant;tVK+=tk;tVI+=ing;
      const a=ri%2===1?' class="alt"':'';
      h+=`<tr><td${a} class="c">${fd(v.fecha)}</td><td${a} class="c">${fnum(v.cant)}</td>
        <td${a} class="r">${fnum(v.kg,1)} kg</td><td${a} class="r">${fpeso(v.precio)}</td>
        <td${a} class="r">${fnum(tk)} kg</td><td${a} class="r">${fpeso(ing)}</td></tr>`;
    });
    if(!ventas.length) h+=`<tr><td colspan="6" style="color:#999;font-style:italic">Sin registros</td></tr>`;
    h+=`<tr><td class="tot">Subtotal</td><td class="tot c">${fnum(tVC)} cab.</td><td class="tot"></td><td class="tot"></td><td class="tot r">${fnum(tVK)} kg</td><td class="tot r">${fpeso(tVI)}</td></tr>`;
    h+=`</table>`;

    // ── RESULTADO ─────────────────────────────────────────────────────────
    const cc3=costoCompra(cor.id),ca3=costoAlim(cor.id);
    const ca3HP=costoAlimHastaPesada(cor.id);
    const fPes3=fechaUltimaPesada(cor.id);
    const iv3ventas=ingVentas(cor.id);
    const stkPrecio3=Number((S.preciosStock||{})[cor.id]||0);
    const pesadas3=(S.pesadas||[]).filter(p=>p.cid===cor.id).sort((a,b)=>a.fecha.localeCompare(b.fecha));
    const kgPromPes3=pesadas3.length?Number(pesadas3[pesadas3.length-1].kg):0;
    const stk3=stockNow(cor.id);
    const ivStock3=stkPrecio3>0&&kgPromPes3>0?stk3*kgPromPes3*stkPrecio3:0;
    const iv3=iv3ventas+ivStock3;
    const util3=iv3-cc3-ca3;
    const kgg3=kgGanadosHastaPesada(cor.id),vend3=totIng(cor.id)-stk3;
    const uc=util3>=0?'pos':'neg';
    h+=`<table>`;
    h+=`<tr><td colspan="2" class="sec-n">RESULTADO</td></tr>`;
    h+=`<tr><td class="lbl">Costo de compra</td><td class="r">${fpeso(cc3)}</td></tr>`;
    h+=`<tr><td class="lbl">Costo de alimentación (total)</td><td class="r">${fpeso(ca3)}</td></tr>`;
    if(fPes3&&ca3HP<ca3) h+=`<tr><td class="lbl" style="font-size:10px;color:#555">  · Hasta última pesada (${fd(fPes3)})</td><td class="r" style="font-size:10px;color:#555">${fpeso(ca3HP)}</td></tr>`;
    h+=`<tr><td class="lbl">Ingreso por ventas</td><td class="r">${fpeso(iv3ventas)}</td></tr>`;
    if(ivStock3>0) h+=`<tr><td class="lbl">Stock valorizado (${stk3} anim.)</td><td class="r">${fpeso(ivStock3)}</td></tr>`;
    if(ivStock3>0) h+=`<tr><td class="lbl" style="font-size:10px;color:var(--text3)">Subtotal ingresos</td><td class="r" style="font-size:10px;color:var(--text3)">${fpeso(iv3)}</td></tr>`;
    h+=`<tr><td class="${uc}">UTILIDAD NETA</td><td class="${uc}">${fpeso(util3)}</td></tr>`;
    h+=`<tr><td colspan="2" style="border:none;height:6px"></td></tr>`;
    h+=`<tr><td class="kgg">Kg ganados (engorde)</td><td class="kgg r">${fnum(kgg3)} kg</td></tr>`;
    const ings3=S.ingresos.filter(i=>i.cid===cor.id); const t3=ings3.reduce((s,i)=>s+Number(i.cant),0); const kprom3=t3>0?ings3.reduce((s,i)=>s+Number(i.cant)*Number(i.kg),0)/t3:0; if(pesadas3.length&&kprom3>0) h+=`<tr><td class="kgg">Ganancia por animal (kg prom. pesada − kg prom. ingreso)</td><td class="kgg r">${fnum(Number(pesadas3[pesadas3.length-1].kg)-kprom3,1)} kg</td></tr>`;
    if(kgg3>0) h+=`<tr><td class="kgg">Costo alim. / kg ganado*</td><td class="kgg r">${fpeso(ca3HP/kgg3)}</td></tr>`;
    
    if(fPes3&&ca3HP<ca3) h+=`<tr><td colspan="2" style="font-size:9px;color:#888">* Costo alimentación hasta última pesada (${fd(fPes3)})</td></tr>`;
    h+=`</table>`;

    h+=`<p style="margin:30px 0 0;border-top:2px solid #0F3D2E;padding-top:8px"></p>`;
  });

  h+=`</body></html>`;

  // ── Guardar ──────────────────────────────────────────────────────────────
  const blob = new Blob(['\ufeff'+h], { type:'application/vnd.ms-excel;charset=utf-8' });
  if (window.showSaveFilePicker) {
    window.showSaveFilePicker({
      suggestedName: 'corrales_engorde_' + today() + '.xls',
      types: [{ description: 'Excel', accept: { 'application/vnd.ms-excel': ['.xls'] } }]
    }).then(async fh => {
      const w = await fh.createWritable();
      await w.write(blob); await w.close();
      setAlert('Excel exportado con colores correctamente.', 'g'); render();
    }).catch(e => { if (e.name!=='AbortError') { fallback(); } });
  } else { fallback(); }

  function fallback() {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href=url; a.download='corrales_engorde_'+today()+'.xls';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
    setAlert('Excel exportado correctamente.', 'g'); render();
  }
}

// ========== RENDER ==========
function render() {
  CORRALES = getCorrales(); // refrescar desde estado
  [chartInst, chartInst2].forEach(ch => { try { if (ch) ch.destroy(); } catch(e) {} });
  chartInst = chartInst2 = null;
  document.getElementById('root').innerHTML = buildApp();
  attachEvents();
}

function buildApp() {
  const nav = [
    {k:'dashboard',   icon:'📊', l:'Panel',             sub:'Resumen general'},
    {k:'pesadas',     icon:'⚖️', l:'Ingresos y Pesadas', sub:'Registro de animales'},
    {k:'consumos',    icon:'🌿', l:'Alimentación',       sub:'Consumos por corral'},
    {k:'ventas',      icon:'🐄', l:'Salidas',            sub:'Ventas y liquidaciones'},
    {k:'costos',      icon:'🧮', l:'Costos',             sub:'Análisis de costos'},
    {k:'comparacion', icon:'📊', l:'Comparación',        sub:'Entre corrales'},
    {k:'veterinaria', icon:'🩺', l:'Veterinaria',        sub:'Sanidad y eventos'},
    {k:'stock',       icon:'📦', l:'Stock',              sub:'Stock de insumos'},
    {k:'proyeccion',  icon:'🎯', l:'Proyección Salidas', sub:'Fecha estimada de venta'},
    {k:'costo-cierre',icon:'🔮', l:'Costo Proyectado',   sub:'Cierre estimado'},
    {k:'historial',   icon:'📋', l:'Historial Lotes',    sub:'Lotes cerrados'},
    {k:'config',      icon:'⚙️', l:'Configuración',      sub:'TC, precios, corrales'},
  ];
  const curNav = nav.find(p => p.k === S.page) || nav[0];
  const sinCorralBar = ['dashboard','comparacion','veterinaria','stock','proyeccion','costo-cierre','historial','config'];
  let pageContent = '';
  switch(S.page) {
    case 'dashboard':    pageContent = buildDashboard(); break;
    case 'pesadas':      pageContent = buildPesadas(); break;
    case 'consumos':     pageContent = buildConsumos(); break;
    case 'ventas':       pageContent = buildVentas(); break;
    case 'costos':       pageContent = buildCostos(); break;
    case 'comparacion':  pageContent = buildComparacion(); break;
    case 'veterinaria':  pageContent = buildVeterinaria(); break;
    case 'stock':        pageContent = buildStock(); break;
    case 'proyeccion':   pageContent = buildProyeccion(); break;
    case 'costo-cierre': pageContent = buildCostoCierre(); break;
    case 'historial':    pageContent = buildHistorial(); break;
    case 'config':       pageContent = buildConfig(); break;
  }
  let corralBar = '';
  if (!sinCorralBar.includes(S.page)) {
    corralBar = `<div class="corral-bar" style="padding:0 24px 0;margin-bottom:0;background:var(--bg2);border-bottom:0.5px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;padding:10px 24px">`;
    CORRALES.forEach(c => {
      const stk = stockNow(c.id);
      corralBar += `<button class="ctab ${S.corral===c.id?'active':''}" data-corral="${c.id}">${c.nombre}<span class="stk">(${fn(stk,0)} cab.)</span></button>`;
    });
    corralBar += `</div>`;
  }
  const alertBanner = S.alert ? `<div class="alert alert-${S.alert.type}" style="margin:0 24px 16px">${S.alert.msg}</div>` : '';
  return `<div class="app-shell">
    <div class="sidebar">
      <div class="sidebar-brand">
        <span class="farm-icon">🐄</span>
        <div class="farm-name">Agroganadera Los Médanos</div>
        <div class="farm-sub">Gestión de corrales</div>
        <a href="https://agroganaderalosmedanos.github.io/" class="btn-inicio-sidebar">← Inicio</a>
      </div>
      <div class="sidebar-nav">
        ${nav.map(p => `<button class="snav-item ${S.page===p.k?'active':''}" data-page="${p.k}">${p.icon} ${p.l}</button>`).join('')}
      </div>
      <div class="sidebar-footer"><span class="dot-ok"></span> Datos guardados</div>
    </div>
    <div class="main-area">
      <div class="topbar">
        <div>
          <h1>${curNav.l}</h1>
          <div class="topbar-sub">${curNav.sub}</div>
        </div>
        <div class="topbar-actions">
          <button class="btn btn-export" id="btn-export">📊 Excel</button>
          <button class="btn" id="btn-pdf" style="background:var(--red);color:#fff">📄 PDF</button>
          <button class="btn" id="btn-moneda" style="background:${S.moneda==='USD'?'#1a6b3e':'var(--bg2)'};color:${S.moneda==='USD'?'#fff':'var(--text)'};font-weight:600">${S.moneda==='USD'?'🇺🇸 USD':'🇦🇷 ARS'}</button>
          <label class="btn" style="background:#6B3FA0;color:#fff;cursor:pointer">⚖️ True Test<input type="file" id="btn-truetest-file" accept=".xls,.xlsx" style="display:none"></label>
          <button class="btn btn-save-manual" id="btn-save-manual">💾 Guardar</button>
          <label class="btn btn-import">📂 Importar<input type="file" id="btn-import-file" accept=".json" style="display:none"></label>
        </div>
      </div>
      ${corralBar}
      ${alertBanner}
      <div class="main-content">
        ${pageContent}
      </div>
    </div>
  </div>`;
}

function buildDashboard() {
  let totAn=0, totKgV=0, totIv=0, totIvStock=0, totCC=0, totCA=0, totCV=0, totRes=0, totKgI=0, totKgG=0;
  CORRALES.forEach(c => {
    totAn  += stockNow(c.id);
    totKgV += kgVend(c.id);
    totKgI += kgIngresados(c.id);
    totKgG += kgGanadosHastaPesada(c.id);
    const iv=ingVentas(c.id), cc=costoCompra(c.id), ca=costoAlim(c.id), cv=costoVetTotal(c.id);
    const stk=stockNow(c.id);
    const stkP=Number((S.preciosStock||{})[c.id]||0);
    const pes=(S.pesadas||[]).filter(p=>p.cid===c.id).sort((a,b)=>a.fecha.localeCompare(b.fecha));
    const kgPesUlt=pes.length?Number(pes[pes.length-1].kg):0;
    const ivStock=stkP>0&&kgPesUlt>0?stk*kgPesUlt*stkP:0;
    totIv += iv; totIvStock += ivStock; totCC += cc; totCA += ca; totCV += cv; totRes += iv+ivStock-cc-ca;
  });
  const totIvTotal = totIv + totIvStock;

  // Fila 1: KPIs financieros en orden solicitado
  const tcD = tcHoy();
  const monLabel = S.moneda === 'USD' ? (tcD ? `TC: $${fn(tcD,0)}/USD` : 'sin TC cargado') : 'pesos argentinos';
  let h = `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
    <span style="font-size:11px;color:var(--text3)">Moneda: <strong>${S.moneda==='USD'?'🇺🇸 Dólares (USD)':'🇦🇷 Pesos (ARS)'}</strong> · ${monLabel}</span>
    ${S.moneda==='USD'&&!tcD?`<span style="font-size:11px;color:var(--red)">⚠ Cargá el tipo de cambio en Configuración</span>`:''}
  </div>
  <div class="kpi-grid" style="margin-bottom:1px">
    <div class="kpi"><div class="kpi-icon">🐄</div><div class="kpi-label">Stock total</div><div class="kpi-val">${fn(totAn,0)}</div><div class="kpi-sub">animales en corrales</div></div>
    <div class="kpi"><div class="kpi-icon">💵</div><div class="kpi-label">Ingreso por ventas</div><div class="kpi-val">${fmon(totIv)}</div></div>
    <div class="kpi"><div class="kpi-icon">🏷️</div><div class="kpi-label">Stock valorizado</div><div class="kpi-val ${totIvStock>0?'kpi-pos':''}">${totIvStock>0?fmon(totIvStock):'—'}</div><div class="kpi-sub">${totIvStock>0?`ingresos totales: ${fmon(totIvTotal)}`:'ingresá precio en Costos'}</div></div>
    <div class="kpi"><div class="kpi-icon">🛒</div><div class="kpi-label">Costo de compra</div><div class="kpi-val">${fmon(totCC)}</div></div>
    <div class="kpi"><div class="kpi-icon">🌿</div><div class="kpi-label">Costo de alimentación</div><div class="kpi-val">${fmon(totCA)}</div></div>
    ${totCV>0?`<div class="kpi"><div class="kpi-icon">🩺</div><div class="kpi-label">Costo veterinario</div><div class="kpi-val" style="color:#9b59b6">${fmon(totCV)}</div><div class="kpi-sub">sin vet: ${fmon(totRes)} · con vet: ${fmon(totRes-totCV)}</div></div>`:''}
    <div class="kpi">
      <div class="kpi-icon">${totRes>=0?'📈':'📉'}</div>
      <div class="kpi-label">Utilidad neta</div>
      <div class="kpi-val ${totRes>=0?'kpi-pos':'kpi-neg'}">${fmon(totRes)}</div>
      <div class="kpi-sub">${totIvStock>0?`ventas + stock valorizado`:(totRes>=0?'✓ Ganancia':'⚠ Pérdida')}</div>
    </div>
  </div>`;
  // Fila 2: KPIs de kilos en orden solicitado
  const totKgStk = CORRALES.reduce((s,c) => s + kgStockEstimado(c.id), 0);
  // Ganancia diaria promedio ponderada entre corrales (últimas dos pesadas de cada uno)
  // Ganancia diaria real por corral: desde ingreso hasta última pesada
  let ganDiariaItems = [];
  CORRALES.forEach(c => {
    const pes = (S.pesadas||[]).filter(p=>p.cid===c.id).sort((a,b)=>a.fecha.localeCompare(b.fecha));
    if (!pes.length) return;
    const ultPes = pes[pes.length-1];
    const ings = S.ingresos.filter(i=>i.cid===c.id);
    const totI = ings.reduce((s,i)=>s+Number(i.cant),0);
    const kgProm = totI>0 ? ings.reduce((s,i)=>s+Number(i.cant)*Number(i.kg),0)/totI : 0;
    const fi = ings.length ? ings.map(i=>i.fecha).sort()[0] : null;
    if (fi && kgProm>0) {
      const d = Math.round((new Date(ultPes.fecha)-new Date(fi))/86400000);
      if (d>0) ganDiariaItems.push({ gan:(Number(ultPes.kg)-kgProm)/d, nombre:c.nombre });
    }
  });
  const ganDiariaProm = ganDiariaItems.length ? ganDiariaItems.reduce((s,x)=>s+x.gan,0)/ganDiariaItems.length : null;

  h += `<div class="kpi-grid" style="margin-bottom:18px;grid-template-columns:repeat(5,1fr)">
    <div class="kpi compact"><div class="kpi-icon">📥</div><div class="kpi-label">Kg ingresados</div><div class="kpi-val">${fn(totKgI,0)}</div><div class="kpi-sub">kg al entrar al corral</div></div>
    <div class="kpi compact"><div class="kpi-icon">⚖️</div><div class="kpi-label">Kg vendidos</div><div class="kpi-val">${fn(totKgV,0)}</div><div class="kpi-sub">kg totales egresados</div></div>
    <div class="kpi compact"><div class="kpi-icon">🐄</div><div class="kpi-label">Kg en stock</div><div class="kpi-val">${fn(totKgStk,0)}</div><div class="kpi-sub">${fn(totAn,0)} animales · última pesada</div></div>
    <div class="kpi compact"><div class="kpi-icon">📊</div><div class="kpi-label">Kg ganados</div><div class="kpi-val kpi-pos">${fn(totKgG,0)}</div><div class="kpi-sub">${(() => { const vend = CORRALES.reduce((s,c)=>s+totIng(c.id)-stockNow(c.id),0); const ganXAnimal = CORRALES.map(c=>{ const p=(S.pesadas||[]).filter(x=>x.cid===c.id).sort((a,b)=>a.fecha.localeCompare(b.fecha)); const i2=S.ingresos.filter(x=>x.cid===c.id); const t=i2.reduce((s,x)=>s+Number(x.cant),0); const kp=t>0?i2.reduce((s,x)=>s+Number(x.cant)*Number(x.kg),0)/t:0; return p.length&&kp>0?Number(p[p.length-1].kg)-kp:null; }).filter(x=>x!==null); return ganXAnimal.length>0 ? fn(ganXAnimal.reduce((s,x)=>s+x,0)/ganXAnimal.length,1)+' kg gan./animal (prom.)' : 'sin pesadas'; })()}</div></div>
    <div class="kpi compact">
      <div class="kpi-icon">📈</div>
      <div class="kpi-label">Ganancia diaria prom.</div>
      <div class="kpi-val kpi-pos">${ganDiariaProm!==null?fn(ganDiariaProm,3)+' kg/día':'—'}</div>
      <div class="kpi-sub">${ganDiariaItems.length?ganDiariaItems.map(x=>x.nombre.split(' ')[2]||x.nombre).join(' · '):'sin pesadas suficientes'}</div>
    </div>
  </div>`;

  // Tarjetas por corral — ahora con más datos
  h += `<div class="corral-summary-grid">`;
  CORRALES.forEach(c => {
    const ing=totIng(c.id), stk=stockNow(c.id), vend=ing-stk;
    const ca=costoAlim(c.id), cc=costoCompra(c.id), ivVentas=ingVentas(c.id);
    const stkP=Number((S.preciosStock||{})[c.id]||0);
    const pes=(S.pesadas||[]).filter(p=>p.cid===c.id).sort((a,b)=>a.fecha.localeCompare(b.fecha));
    const kgPesUlt=pes.length?Number(pes[pes.length-1].kg):0;
    const ivStock=stkP>0&&kgPesUlt>0?stk*kgPesUlt*stkP:0;
    const iv=ivVentas+ivStock;
    const res=iv-ca-cc;
    const kgV=kgVend(c.id), kgI=kgIngresados(c.id), kgG=kgGanadosHastaPesada(c.id);
    // Ganancia diaria real: desde ingreso hasta última pesada
    let ganDiariaCorral = null;
    if (pes.length) {
      const ultPes = pes[pes.length-1];
      const ings2 = S.ingresos.filter(i=>i.cid===c.id);
      const totI2 = ings2.reduce((s,i)=>s+Number(i.cant),0);
      const kgProm2 = totI2>0 ? ings2.reduce((s,i)=>s+Number(i.cant)*Number(i.kg),0)/totI2 : 0;
      const fi2 = ings2.length ? ings2.map(i=>i.fecha).sort()[0] : null;
      if (fi2 && kgProm2>0) {
        const d2 = Math.round((new Date(ultPes.fecha)-new Date(fi2))/86400000);
        if (d2>0) ganDiariaCorral = (Number(ultPes.kg)-kgProm2)/d2;
      }
    }
    h += `<div class="corral-card">
      <div class="corral-card-header">
        <div class="corral-card-name">🏚️ ${c.nombre}</div>
        <span class="pill ${res>=0?'pill-green':'pill-red'}">${fmon(res)}</span>
      </div>
      <div class="corral-card-body">
        <div><div class="cc-item-label">Stock</div><div class="cc-item-val">${fn(stk,0)} cab.</div></div>
        <div><div class="cc-item-label">Vendidos</div><div class="cc-item-val">${fn(vend,0)} cab.</div></div>
        <div><div class="cc-item-label">Ingreso venta</div><div class="cc-item-val" style="font-size:13px">${fmon(ivVentas)}</div></div>
        ${ivStock>0?`<div><div class="cc-item-label">Stock valorizado</div><div class="cc-item-val" style="font-size:13px;color:var(--green)">${fmon(ivStock)}</div></div>`:''}
        <div><div class="cc-item-label">Costo compra</div><div class="cc-item-val" style="font-size:13px">${fmon(cc)}</div></div>
        <div><div class="cc-item-label">Costo alim.</div><div class="cc-item-val" style="font-size:13px">${fmon(ca)}</div></div>
        <div><div class="cc-item-label">Ganancia diaria</div><div class="cc-item-val" style="font-size:13px;color:var(--green)">${ganDiariaCorral!==null?fn(ganDiariaCorral,3)+' kg/día':'—'}</div></div>

<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cría — Agroganadera Los Médanos</title>
<style>
:root {
  --bg: #faf8f4; --bg2: #f3efe6; --bg3: #ece5d6;
  --text: #2b261f; --text2: #6b6357; --text3: #a39a89;
  --border: rgba(43,38,31,0.1); --border2: rgba(43,38,31,0.18);
  --green: #2f6b3f; --green-dark: #1f4d2b; --green-bg: #e6efe3; --green-text: #1f4d2b;
  --clay: #a8512f; --clay-bg: #f6e8e0; --clay-text: #7a3a20;
  --gold: #b8860b; --gold-bg: #f5edd8; --gold-text: #8a6508;
  --red: #b3261e; --red-bg: #fbeae8; --red-text: #8c1d17;
  --radius: 10px; --radius-lg: 16px;
  --shadow: 0 1px 3px rgba(43,38,31,0.08), 0 1px 2px rgba(43,38,31,0.06);
  --shadow-md: 0 4px 12px rgba(43,38,31,0.08);
  --serif: 'Source Serif Pro', Georgia, 'Times New Roman', serif;
  --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono: 'IBM Plex Mono', 'SF Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
body { min-height: 100vh; }
::selection { background: var(--gold-bg); }

#root { min-height: 100vh; }
.app-shell { display: flex; min-height: 100vh; }

.sidebar {
  width: 240px; flex-shrink: 0; background: var(--text); color: #e8e4dc;
  display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh;
}
.sidebar-brand { padding: 22px 20px 18px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.sidebar-brand .farm-icon { font-size: 22px; margin-bottom: 6px; display: block; }
.sidebar-brand .farm-name { font-family: var(--serif); font-size: 17px; font-weight: 600; color: #fff; letter-spacing: -0.01em; }
.sidebar-brand .farm-sub { font-size: 11px; color: #a39a89; margin-top: 2px; }

.sidebar-nav { flex: 1; padding: 14px 10px; overflow-y: auto; }
.nav-section-label { font-size: 10.5px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #8a8174; padding: 14px 10px 6px; }
.nav-item {
  display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px;
  color: #cfc9bd; font-size: 13.5px; font-weight: 500; cursor: pointer; transition: background 0.15s, color 0.15s;
  margin-bottom: 1px; border: none; background: none; width: 100%; text-align: left;
}
.nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
.nav-item.active { background: var(--green); color: #fff; }
.nav-item .nav-icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }

.sidebar-footer { padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.08); font-size: 11px; color: #8a8174; }
.sidebar-footer .sync-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 5px; }
.sync-dot.ok { background: #5fb87a; } .sync-dot.bad { background: #d97757; } .sync-dot.busy { background: #d4b65f; animation: pulse 1.2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

.main { flex: 1; min-width: 0; }
.topbar {
  display: flex; align-items: center; justify-content: space-between; padding: 16px 28px;
  border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 5;
}
.topbar h1 { font-family: var(--serif); font-size: 21px; font-weight: 600; letter-spacing: -0.01em; }
.topbar .topbar-sub { font-size: 12.5px; color: var(--text2); margin-top: 1px; }
.content { padding: 24px 28px 60px; max-width: 1280px; }

.btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px;
  font-size: 13px; font-weight: 600; border: 1px solid transparent; cursor: pointer; transition: all 0.15s;
  font-family: var(--sans); white-space: nowrap;
}
.btn-primary { background: var(--green); color: #fff; }
.btn-primary:hover { background: var(--green-dark); }
.btn-secondary { background: var(--bg2); color: var(--text); border-color: var(--border2); }
.btn-secondary:hover { background: var(--bg3); }
.btn-danger { background: var(--red-bg); color: var(--red-text); }
.btn-danger:hover { background: #f5d6d3; }
.btn-ghost { background: transparent; color: var(--text2); padding: 6px 10px; }
.btn-ghost:hover { background: var(--bg2); color: var(--text); }
.btn-sm { padding: 5px 11px; font-size: 12px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.panel { background: #fff; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 18px; box-shadow: var(--shadow); }
.panel-title { font-size: 15px; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.panel-title .count-badge { font-size: 11px; font-weight: 600; background: var(--bg2); color: var(--text2); padding: 1px 8px; border-radius: 100px; }

.section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text3); margin: 26px 0 10px; }
.section-label:first-child { margin-top: 0; }

.fgrid { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 4px; }
.fg { display: flex; flex-direction: column; gap: 5px; min-width: 160px; flex: 1; }
.fg label { font-size: 11.5px; font-weight: 600; color: var(--text2); }
.fg label .opt { font-weight: 400; color: var(--text3); }
.fg input, .fg select, .fg textarea {
  border: 1px solid var(--border2); border-radius: 8px; padding: 8px 11px; font-size: 13.5px;
  font-family: var(--sans); background: var(--bg); color: var(--text); transition: border-color 0.15s, background 0.15s;
}
.fg input:focus, .fg select:focus, .fg textarea:focus { outline: none; border-color: var(--green); background: #fff; }
.fg input::placeholder { color: var(--text3); }

.radio-group { display: flex; gap: 8px; flex-wrap: wrap; }
.radio-pill {
  padding: 7px 14px; border-radius: 100px; border: 1.5px solid var(--border2); font-size: 12.5px; font-weight: 600;
  cursor: pointer; color: var(--text2); background: var(--bg); transition: all 0.15s; user-select: none;
}
.radio-pill.selected { background: var(--green); border-color: var(--green); color: #fff; }
.radio-pill:hover:not(.selected) { border-color: var(--text3); }

.helper-text { font-size: 11.5px; color: var(--text3); margin-top: 6px; line-height: 1.5; }
.live-calc { font-size: 13px; font-weight: 600; margin-top: 8px; padding: 9px 13px; border-radius: 8px; }
.live-calc.green { background: var(--green-bg); color: var(--green-text); }
.live-calc.red { background: var(--red-bg); color: var(--red-text); }

.tw { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius); }
table.dt { width: 100%; border-collapse: collapse; font-size: 13px; }
table.dt th { text-align: left; padding: 10px 14px; background: var(--bg2); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text2); border-bottom: 1px solid var(--border); white-space: nowrap; }
table.dt th.tc, table.dt td.tc { text-align: center; }
table.dt td { padding: 10px 14px; border-bottom: 1px solid var(--border); white-space: nowrap; }
table.dt tbody tr:hover { background: var(--bg2); }
table.dt tbody tr:last-child td { border-bottom: none; }
.row-actions { display: flex; gap: 4px; justify-content: flex-end; }
.icon-btn { background: none; border: none; cursor: pointer; font-size: 13px; padding: 4px 6px; border-radius: 5px; color: var(--text3); }
.icon-btn:hover { background: var(--bg3); color: var(--text); }
.icon-btn.danger:hover { background: var(--red-bg); color: var(--red-text); }

.empty-state { text-align: center; padding: 48px 20px; color: var(--text3); }
.empty-state .ico { font-size: 32px; display: block; margin-bottom: 10px; opacity: 0.6; }
.empty-state .msg { font-size: 13.5px; }

.pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 100px; font-size: 11.5px; font-weight: 600; }
.pill-green { background: var(--green-bg); color: var(--green-text); }
.pill-clay { background: var(--clay-bg); color: var(--clay-text); }
.pill-gold { background: var(--gold-bg); color: var(--gold-text); }
.pill-red { background: var(--red-bg); color: var(--red-text); }
.pill-gray { background: var(--bg3); color: var(--text2); }

.kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 12px; margin-bottom: 20px; }
.kpi-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px; box-shadow: var(--shadow); position: relative; overflow: hidden; }
.kpi-card .kpi-icon { font-size: 17px; margin-bottom: 8px; }
.kpi-card .kpi-label { font-size: 11.5px; color: var(--text2); font-weight: 600; margin-bottom: 4px; }
.kpi-card .kpi-value { font-family: var(--serif); font-size: 26px; font-weight: 600; letter-spacing: -0.01em; }
.kpi-card .kpi-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }
.kpi-card.accent-green { border-top: 3px solid var(--green); }
.kpi-card.accent-clay { border-top: 3px solid var(--clay); }
.kpi-card.accent-gold { border-top: 3px solid var(--gold); }
.kpi-card.accent-red { border-top: 3px solid var(--red); }
.kpi-card.compact { padding: 10px 14px; }
.kpi-card.compact .kpi-icon { font-size: 13px; margin-bottom: 4px; }
.kpi-card.compact .kpi-label { font-size: 10.5px; margin-bottom: 2px; }
.kpi-card.compact .kpi-value { font-size: 18px; }

.rodeo-strip { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 20px; }
.rodeo-chip {
  flex-shrink: 0; padding: 10px 16px; border-radius: 12px; border: 1.5px solid var(--border2);
  background: #fff; cursor: pointer; transition: all 0.15s; min-width: 130px;
}
.rodeo-chip:hover { border-color: var(--green); }
.rodeo-chip.active { border-color: var(--green); background: var(--green-bg); }
.rodeo-chip .rc-name { font-size: 12.5px; font-weight: 700; color: var(--text); }
.rodeo-chip .rc-meta { font-size: 10.5px; color: var(--text3); margin-top: 2px; }
.rodeo-chip.active .rc-name { color: var(--green-dark); }

.modal-overlay { position: fixed; inset: 0; background: rgba(43,38,31,0.45); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
.modal { background: #fff; border-radius: var(--radius-lg); width: 100%; max-width: 560px; max-height: 88vh; overflow-y: auto; box-shadow: var(--shadow-md); }
.modal-header { display: flex; justify-content: space-between; align-items: center; padding: 18px 22px; border-bottom: 1px solid var(--border); }
.modal-header h3 { font-family: var(--serif); font-size: 17px; font-weight: 600; }
.modal-close { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text3); padding: 4px; }
.modal-body { padding: 20px 22px; }
.modal-footer { display: flex; justify-content: flex-end; gap: 8px; padding: 16px 22px; border-top: 1px solid var(--border); }

#toast-zone { position: fixed; bottom: 22px; right: 22px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
.toast { padding: 12px 18px; border-radius: 10px; font-size: 13px; font-weight: 600; box-shadow: var(--shadow-md); animation: slideIn 0.25s ease-out; max-width: 360px; }
.toast.ok { background: var(--green); color: #fff; }
.toast.err { background: var(--red); color: #fff; }
@keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

.loader { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 60px 20px; color: var(--text3); font-size: 13px; }
.spinner { width: 16px; height: 16px; border: 2px solid var(--border2); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.setup-wrap { max-width: 520px; margin: 80px auto; padding: 0 20px; }
.setup-wrap .panel { padding: 32px; }

@media (max-width: 860px) {
  .sidebar { position: fixed; left: -240px; z-index: 50; transition: left 0.2s; box-shadow: var(--shadow-md); }
  .sidebar.open { left: 0; }
  .mobile-menu-btn { display: flex !important; }
  .content { padding: 18px 16px 60px; }
  .topbar { padding: 14px 16px; }
  .kpi-row { grid-template-columns: repeat(2, 1fr); }
}
.mobile-menu-btn { display: none; background: none; border: none; font-size: 20px; cursor: pointer; padding: 4px 8px; }

@media print {
  .sidebar, .topbar, .btn { display: none !important; }
}
</style>
</head>
<body>
<div id="root"></div>
<div id="toast-zone"></div>
<script>
let S = {
  apiUrl: localStorage.getItem('cria_api_url') || '',
  apiToken: localStorage.getItem('cria_api_token') || '',
  page: 'dashboard',
  sidebarOpen: false,
  loading: false,
  syncStatus: 'idle',
  catalogs: null,
  selectedRodeoId: null,
  selectedCampoId: null,
  dashboard: null,
  stock: null,
  cache: {},
  modal: null,
};

function save() {
  localStorage.setItem('cria_api_url', S.apiUrl);
  localStorage.setItem('cria_api_token', S.apiToken);
}

function apiConfigured() { return !!(S.apiUrl && S.apiToken); }

async function apiCall(action, opts = {}) {
  if (!apiConfigured()) throw new Error('API no configurada');
  S.syncStatus = 'busy';
  renderSyncDot();
  try {
    let url = S.apiUrl + '?action=' + action + '&token=' + encodeURIComponent(S.apiToken);
    if (opts.params) {
      Object.entries(opts.params).forEach(([k, v]) => { url += '&' + k + '=' + encodeURIComponent(v); });
    }
    const fetchOpts = { method: opts.body ? 'POST' : 'GET' };
    if (opts.body) {
      fetchOpts.body = JSON.stringify(opts.body);
      fetchOpts.headers = { 'Content-Type': 'text/plain;charset=utf-8' };
    }
    const res = await fetch(url, fetchOpts);
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'Error desconocido');
    S.syncStatus = 'ok';
    renderSyncDot();
    return json.data;
  } catch (err) {
    S.syncStatus = 'bad';
    renderSyncDot();
    throw err;
  }
}

function renderSyncDot() {
  const el = document.getElementById('sync-dot');
  if (!el) return;
  el.className = 'sync-dot ' + (S.syncStatus === 'busy' ? 'busy' : S.syncStatus === 'bad' ? 'bad' : 'ok');
}

function toast(msg, type) {
  type = type || 'ok';
  const zone = document.getElementById('toast-zone');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  zone.appendChild(el);
  setTimeout(() => el.remove(), 3800);
}

function today() { return new Date().toISOString().slice(0, 10); }
function fd(dateStr) {
  if (!dateStr) return '—';
  const parts = String(dateStr).split('-');
  if (parts.length === 3) return parts[2] + '/' + parts[1] + '/' + parts[0];
  return dateStr;
}
function fn(n, dec) {
  dec = dec || 0;
  if (n === null || n === undefined || isNaN(n)) return '—';
  return Number(n).toLocaleString('es-AR', { maximumFractionDigits: dec, minimumFractionDigits: dec });
}
function pct(n) { return n === null || n === undefined ? '—' : fn(n, 1) + '%'; }
function gid() { return 'tmp_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

function rodeoNombre(rodeoId) {
  const r = (S.catalogs && S.catalogs.rodeos || []).find(x => String(x.rodeo_id) === String(rodeoId));
  return r ? r.nombre : '—';
}
function campoNombre(campoId) {
  const c = (S.catalogs && S.catalogs.campos || []).find(x => String(x.campo_id) === String(campoId));
  return c ? c.nombre : '—';
}
function rodeosCriaActivos() {
  return (S.catalogs && S.catalogs.rodeos || []).filter(r => (r.categoria === 'vaca' || r.categoria === 'vaquillona'));
}
function rodeosTodos() {
  return (S.catalogs && S.catalogs.rodeos || []);
}
function rodeosPorCampo(campoId) {
  return rodeosTodos().filter(r => String(r.campo_id) === String(campoId));
}
function rodeoOptionsHtml(rodeosList) {
  if (!rodeosList.length) return '<option value="">Sin rodeos en este campo</option>';
  return rodeosList.map(r => `<option value="${r.rodeo_id}">${r.nombre}</option>`).join('');
}

async function loadCatalogs() {
  S.catalogs = await apiCall('catalog');
}
async function loadEntity(entity, force) {
  if (!force && S.cache[entity]) return S.cache[entity];
  const data = await apiCall('list', { params: { entity } });
  S.cache[entity] = data;
  return data;
}
async function loadDashboard() {
  S.dashboard = await apiCall('dashboard');
}
function invalidateCache(entity) { delete S.cache[entity]; }

async function init() {
  if (!apiConfigured()) { S.page = 'setup'; render(); return; }
  render();
  try {
    await loadCatalogs();
    render(); // muestra la app navegable de inmediato, con el Resumen en estado "calculando"
    loadDashboard().then(render).catch(err => toast('Error al calcular índices: ' + err.message, 'err'));
  } catch (err) {
    toast('Error al conectar: ' + err.message, 'err');
  }
}

const NAV = [
  { section: 'Panel', items: [
    { k: 'dashboard', icon: '◈', label: 'Resumen' },
  ]},
  { section: 'Ciclo de cría', items: [
    { k: 'servicios', icon: '⚭', label: 'Servicios' },
    { k: 'tactos', icon: '◔', label: 'Tactos' },
    { k: 'abortos', icon: '⊘', label: 'Abortos' },
    { k: 'pariciones', icon: '✦', label: 'Pariciones' },
    { k: 'mortandad', icon: '†', label: 'Mortandad' },
    { k: 'destetes', icon: '⊞', label: 'Destetes' },
  ]},
  { section: 'Stock', items: [
    { k: 'movimientos', icon: '⇄', label: 'Movimientos' },
  ]},
  { section: 'Sistema', items: [
    { k: 'config', icon: '⚙', label: 'Configuración' },
  ]},
];

async function goto(page) {
  S.page = page;
  S.sidebarOpen = false;
  const entityMap = { servicios: 'servicios', tactos: 'tactos', abortos: 'abortos', pariciones: 'pariciones', mortandad: 'mortandad', destetes: 'destetes', movimientos: 'movimientos' };
  if (entityMap[page] && !S.cache[entityMap[page]]) {
    S.loading = true; render();
    try { await loadEntity(entityMap[page]); } catch (err) { toast(err.message, 'err'); }
    S.loading = false;
  }
  if (page === 'movimientos' && !S.stock) {
    try { await loadStock(); } catch (err) { toast(err.message, 'err'); }
  }
  render();
}

function render() {
  const root = document.getElementById('root');
  if (S.page === 'setup') {
    root.innerHTML = buildSetup();
    attachSetupEvents();
    return;
  }
  root.innerHTML = buildShell();
  attachShellEvents();
}

function buildShell() {
  const navHtml = NAV.map(sec => `
    <div class="nav-section-label">${sec.section}</div>
    ${sec.items.map(it => `
      <button class="nav-item ${S.page === it.k ? 'active' : ''}" data-nav="${it.k}">
        <span class="nav-icon">${it.icon}</span>${it.label}
      </button>
    `).join('')}
  `).join('');

  return `
  <div class="app-shell">
    <div class="sidebar ${S.sidebarOpen ? 'open' : ''}">
      <div class="sidebar-brand">
        <span class="farm-icon">⛭</span>
        <div class="farm-name">Los Médanos</div>
        <div class="farm-sub">Gestión de cría</div>
      </div>
      <div class="sidebar-nav">${navHtml}</div>
      <div class="sidebar-footer">
        <span class="sync-dot ${S.syncStatus === 'busy' ? 'busy' : S.syncStatus === 'bad' ? 'bad' : 'ok'}" id="sync-dot"></span>
        ${S.syncStatus === 'bad' ? 'Sin conexión' : 'Conectado a Sheets'}
      </div>
    </div>
    <div class="main">
      <div class="topbar">
        <div style="display:flex;align-items:center;gap:10px">
          <button class="mobile-menu-btn" id="btn-menu">☰</button>
          <div>
            <h1>${pageTitle(S.page)}</h1>
            <div class="topbar-sub">${pageSubtitle(S.page)}</div>
          </div>
        </div>
      </div>
      <div class="content" id="content">${buildPage(S.page)}</div>
    </div>
  </div>
  `;
}

function pageTitle(p) {
  const titles = {
    dashboard: 'Resumen de cría', servicios: 'Servicios', tactos: 'Tactos',
    abortos: 'Abortos', pariciones: 'Pariciones', mortandad: 'Mortandad',
    destetes: 'Destetes', movimientos: 'Movimientos', config: 'Configuración',
  };
  return titles[p] || p;
}
function pageSubtitle(p) {
  const subs = {
    dashboard: 'Índices de preñez, parición y destete por rodeo',
    servicios: 'IATF y servicio con toros a campo',
    tactos: 'Resultado de tacto por rodeo',
    abortos: 'Registro de gestaciones interrumpidas',
    pariciones: 'Conteo de nacimientos por rodeo',
    mortandad: 'Mortandad de terneros entre nacimiento y destete',
    destetes: 'Terneros destetados, caravaneados al plantel',
    movimientos: 'Transferencias de animales entre rodeos y saldo inicial',
    config: 'Conexión con la planilla de datos',
  };
  return subs[p] || '';
}

function buildPage(page) {
  if (S.loading) return '<div class="loader"><div class="spinner"></div>Cargando datos…</div>';
  switch (page) {
    case 'dashboard':  return buildDashboard();
    case 'servicios':  return buildServicios();
    case 'tactos':     return buildTactos();
    case 'abortos':    return buildAbortos();
    case 'pariciones': return buildPariciones();

    case 'destetes':   return buildDestetes();
    case 'movimientos': return buildMovimientos();
    case 'config':     return buildConfig();

  }
}

// Suma los valores crudos de KPIs de varios rodeos y recalcula los porcentajes agregados
function aggregateKpis_(rodeosArr) {
  let totServ = 0, prenIatf = 0, prenToro = 0, totPren = 0;
  let nacVivos = 0, nacMuertos = 0, abortos = 0, totDest = 0, mortTerneros = 0;
  rodeosArr.forEach(r => {
    const k = r.kpis;
    totServ += k.servicio.total_serviciadas || 0;
    prenIatf += k.servicio.prenadas_iatf || 0;
    prenToro += k.servicio.prenadas_toro || 0;
    totPren += k.servicio.total_prenadas || 0;
    nacVivos += k.paricion.nacidos_vivos || 0;
    nacMuertos += k.paricion.nacidos_muertos || 0;
    abortos += k.gestacion.abortos || 0;
    totDest += k.destete.total_destetados || 0;
    mortTerneros += k.destete.mortandad_terneros || 0;
  });
  return {
    servicio: {
      total_serviciadas: totServ, prenadas_iatf: prenIatf, prenadas_toro: prenToro, total_prenadas: totPren,
      indice_prenez: totServ > 0 ? round1_(totPren / totServ * 100) : null,
      indice_prenez_iatf: totServ > 0 ? round1_(prenIatf / totServ * 100) : null,
      indice_prenez_toro: (totServ - prenIatf) > 0 ? round1_(prenToro / (totServ - prenIatf) * 100) : null,
    },
    gestacion: { abortos },
    paricion: { nacidos_vivos: nacVivos, nacidos_muertos: nacMuertos, indice_paricion: totPren > 0 ? round1_(nacVivos / totPren * 100) : null },
    destete: { total_destetados: totDest, mortandad_terneros: mortTerneros, indice_destete: nacVivos > 0 ? round1_(totDest / nacVivos * 100) : null },
  };
}
function round1_(n) { return n === null || n === undefined || isNaN(n) ? null : Math.round(n * 10) / 10; }

function pillForPct(p) {
  if (p === null || p === undefined) return '<span style="color:var(--text3)">—</span>';
  const cls = p >= 85 ? 'pill-green' : p >= 65 ? 'pill-gold' : 'pill-red';
  return `<span class="pill ${cls}">${fn(p,1)}%</span>`;
}

window.updateTactoCalc = function() {
  const total = Number(document.getElementById('tc-total') && document.getElementById('tc-total').value) || 0;
  const pren = Number(document.getElementById('tc-prenadas') && document.getElementById('tc-prenadas').value) || 0;
  const calcEl = document.getElementById('tc-calc');
  if (!calcEl) return;
  if (total > 0) {
    const vacias = total - pren;
    if (vacias < 0) { calcEl.innerHTML = '<div class="live-calc red">Las preñadas no pueden superar el total tacteadas.</div>'; return; }
    const indice = (pren / total * 100).toFixed(1);
    calcEl.innerHTML = '<div class="live-calc green">→ Vacías: ' + vacias + ' · Índice de preñez de este tacto: ' + indice + '%</div>';
  } else { calcEl.innerHTML = ''; }
};

function buildStockTable_(stockList, campoFiltro) {
  const filtrado = campoFiltro ? stockList.filter(s => String(s.campo_id) === String(campoFiltro)) : stockList;
  if (!stockList.length) {
    return `<div class="empty-state"><span class="ico">◌</span><div class="msg">Cargando stock…</div></div>`;
  }
  const totalGeneral = filtrado.reduce((s, x) => s + (Number(x.stock) || 0), 0);
  const porCategoria = {};
  filtrado.forEach(s => { porCategoria[s.categoria] = (porCategoria[s.categoria] || 0) + (Number(s.stock) || 0); });

  let h = `<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">
    <div style="background:var(--green-bg);color:var(--green-text);border-radius:9px;padding:8px 15px;font-size:14.5px;font-weight:700;white-space:nowrap">
      ⛭ Total: ${fn(totalGeneral)}
    </div>
    ${Object.entries(porCategoria).map(([cat, tot]) => `
      <div style="background:var(--bg2);color:var(--text2);border-radius:9px;padding:8px 15px;font-size:14.5px;font-weight:600;white-space:nowrap">
        ${cat}: <strong style="color:var(--text)">${fn(tot)}</strong>
      </div>
    `).join('')}
  </div>`;
  h += `<div class="tw"><table class="dt"><thead><tr><th>Rodeo</th><th>Campo</th><th>Categoría</th><th class="tc">Stock</th></tr></thead><tbody>`;
  filtrado.forEach(s => {
    h += `<tr><td><strong>${s.nombre}</strong></td><td style="color:var(--text2)">${campoNombre(s.campo_id)}</td>
      <td><span class="pill pill-gray">${s.categoria}</span></td>
      <td class="tc"><strong>${fn(s.stock)}</strong></td></tr>`;
  });
  h += `</tbody></table></div>`;
  return h;
}

function attachMovimientosEvents() {
  function applyTipoUI(tipo) {
    const esSaldoInicial = tipo === 'Saldo inicial';
    const esIndividual = tipo === 'Traslado individual';
    const esBloque = tipo === 'Traslado en bloque';
    document.getElementById('mv-campo-origen-wrap').style.display = (esIndividual || esBloque) ? 'flex' : 'none';
    document.getElementById('mv-origen-wrap').style.display = (esIndividual || esBloque) ? 'flex' : 'none';
    document.getElementById('mv-caravana-wrap').style.display = esIndividual ? 'flex' : 'none';
    document.getElementById('mv-cantidad-wrap').style.display = esIndividual ? 'none' : 'flex';
    document.getElementById('mv-destino-label').textContent = esSaldoInicial ? 'Rodeo' : 'Rodeo destino';
  }
  document.querySelectorAll('#mv-tipo-group .radio-pill').forEach(p => p.onclick = () => {
    document.querySelectorAll('#mv-tipo-group .radio-pill').forEach(x => x.classList.remove('selected'));
    p.classList.add('selected');
    applyTipoUI(p.dataset.tipo);
  });
  const save = document.getElementById('mv-save');
  if (save) save.onclick = async () => {
    const tipo = document.querySelector('#mv-tipo-group .selected').dataset.tipo;
    const esIndividual = tipo === 'Traslado individual';
    const esSaldoInicial = tipo === 'Saldo inicial';
    const data = {
      tipo,
      caravana: esIndividual ? document.getElementById('mv-caravana').value.trim() : '',
      fecha: document.getElementById('mv-fecha').value,
      campo_origen_id: !esSaldoInicial ? document.getElementById('mv-campo-origen').value : '',
      campo_destino_id: document.getElementById('mv-campo-destino').value,
      rodeo_origen_id: !esSaldoInicial ? document.getElementById('mv-origen').value : '',
      rodeo_destino_id: document.getElementById('mv-destino').value,
      cantidad: esIndividual ? 1 : (Number(document.getElementById('mv-cantidad').value) || 0),
      observaciones: document.getElementById('mv-obs').value.trim(),
    };
    if (!data.fecha || !data.rodeo_destino_id) { toast('Completá fecha y rodeo destino.', 'err'); return; }
    if (esIndividual && !data.caravana) { toast('Ingresá la caravana del animal.', 'err'); return; }
    if (!esIndividual && !data.cantidad) { toast('Ingresá la cantidad.', 'err'); return; }
    if (!esSaldoInicial && data.rodeo_origen_id === data.rodeo_destino_id) { toast('El rodeo de origen y destino no pueden ser el mismo.', 'err'); return; }
    // Validación de coherencia: el rodeo elegido debe pertenecer realmente al campo elegido
    const rodeoDestObj = rodeosTodos().find(r => String(r.rodeo_id) === String(data.rodeo_destino_id));
    if (!rodeoDestObj || String(rodeoDestObj.campo_id) !== String(data.campo_destino_id)) {
      toast('El rodeo destino no corresponde al campo elegido. Volvé a seleccionar el campo y esperá que se actualice la lista de rodeos.', 'err');
      return;
    }
    if (!esSaldoInicial) {
      const rodeoOrigObj = rodeosTodos().find(r => String(r.rodeo_id) === String(data.rodeo_origen_id));
      if (!rodeoOrigObj || String(rodeoOrigObj.campo_id) !== String(data.campo_origen_id)) {
        toast('El rodeo origen no corresponde al campo elegido. Volvé a seleccionar el campo y esperá que se actualice la lista de rodeos.', 'err');
        return;
      }
    }
    save.disabled = true;
    try {
      await apiCall('create', { body: { entity: 'movimientos', data } });
      invalidateCache('movimientos');
      toast('Movimiento registrado', 'ok');
      await loadEntity('movimientos', true);
      S.stock = null;
      await loadStock();
      render();
    } catch (err) { toast(err.message, 'err'); } finally { save.disabled = false; }
  };
  attachTableDeleteEvents('movimientos', 'movimiento_id');
}

function buildEntityTable(items, cols, entity, idCol) {
  if (!items.length) {
    return '<div class="empty-state"><span class="ico">◌</span><div class="msg">Todavía no hay registros. Cargá el primero arriba.</div></div>';
  }
  let h = `<div class="section-label">Historial <span class="count-badge" style="margin-left:6px">${items.length}</span></div>
  <div class="tw"><table class="dt"><thead><tr>`;
  cols.forEach(c => h += `<th>${c.label}</th>`);
  h += '<th></th></tr></thead><tbody>';
  items.forEach(item => {
    h += '<tr>';
    cols.forEach(c => h += `<td>${c.render ? c.render(item[c.key]) : (item[c.key] != null ? item[c.key] : '—')}</td>`);
    h += `<td><div class="row-actions">
      <button class="icon-btn" data-edit="${item[idCol]}" data-entity="${entity}" data-idcol="${idCol}" title="Editar">✎</button>
      <button class="icon-btn danger" data-del="${item[idCol]}" data-entity="${entity}" data-idcol="${idCol}" title="Eliminar">✕</button>
    </div></td>`;
    h += '</tr>';
  });
  h += '</tbody></table></div>';
  return h;
}
function attachTableDeleteEvents(entity, idCol) {
  document.querySelectorAll('[data-del][data-entity="' + entity + '"]').forEach(btn => {
    btn.onclick = async () => {
      if (!confirm('¿Eliminar este registro?')) return;
      try {
        await apiCall('delete', { body: { entity, id: btn.dataset.del } });
        invalidateCache(entity);
        toast('Registro eliminado', 'ok');
        await loadEntity(entity, true);
        await loadDashboard();
        if (entity === 'movimientos') { S.stock = null; await loadStock(); }
        render();
      } catch (err) { toast(err.message, 'err'); }
    };
  });
  document.querySelectorAll('[data-edit][data-entity="' + entity + '"]').forEach(btn => {
    btn.onclick = () => openEditModal(entity, idCol, btn.dataset.edit);
  });
}

// ── EDICIÓN GENÉRICA DE REGISTROS ───────────────────────────────────────
// Construye un modal de edición a partir del item crudo en S.cache[entity],
// infiriendo el tipo de campo por el nombre/valor de la clave.
function fieldInputType_(key, value) {
  if (key.includes('fecha')) return 'date';
  if (key === 'rodeo_id' || key === 'rodeo_origen_id' || key === 'rodeo_destino_id') return 'rodeo';
  if (key === 'campo_id' || key === 'campo_origen_id' || key === 'campo_destino_id') return 'campo';
  if (key === 'tipo' || key === 'tipo_tacto' || key === 'tipo_venta' || key === 'estado') return 'text';
  if (typeof value === 'number' || (!isNaN(value) && value !== '' && value !== null)) return 'number';
  return 'text';
}
function openEditModal(entity, idCol, id) {
  const items = S.cache[entity] || [];
  const item = items.find(i => String(i[idCol]) === String(id));
  if (!item) { toast('No se encontró el registro.', 'err'); return; }
  const keys = Object.keys(item).filter(k => k !== idCol);
  const rodeosL = rodeosTodos();
  const camposL = (S.catalogs && S.catalogs.campos) || [];

  let fieldsHtml = '';
  keys.forEach(k => {
    const type = fieldInputType_(k, item[k]);
    const fid = 'edit-' + k;
    if (type === 'rodeo') {
      fieldsHtml += `<div class="fg"><label>${k}</label>
        <select id="${fid}">${rodeosL.map(r => `<option value="${r.rodeo_id}" ${String(r.rodeo_id)===String(item[k])?'selected':''}>${r.nombre}</option>`).join('')}</select></div>`;
    } else if (type === 'campo') {
      fieldsHtml += `<div class="fg"><label>${k}</label>
        <select id="${fid}">${camposL.map(c => `<option value="${c.campo_id}" ${String(c.campo_id)===String(item[k])?'selected':''}>${c.nombre}</option>`).join('')}</select></div>`;
    } else if (type === 'date') {
      fieldsHtml += `<div class="fg"><label>${k}</label><input type="date" id="${fid}" value="${item[k]||''}"></div>`;
    } else if (type === 'number') {
      fieldsHtml += `<div class="fg"><label>${k}</label><input type="number" id="${fid}" value="${item[k]!=null?item[k]:''}"></div>`;
    } else {
      fieldsHtml += `<div class="fg"><label>${k}</label><input type="text" id="${fid}" value="${(item[k]!=null?item[k]:'').toString().replace(/"/g,'&quot;')}"></div>`;
    }
  });

  document.body.insertAdjacentHTML('beforeend', `
    <div class="modal-overlay" id="edit-modal-overlay">
      <div class="modal">
        <div class="modal-header"><h3>Editar registro</h3><button class="modal-close" id="edit-modal-close">✕</button></div>
        <div class="modal-body"><div class="fgrid">${fieldsHtml}</div></div>
        <div class="modal-footer">
          <button class="btn btn-secondary" id="edit-modal-cancel">Cancelar</button>
          <button class="btn btn-primary" id="edit-modal-save">Guardar cambios</button>
        </div>
      </div>
    </div>`);

  const closeModal = () => document.getElementById('edit-modal-overlay')?.remove();
  document.getElementById('edit-modal-close').onclick = closeModal;
  document.getElementById('edit-modal-cancel').onclick = closeModal;
  document.getElementById('edit-modal-save').onclick = async () => {
    const data = {};
    keys.forEach(k => {
      const el = document.getElementById('edit-' + k);
      if (!el) return;
      data[k] = el.tagName === 'SELECT' ? el.value : (el.type === 'number' ? Number(el.value) : el.value.trim());
    });
    const saveBtn = document.getElementById('edit-modal-save');
    saveBtn.disabled = true;
    try {
      await apiCall('update', { body: { entity, id, data } });
      invalidateCache(entity);
      toast('Registro actualizado', 'ok');
      await loadEntity(entity, true);
      await loadDashboard();
      if (entity === 'movimientos') { S.stock = null; await loadStock(); }
      closeModal();
      render();
    } catch (err) { toast(err.message, 'err'); saveBtn.disabled = false; }
  };
}

init();
</script>
